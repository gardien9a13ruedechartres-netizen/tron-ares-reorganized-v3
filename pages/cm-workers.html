<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>JSON Live Control Panel + Fullscreen HLS Player</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #f9fafb;
      overflow: hidden;
    }

    #playerWrapper {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 1;
    }

    #videoPlayer {
      width: 100vw;
      height: 100vh;
      object-fit: fill;
      background: #000;
      display: block;
    }

    #loadingOverlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: #fff;
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }

    #loadingOverlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .pro-spinner {
      width: 64px;
      height: 64px;
      border: 5px solid rgba(255,255,255,0.15);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-bottom: 18px;
    }

    .loading-text {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: #e5e7eb;
    }

    .dots::after {
      content: "";
      animation: dots 1.4s infinite steps(4);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes dots {
      0% { content: ""; }
      25% { content: "."; }
      50% { content: ".."; }
      75% { content: "..."; }
      100% { content: ""; }
    }

    #toggleControlPanel {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 20;
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 8px;
      background: rgba(17, 24, 39, 0);
      color: #fff;
      cursor: pointer;
      font-weight: bold;
      backdrop-filter: blur(8px);
    }

    #controlPanel {
      position: fixed;
      top: 70px;
      right: 16px;
      width: 420px;
      max-width: calc(100vw - 32px);
      max-height: calc(100vh - 90px);
      overflow: auto;
      z-index: 15;
      background: rgba(31, 41, 55, 0.92);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 16px;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    #controlPanel.hidden { display: none; }

    .panel {
      background: rgba(17, 24, 39, 0.8);
      border: 1px solid #374151;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 14px;
    }

    h1, h2 { margin-top: 0; }
    h1 { font-size: 20px; }
    h2 { font-size: 16px; }

    label {
      display: block;
      margin-bottom: 6px;
      color: #d1d5db;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #4b5563;
      background: #111827;
      color: #f9fafb;
      margin-bottom: 12px;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin: 4px 4px 4px 0;
      font-weight: bold;
    }

    .start { background: #22c55e; }
    .stop { background: #ef4444; color: white; }
    .reload { background: #3b82f6; color: white; }
    .copy { background: #f59e0b; }
    .play { background: #8b5cf6; color: white; }

    pre {
      background: #020617;
      padding: 12px;
      border-radius: 8px;
      overflow: auto;
      max-height: 240px;
      border: 1px solid #334155;
      font-size: 12px;
    }

    .status {
      margin-top: 12px;
      color: #d1d5db;
      font-size: 13px;
    }

    .success { color: #22c55e; }
    .error { color: #f87171; }

    .m3u8-item {
      padding: 10px 0;
      border-bottom: 1px solid #374151;
      word-break: break-all;
    }

    code {
      color: #93c5fd;
      font-size: 12px;
    }
  </style>
</head>

<body>
  <div id="playerWrapper">
    <video id="videoPlayer" controls autoplay playsinline></video>
  </div>

  <div id="loadingOverlay">
    <div class="pro-spinner"></div>
    <div class="loading-text">Chargement du flux<span class="dots"></span></div>
  </div>

  <button id="toggleControlPanel" onclick="toggleControlPanel()">☰</button>

  <aside id="controlPanel" class="hidden">
    <h1>Control Panel</h1>

    <section class="panel">
      <label>URL JSON dynamique</label>
      <input id="jsonUrl" type="text" value="https://cm-tv-refresh.victor-salema-53d.workers.dev/" />

      <label>Intervalle en minutes</label>
      <input id="intervalMinutes" type="number" min="1" value="30" />

      <button class="start" onclick="startAutoReload()">Démarrer</button>
      <button class="stop" onclick="stopAutoReload()">Arrêter</button>
      <button class="reload" onclick="loadJson()">Recharger maintenant</button>

      <div id="status" class="status">Statut : en attente</div>
    </section>

    <section class="panel">
      <h2>Player HLS</h2>

      <label>URL M3U8 directe</label>
      <input id="playerUrl" type="text" placeholder="Le lien .m3u8 direct sera collé ici automatiquement" />

      <button class="play" onclick="playCurrentUrl()">Lire cette URL directe</button>
      <button class="copy" onclick="copyText(playerUrlInput.value)">Copier URL du player</button>

      <div id="playerStatus" class="status">Player : en attente</div>
    </section>

    <section class="panel">
      <h2>M3U8 trouvés</h2>
      <div id="m3u8List">Aucun lien trouvé.</div>
    </section>

    <section class="panel">
      <h2>JSON reçu</h2>
      <pre id="jsonViewer">{}</pre>
    </section>
  </aside>

  <script>
    const REVERSE_PROXY = "https://cm-tv-refresh.victor-salema-53d.workers.dev/";
    const DEFAULT_DOMAIN = "https://livewatch.top";
    const AUTO_RELOAD_MINUTES = 30;

    let reloadTimer = null;
    let hlsInstance = null;
    let lastPlayedUrl = "";

    const controlPanel = document.getElementById("controlPanel");
    const urlInput = document.getElementById("jsonUrl");
    const intervalInput = document.getElementById("intervalMinutes");
    const statusBox = document.getElementById("status");
    const jsonViewer = document.getElementById("jsonViewer");
    const m3u8List = document.getElementById("m3u8List");

    const videoPlayer = document.getElementById("videoPlayer");
    const playerUrlInput = document.getElementById("playerUrl");
    const playerStatus = document.getElementById("playerStatus");
    const loadingOverlay = document.getElementById("loadingOverlay");

    videoPlayer.muted = false;
    videoPlayer.volume = 1;

    function showLoader() {
      loadingOverlay.classList.remove("hidden");
    }

    function hideLoader() {
      loadingOverlay.classList.add("hidden");
    }

    function toggleControlPanel() {
      controlPanel.classList.toggle("hidden");
    }

    function normalizeUrl(url) {
      let cleanUrl = String(url || "").trim();
      if (!cleanUrl) return "";
      if (cleanUrl.startsWith("//")) cleanUrl = "https:" + cleanUrl;
      if (cleanUrl.startsWith("/")) cleanUrl = DEFAULT_DOMAIN + cleanUrl;
      return cleanUrl;
    }

    function buildProxyUrl(url) {
      const absoluteUrl = normalizeUrl(url);
      return REVERSE_PROXY + encodeURIComponent(absoluteUrl);
    }

    async function loadJson() {
      const rawUrl = urlInput.value.trim();

      if (!rawUrl) {
        setStatus("Erreur : aucune URL renseignée.", "error");
        return;
      }

      try {
        setStatus("Chargement en cours...", "");

        const proxyUrl = buildProxyUrl(rawUrl);

        const response = await fetch(proxyUrl, {
          method: "GET",
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }

        const data = await response.json();

        jsonViewer.textContent = JSON.stringify(data, null, 2);

        const foundM3u8 = findM3u8Links(data);
        renderM3u8Links(foundM3u8);

        if (foundM3u8.length > 0) {
          const firstDirectUrl = normalizeUrl(foundM3u8[0]);
          playerUrlInput.value = firstDirectUrl;

          if (firstDirectUrl !== lastPlayedUrl) {
            lastPlayedUrl = firstDirectUrl;
            playHls(firstDirectUrl);
            setPlayerStatus("Nouvelle URL M3U8 directe détectée et lancée.", "success");
          } else {
            setPlayerStatus("Même URL M3U8 conservée. Lecture maintenue.", "success");
          }
        } else {
          showLoader();
          setPlayerStatus("Aucune URL .m3u8 trouvée dans le JSON.", "error");
        }

        setStatus("JSON chargé. M3U8 trouvés : " + foundM3u8.length, "success");
      } catch (error) {
        showLoader();
        setStatus("Erreur : " + error.message, "error");
      }
    }

    function findM3u8Links(value) {
      const results = new Set();

      function scan(item) {
        if (typeof item === "string") {
          const matches = item.match(/https?:\/\/[^"' <>\n\r]+\.m3u8[^"' <>\n\r]*/g);

          if (matches) {
            matches.forEach(function (url) {
              results.add(normalizeUrl(url));
            });
          }

          if (item.includes(".m3u8")) {
            results.add(normalizeUrl(item));
          }

          return;
        }

        if (Array.isArray(item)) {
          item.forEach(scan);
          return;
        }

        if (item && typeof item === "object") {
          Object.values(item).forEach(scan);
        }
      }

      scan(value);
      return Array.from(results);
    }

    function renderM3u8Links(links) {
      if (!links.length) {
        m3u8List.innerHTML = "Aucun lien .m3u8 trouvé.";
        return;
      }

      m3u8List.innerHTML = "";

      links.forEach(function (link, index) {
        const directLink = normalizeUrl(link);
        const proxyLink = buildProxyUrl(directLink);

        const item = document.createElement("div");
        item.className = "m3u8-item";

        item.innerHTML = `
          <div><strong>M3U8 #${index + 1}</strong></div>
          <br>

          <div><strong>Lien direct lu par le player :</strong></div>
          <code>${escapeHtml(directLink)}</code>
          <br><br>

          <div><strong>Lien proxy pour copie :</strong></div>
          <code>${escapeHtml(proxyLink)}</code>
          <br><br>

          <button class="play" onclick="pasteAndPlay('${escapeJs(directLink)}')">
            Coller et lire direct
          </button>

          <button class="copy" onclick="copyText('${escapeJs(directLink)}')">
            Copier direct
          </button>

          <button class="copy" onclick="copyText('${escapeJs(proxyLink)}')">
            Copier proxy
          </button>
        `;

        m3u8List.appendChild(item);
      });
    }

    function pasteAndPlay(url) {
      const directUrl = normalizeUrl(url);
      playerUrlInput.value = directUrl;
      lastPlayedUrl = directUrl;
      playHls(directUrl);
      setPlayerStatus("URL directe collée dans le player.", "success");
    }

    function playCurrentUrl() {
      const directUrl = normalizeUrl(playerUrlInput.value);

      if (!directUrl) {
        setPlayerStatus("Aucune URL dans le player.", "error");
        return;
      }

      playerUrlInput.value = directUrl;
      lastPlayedUrl = directUrl;
      playHls(directUrl);
    }

    function playHls(url) {
      const directUrl = normalizeUrl(url);

      if (!directUrl) {
        setPlayerStatus("URL HLS vide.", "error");
        showLoader();
        return;
      }

      showLoader();

      if (hlsInstance) {
        hlsInstance.destroy();
        hlsInstance = null;
      }

      videoPlayer.pause();
      videoPlayer.removeAttribute("src");
      videoPlayer.load();

      videoPlayer.muted = false;
      videoPlayer.volume = 1;

      if (Hls.isSupported()) {
        hlsInstance = new Hls({
          enableWorker: true,
          lowLatencyMode: true,
          backBufferLength: 30
        });

        hlsInstance.loadSource(directUrl);
        hlsInstance.attachMedia(videoPlayer);

        hlsInstance.on(Hls.Events.MANIFEST_PARSED, function () {
          videoPlayer.play().catch(function () {
            setPlayerStatus("Flux chargé. Clique sur lecture si l’autoplay est bloqué.", "success");
          });
        });

        hlsInstance.on(Hls.Events.ERROR, function (event, data) {
          if (data.fatal) {
            showLoader();
            setPlayerStatus("Erreur HLS fatale : " + data.type, "error");
          }
        });

        setPlayerStatus("Chargement du flux HLS direct...", "");
        return;
      }

      if (videoPlayer.canPlayType("application/vnd.apple.mpegurl")) {
        videoPlayer.src = directUrl;

        videoPlayer.play().catch(function () {
          setPlayerStatus("Flux chargé. Clique sur lecture si l’autoplay est bloqué.", "success");
        });

        setPlayerStatus("Lecture native HLS directe activée.", "success");
        return;
      }

      showLoader();
      setPlayerStatus("Ce navigateur ne supporte pas HLS.", "error");
    }

    videoPlayer.addEventListener("playing", hideLoader);
    videoPlayer.addEventListener("canplay", hideLoader);
    videoPlayer.addEventListener("waiting", showLoader);
    videoPlayer.addEventListener("stalled", showLoader);
    videoPlayer.addEventListener("error", showLoader);

    function startAutoReload() {
      stopAutoReload();

      intervalInput.value = AUTO_RELOAD_MINUTES;

      loadJson();

      reloadTimer = setInterval(function () {
        loadJson();
      }, AUTO_RELOAD_MINUTES * 60 * 1000);

      setStatus("Auto-refresh activé toutes les 30 minutes.", "success");
    }

    function stopAutoReload() {
      if (reloadTimer) {
        clearInterval(reloadTimer);
        reloadTimer = null;
      }

      setStatus("Auto-refresh arrêté.", "");
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        setStatus("Copié dans le presse-papiers.", "success");
      } catch (error) {
        setStatus("Impossible de copier : " + error.message, "error");
      }
    }

    function setStatus(message, type) {
      statusBox.textContent = "Statut : " + message;
      statusBox.className = "status " + type;
    }

    function setPlayerStatus(message, type) {
      playerStatus.textContent = "Player : " + message;
      playerStatus.className = "status " + type;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeJs(value) {
      return String(value)
        .replaceAll("\\", "\\\\")
        .replaceAll("'", "\\'")
        .replaceAll("\n", "\\n")
        .replaceAll("\r", "\\r");
    }

    window.addEventListener("load", function () {
      showLoader();
      startAutoReload();
    });
  </script>
</body>
</html>

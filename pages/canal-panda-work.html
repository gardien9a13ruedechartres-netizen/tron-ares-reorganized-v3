<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Sunshine Auto Fallback Player</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.16/dist/hls.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: #f9fafb;
    }
    #videoPlayer {
      width: 100vw;
      height: 100vh;
      object-fit: fill;
      background: #000;
      display: block;
    }
    #loader {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      background: #000;
      transition: opacity 0.25s ease, visibility 0.25s ease;
    }
    #loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .logo {
      width: 165px;
      max-width: 45vw;
      height: auto;
      animation: logoPulse 1.6s ease-in-out infinite;
      filter: drop-shadow(0 8px 26px rgba(0, 0, 0, 0.9));
    }
    .spinner {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: 5px solid rgba(255,255,255,0.16);
      border-top-color: #3b82f6;
      animation: spin 0.9s linear infinite;
    }
    #loaderText {
      font-size: 17px;
      font-weight: 700;
      color: #e5e7eb;
      text-align: center;
    }
    #panelToggle {
      position: fixed;
      top: 8px;
      right: 12px;
      z-index: 30;
      border: none;
      border-radius: 8px;
      padding: 9px 12px;
      color: rgba(255,255,255,0.75);
      background: rgba(15,23,42,0.55);
      cursor: pointer;
      font-weight: 800;
    }
    #panel {
      position: fixed;
      top: 52px;
      right: 12px;
      z-index: 25;
      width: 420px;
      max-width: calc(100vw - 24px);
      max-height: calc(100vh - 70px);
      overflow: auto;
      padding: 14px;
      border-radius: 12px;
      background: rgba(15,23,42,0.88);
      border: 1px solid rgba(148,163,184,0.35);
      backdrop-filter: blur(12px);
    }
    #panel.hidden { display: none; }
    label {
      display: block;
      margin: 10px 0 6px;
      color: #cbd5e1;
      font-size: 13px;
    }
    input {
      width: 100%;
      padding: 10px;
      border-radius: 7px;
      border: 1px solid #334155;
      background: #020617;
      color: #f8fafc;
    }
    button {
      margin: 10px 6px 0 0;
      padding: 10px 12px;
      border: 0;
      border-radius: 7px;
      cursor: pointer;
      font-weight: 800;
    }
    .blue { background: #3b82f6; color: #fff; }
    .green { background: #22c55e; color: #052e16; }
    .red { background: #ef4444; color: #fff; }
    .yellow { background: #f59e0b; color: #111827; }
    .box {
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      background: #020617;
      border: 1px solid #334155;
      font-size: 12px;
      line-height: 1.5;
      word-break: break-word;
    }
    #log {
      max-height: 210px;
      overflow: auto;
      color: #cbd5e1;
    }
    #jsonViewer {
      max-height: 260px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      color: #dbeafe;
    }
    #log div {
      padding: 4px 0;
      border-bottom: 1px solid rgba(148,163,184,0.18);
    }
    code { color: #93c5fd; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes logoPulse {
      0%, 100% { opacity: 0.85; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.04); }
    }
  </style>
</head>
<body>
  <video id="videoPlayer" controls autoplay playsinline></video>

  <div id="loader">
    <img class="logo" src="https://raw.githubusercontent.com/tv-logo/tv-logos/main/countries/portugal/canal-panda-pt.png" alt="CANAL PANDA" />
    <div class="spinner"></div>
    <div id="loaderText">Chargement du flux...</div>
  </div>

  <button id="panelToggle" onclick="togglePanel()">☰</button>

  <aside id="panel" class="hidden">
    <strong>Sunshine Auto Fallback Player</strong>

    <label>URL JSON Worker</label>
    <input id="jsonUrl" type="text" value="https://multi-work.victor-salema-53d.workers.dev/?channel=CANAL%20PANDA&countries=pt" />

    <label>Intervalle refresh JSON en secondes</label>
    <input id="refreshSeconds" type="number" min="10" value="30" />

    <button class="yellow" type="button" onclick="copyLog(event)">Copier le log</button>
    <button class="green" type="button" onclick="startAutoRefresh()">Démarrer</button>
    <button class="red" type="button" onclick="stopAutoRefresh()">Arrêter</button>
    <button class="blue" type="button" onclick="loadJsonAndMaybeSwitch('manuel')">Recharger JSON</button>
    <button class="yellow" type="button" onclick="copyCurrentUrl()">Copier URL finale</button>

    <div class="box">
      <div><strong>État :</strong> <span id="status">En attente</span></div>
      <div><strong>Serveur actif :</strong> <code id="activeServer">Aucun</code></div>
      <div><strong>Chemin actif :</strong> <code id="activePath">Aucun</code></div>
      <div><strong>URL finale :</strong> <code id="finalUrl">Aucune</code></div>
    </div>

    <div class="box">
      <div><strong>JSON reçu :</strong></div>
      <pre id="jsonViewer">{}</pre>
    </div>

    <div id="log" class="box">
      <div>Aucun événement.</div>
    </div>
  </aside>

  <script>
    const JSON_ENDPOINT = "https://multi-work.victor-salema-53d.workers.dev/?channel=CANAL%20PANDA&countries=pt";

    const STREAM_SERVERS = [
      {
        id: "principal",
        label: "Principal qmaalhy7",
        origin: "https://shouurvki7jtfax.ngolpdkyoctjcddxshli469r.org"
      },
      {
        id: "secours",
        label: "Secours shouurvki7",
        origin: "https://qmaalhy7acgxwhm.ngolpdkyoctjcddxshli469r.org"
      }
    ];

    const DEFAULT_REFRESH_SECONDS = 30;
    const MAX_FATAL_ERRORS_BEFORE_SERVER_SWITCH = 1;
    const PRIMARY_RETRY_INTERVAL_MS = 60000;
    const SERVER_TEST_TIMEOUT_MS = 7000;
    const REJECTED_PATH_COOLDOWN_MS = 60000;
    const JSON_RELOAD_AFTER_REJECT_COOLDOWN_MS = 12000;
    const ACTIVE_REFRESH_SKIP_MIN_BUFFER_SECONDS = 0.5;
    const ACTIVE_REFRESH_SKIP_LOG_INTERVAL_MS = 30000;

    let hlsInstance = null;
    let refreshTimer = null;
    let currentSunshinePath = "";
    let currentFinalUrl = "";
    let currentServerIndex = 0;
    let isLoadingJson = false;
    let hlsFatalErrorCount = 0;
    let lastPrimaryRetryMs = 0;
    let lastRejectedJsonReloadMs = 0;
    let lastSkippedActiveRefreshLogMs = 0;
    const rejectedPathUntil = new Map();

    const videoPlayer = document.getElementById("videoPlayer");
    const loader = document.getElementById("loader");
    const loaderText = document.getElementById("loaderText");
    const panel = document.getElementById("panel");
    const jsonUrlInput = document.getElementById("jsonUrl");
    const refreshSecondsInput = document.getElementById("refreshSeconds");
    const statusBox = document.getElementById("status");
    const activeServerBox = document.getElementById("activeServer");
    const activePathBox = document.getElementById("activePath");
    const finalUrlBox = document.getElementById("finalUrl");
    const jsonViewer = document.getElementById("jsonViewer");
    const logBox = document.getElementById("log");

    videoPlayer.muted = false;
    videoPlayer.volume = 1;

    function togglePanel() {
      panel.classList.toggle("hidden");
    }

    function setStatus(message) {
      statusBox.textContent = message;
    }

    function showLoader(message) {
      loaderText.textContent = message || "Chargement du flux...";
      loader.classList.remove("hidden");
    }

    function hideLoader() {
      loader.classList.add("hidden");
    }

    function addLog(message) {
      if (logBox.textContent.trim() === "Aucun événement.") {
        logBox.innerHTML = "";
      }

      const line = document.createElement("div");
      line.textContent = "[" + new Date().toLocaleTimeString("fr-FR") + "] " + message;
      logBox.prepend(line);

      while (logBox.children.length > 80) {
        logBox.removeChild(logBox.lastChild);
      }
    }

    function normalizeUrl(value) {
      let text = String(value || "").trim();
      if (!text) return "";
      if (text.startsWith("//")) text = "https:" + text;
      if (text.startsWith("/")) text = "https://livewatch.top" + text;
      return text;
    }

    function safeDecode(value) {
      let output = String(value || "");

      for (let index = 0; index < 8; index += 1) {
        try {
          const decoded = decodeURIComponent(output);
          if (decoded === output) return output;
          output = decoded;
        } catch (error) {
          return output;
        }
      }

      return output;
    }

    function extractSunshinePath(value) {
      let text = String(value || "").trim();
      if (!text) return "";

      for (let index = 0; index < 10; index += 1) {
        text = safeDecode(text);

        const sunshineIndex = text.indexOf("/sunshine/");
        if (sunshineIndex !== -1) {
          return text.slice(sunshineIndex);
        }

        try {
          const parsed = new URL(normalizeUrl(text));
          const nested = parsed.searchParams.get("url");
          if (nested) {
            text = nested;
            continue;
          }
        } catch (error) {}

        break;
      }

      return "";
    }

    function buildDirectUrl(serverIndex, sunshinePath) {
      return STREAM_SERVERS[serverIndex].origin + sunshinePath;
    }

    function getRejectedKey(serverIndex, sunshinePath) {
      return String(serverIndex) + "|" + String(sunshinePath || "");
    }

    function isPathTemporarilyRejected(serverIndex, sunshinePath) {
      const until = rejectedPathUntil.get(getRejectedKey(serverIndex, sunshinePath)) || 0;
      if (!until) return false;
      if (Date.now() > until) {
        rejectedPathUntil.delete(getRejectedKey(serverIndex, sunshinePath));
        return false;
      }
      return true;
    }

    function markPathRejected(serverIndex, sunshinePath, status) {
      if (!sunshinePath) return;
      rejectedPathUntil.set(
        getRejectedKey(serverIndex, sunshinePath),
        Date.now() + REJECTED_PATH_COOLDOWN_MS
      );
      addLog(
        "Chemin refusé temporairement sur " +
          STREAM_SERVERS[serverIndex].label +
          " (HTTP " +
          status +
          ")."
      );
    }

    function bothServersRejected(sunshinePath) {
      return STREAM_SERVERS.every(function (_, index) {
        return isPathTemporarilyRejected(index, sunshinePath);
      });
    }

    function requestFreshJsonAfterRejectedPath(reason) {
      const now = Date.now();
      if (now - lastRejectedJsonReloadMs < JSON_RELOAD_AFTER_REJECT_COOLDOWN_MS) {
        addLog("JSON frais déjà demandé récemment, boucle 403 évitée.");
        return;
      }

      lastRejectedJsonReloadMs = now;
      currentSunshinePath = "";
      currentFinalUrl = "";
      setStatus("Chemin refusé, recherche d'une nouvelle URL...");
      addLog("Recherche JSON fraîche après refus 403" + (reason ? " : " + reason : "") + ".");
      loadJsonAndMaybeSwitch("refus 403 nouvelle URL");
    }

    function findFirstM3u8Value(data) {
      const priorityKeys = [
        "streamUrl",
        "hlsUrl",
        "hls_url",
        "m3u8",
        "url",
        "stream",
        "source",
        "src",
        "link"
      ];

      function scanPriority(node) {
        if (!node || typeof node !== "object") return "";

        for (const key of priorityKeys) {
          if (Object.prototype.hasOwnProperty.call(node, key)) {
            const value = node[key];

            if (typeof value === "string" && value.includes(".m3u8")) {
              return value;
            }

            if (Array.isArray(value) || (value && typeof value === "object")) {
              const found = scanPriority(value);
              if (found) return found;
            }
          }
        }

        if (Array.isArray(node)) {
          for (const item of node) {
            const found = scanPriority(item);
            if (found) return found;
          }
        }

        return "";
      }

      function scanAny(node) {
        if (typeof node === "string") {
          return node.includes(".m3u8") ? node : "";
        }

        if (Array.isArray(node)) {
          for (const item of node) {
            const found = scanAny(item);
            if (found) return found;
          }
          return "";
        }

        if (node && typeof node === "object") {
          for (const value of Object.values(node)) {
            const found = scanAny(value);
            if (found) return found;
          }
        }

        return "";
      }

      return scanPriority(data) || scanAny(data);
    }

    async function testServerForPath(serverIndex, sunshinePath) {
      if (isPathTemporarilyRejected(serverIndex, sunshinePath)) {
        addLog("Test ignoré : chemin encore en cooldown sur " + STREAM_SERVERS[serverIndex].label + ".");
        return false;
      }

      const finalUrl = buildDirectUrl(serverIndex, sunshinePath);
      const controller = new AbortController();
      const timeout = setTimeout(function () {
        controller.abort();
      }, SERVER_TEST_TIMEOUT_MS);

      try {
        const response = await fetch(finalUrl, {
          method: "GET",
          cache: "no-store",
          signal: controller.signal
        });

        if (!response.ok) {
          if (response.status === 401 || response.status === 403 || response.status === 404 || response.status === 410) {
            markPathRejected(serverIndex, sunshinePath, response.status);
          }
          return false;
        }

        const text = await response.text();
        if (!text.trim().startsWith("#EXTM3U")) {
          addLog("Réponse serveur non M3U8 sur " + STREAM_SERVERS[serverIndex].label + ".");
          return false;
        }

        return true;
      } catch (error) {
        if (error && error.name === "AbortError") {
          addLog("Test serveur timeout : " + STREAM_SERVERS[serverIndex].label + ".");
        }
        return false;
      } finally {
        clearTimeout(timeout);
      }
    }

    async function chooseServerForPath(sunshinePath, reason) {
      if (!sunshinePath) return currentServerIndex;

      if (currentServerIndex !== 0) {
        const now = Date.now();
        if (reason === "interval" && now - lastPrimaryRetryMs >= PRIMARY_RETRY_INTERVAL_MS) {
          lastPrimaryRetryMs = now;
          addLog("Test retour serveur principal...");
          const primaryOk = await testServerForPath(0, sunshinePath);
          if (primaryOk) {
            addLog("Serveur principal de nouveau disponible.");
            return 0;
          }
          addLog("Serveur principal encore indisponible. Secours conservé.");
        }

        return currentServerIndex;
      }

      const primaryOk = await testServerForPath(0, sunshinePath);
      if (primaryOk) return 0;

      addLog("Serveur principal indisponible. Test serveur secours...");

      const backupOk = await testServerForPath(1, sunshinePath);
      if (backupOk) {
        addLog("Serveur secours disponible.");
        return 1;
      }

      if (bothServersRejected(sunshinePath)) {
        addLog("Les deux serveurs refusent ce chemin. Nouvelle URL JSON nécessaire.");
        requestFreshJsonAfterRejectedPath("deux serveurs refusés");
        return -1;
      }

      addLog("Aucun serveur valide détecté. Principal conservé par défaut.");
      return 0;
    }

    function getBufferedSeconds() {
      if (!videoPlayer.buffered || !videoPlayer.buffered.length) return 0;
      const currentTime = Number(videoPlayer.currentTime) || 0;

      for (let index = 0; index < videoPlayer.buffered.length; index += 1) {
        const start = videoPlayer.buffered.start(index);
        const end = videoPlayer.buffered.end(index);

        if (currentTime >= start && currentTime <= end) {
          return Math.max(0, end - currentTime);
        }
      }

      return 0;
    }

    function isIntervalReason(reason) {
      return String(reason || "").toLowerCase().includes("intervalle");
    }

    function isPlaybackReallyActive() {
      if (!hlsInstance || !currentSunshinePath) return false;
      if (videoPlayer.paused || videoPlayer.ended) return false;

      return (
        videoPlayer.readyState >= 2 ||
        getBufferedSeconds() > ACTIVE_REFRESH_SKIP_MIN_BUFFER_SECONDS ||
        videoPlayer.currentTime > 0
      );
    }

    function shouldSkipJsonRefresh(reason) {
      if (!isIntervalReason(reason)) return false;
      return isPlaybackReallyActive();
    }

    async function loadJsonAndMaybeSwitch(reason) {
      if (shouldSkipJsonRefresh(reason)) {
        const now = Date.now();
        setStatus("Lecture active : refresh JSON ignoré");

        if (now - lastSkippedActiveRefreshLogMs > ACTIVE_REFRESH_SKIP_LOG_INTERVAL_MS) {
          lastSkippedActiveRefreshLogMs = now;
          addLog("Refresh JSON ignoré : le flux joue réellement, aucune requête inutile.");
        }

        return;
      }

      if (isLoadingJson) return;

      const jsonUrl = normalizeUrl(jsonUrlInput.value || JSON_ENDPOINT);
      if (!jsonUrl) {
        setStatus("URL JSON vide");
        return;
      }

      isLoadingJson = true;
      setStatus("Recherche JSON...");
      addLog("Recherche JSON" + (reason ? " : " + reason : "") + ".");

      try {
        addLog("JSON appelé : " + jsonUrl);

        const response = await fetch(jsonUrl, {
          method: "GET",
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }

        const data = await response.json();

        if (jsonViewer) {
          jsonViewer.textContent = JSON.stringify(data, null, 2);
        }

        const rawM3u8 = findFirstM3u8Value(data);
        const newPath = extractSunshinePath(rawM3u8);

        if (!rawM3u8 || !newPath) {
          throw new Error("Aucune URL /sunshine/ .m3u8 trouvée dans le JSON");
        }

        if (
          newPath === currentSunshinePath &&
          hlsInstance &&
          isPlaybackReallyActive()
        ) {
          activePathBox.textContent = newPath;
          finalUrlBox.textContent = currentFinalUrl || buildDirectUrl(currentServerIndex, newPath);
          activeServerBox.textContent = STREAM_SERVERS[currentServerIndex].label;
          setStatus("Même /sunshine/ actif : lecture conservée");
          addLog("Même chemin /sunshine/ déjà actif : test serveur et remplacement ignorés.");
          return;
        }

        const selectedServerIndex = await chooseServerForPath(
          newPath,
          reason && reason.includes("intervalle") ? "interval" : reason
        );

        if (selectedServerIndex < 0) {
          setStatus("Chemin refusé par les serveurs, attente d'une nouvelle URL JSON");
          addLog("Remplacement annulé : chemin actuel refusé par tous les serveurs.");
          return;
        }

        const newFinalUrl = buildDirectUrl(selectedServerIndex, newPath);

        activePathBox.textContent = newPath;
        finalUrlBox.textContent = newFinalUrl;
        activeServerBox.textContent = STREAM_SERVERS[selectedServerIndex].label;

        if (
          newPath === currentSunshinePath &&
          selectedServerIndex === currentServerIndex &&
          hlsInstance
        ) {
          setStatus("Même /sunshine/ et même serveur : lecture conservée");
          addLog("Même chemin /sunshine/ : aucun remplacement.");
          return;
        }

        addLog(
          "Flux sélectionné : " +
          STREAM_SERVERS[selectedServerIndex].label +
          ". Remplacement du flux."
        );

        await playFinalUrl(newFinalUrl, newPath, selectedServerIndex);
      } catch (error) {
        setStatus("Erreur JSON : " + error.message);
        addLog("Erreur JSON : " + error.message);
      } finally {
        isLoadingJson = false;
      }
    }

    function resetVideoElement() {
      try {
        videoPlayer.pause();
        videoPlayer.removeAttribute("src");
        videoPlayer.load();
      } catch (error) {}
    }

    async function playFinalUrl(finalUrl, sunshinePath, serverIndex) {
      if (!finalUrl || !sunshinePath) return;

      showLoader("Connexion au flux...");
      setStatus("Connexion HLS...");
      hlsFatalErrorCount = 0;
      currentSunshinePath = sunshinePath;
      currentFinalUrl = finalUrl;
      currentServerIndex = serverIndex;
      activePathBox.textContent = sunshinePath;
      finalUrlBox.textContent = finalUrl;
      activeServerBox.textContent = STREAM_SERVERS[serverIndex].label;

      try {
        if (hlsInstance) {
          hlsInstance.destroy();
          hlsInstance = null;
        }

        resetVideoElement();

        if (window.Hls && Hls.isSupported()) {
          const hls = new Hls({
            enableWorker: true,
            lowLatencyMode: false,
            backBufferLength: 20,
            maxBufferLength: 25,
            maxMaxBufferLength: 45,
            manifestLoadingTimeOut: 12000,
            fragLoadingTimeOut: 25000,
            manifestLoadingMaxRetry: 1,
            fragLoadingMaxRetry: 2
          });

          hlsInstance = hls;

          hls.on(Hls.Events.MEDIA_ATTACHED, function () {
            addLog("Media attaché. Chargement direct : " + finalUrl);
            hls.loadSource(finalUrl);
          });

          hls.on(Hls.Events.MANIFEST_PARSED, function () {
            addLog("Manifest chargé. Lecture démarrée.");
            setStatus("Lecture active");
            videoPlayer.play().catch(function () {});
          });

          hls.on(Hls.Events.ERROR, function (event, data) {
            if (!data) return;

            if (data.details === "bufferStalledError") {
              addLog("Micro-buffer détecté.");
              return;
            }

            addLog("Erreur HLS : " + data.type + " / " + data.details);

            if (!data.fatal) return;

            hlsFatalErrorCount += 1;

            if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
              try {
                addLog("Récupération média HLS.");
                hls.recoverMediaError();
                return;
              } catch (error) {}
            }

            if (hlsFatalErrorCount >= MAX_FATAL_ERRORS_BEFORE_SERVER_SWITCH) {
              addLog("Erreur fatale. Bascule serveur ou nouveau JSON.");
              switchServerOrReloadJson("erreur HLS fatale");
            }
          });

          hls.attachMedia(videoPlayer);
          return;
        }

        if (videoPlayer.canPlayType("application/vnd.apple.mpegurl")) {
          videoPlayer.src = finalUrl;
          videoPlayer.play().catch(function () {});
          return;
        }

        throw new Error("HLS non supporté par ce navigateur");
      } catch (error) {
        setStatus("Erreur player : " + error.message);
        addLog("Erreur player : " + error.message);
      }
    }

    async function switchServerOrReloadJson(reason) {
      if (!currentSunshinePath) {
        loadJsonAndMaybeSwitch(reason);
        return;
      }

      const otherServerIndex = currentServerIndex === 0 ? 1 : 0;
      const otherOk = await testServerForPath(otherServerIndex, currentSunshinePath);

      if (otherOk) {
        addLog("Bascule vers " + STREAM_SERVERS[otherServerIndex].label + ".");
        await playFinalUrl(
          buildDirectUrl(otherServerIndex, currentSunshinePath),
          currentSunshinePath,
          otherServerIndex
        );
        return;
      }

      if (bothServersRejected(currentSunshinePath)) {
        addLog("Serveur alternatif aussi refusé. Boucle 403 stoppée.");
        requestFreshJsonAfterRejectedPath(reason);
        return;
      }

      addLog("Serveur alternatif indisponible. Recherche nouveau JSON.");
      currentSunshinePath = "";
      loadJsonAndMaybeSwitch(reason);
    }

    function startAutoRefresh() {
      stopAutoRefresh();

      const seconds = Number(refreshSecondsInput.value) || DEFAULT_REFRESH_SECONDS;
      refreshSecondsInput.value = seconds;

      addLog("Auto-refresh JSON activé : " + seconds + " s.");
      loadJsonAndMaybeSwitch("démarrage");

      refreshTimer = setInterval(function () {
        loadJsonAndMaybeSwitch("intervalle " + seconds + " s");
      }, seconds * 1000);
    }

    function stopAutoRefresh() {
      if (refreshTimer) {
        clearInterval(refreshTimer);
        refreshTimer = null;
      }
      addLog("Auto-refresh arrêté.");
    }

    async function copyCurrentUrl() {
      try {
        await navigator.clipboard.writeText(currentFinalUrl || finalUrlBox.textContent || "");
        setStatus("URL finale copiée");
      } catch (error) {
        setStatus("Copie impossible");
      }
    }

    async function copyLog(event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }

      const text = logBox.innerText.trim() || "Aucun log.";

      try {
        await navigator.clipboard.writeText(text);
        addLog("Log copié dans le presse-papiers.");
      } catch (error) {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();

        try {
          document.execCommand("copy");
          addLog("Log copié dans le presse-papiers.");
        } catch (fallbackError) {
          alert("Impossible de copier le log.");
        }

        document.body.removeChild(textarea);
      }
    }

    videoPlayer.addEventListener("playing", function () {
      hideLoader();
      setStatus("Lecture active");
      addLog("Lecture vidéo active.");
    });

    videoPlayer.addEventListener("waiting", function () {
      setStatus("Buffering...");
      addLog("Buffering détecté.");
    });

    videoPlayer.addEventListener("error", function () {
      addLog("Erreur vidéo native. Bascule serveur ou JSON.");
      switchServerOrReloadJson("erreur vidéo native");
    });

    window.addEventListener("load", function () {
      jsonUrlInput.value = JSON_ENDPOINT;
      showLoader("Initialisation...");
      startAutoRefresh();
    });
  </script>
</body>
</html>

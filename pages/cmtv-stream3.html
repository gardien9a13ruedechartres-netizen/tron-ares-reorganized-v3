<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>CMTV Simple Sunshine Player</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.16/dist/hls.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: #f9fafb;
    }
    #videoPlayer {
      width: 100vw;
      height: 100vh;
      object-fit: fill;
      background: #000;
      display: block;
    }
    #loader {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      background: #000;
      transition: opacity 0.25s ease, visibility 0.25s ease;
    }
    #loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .logo {
      width: 165px;
      max-width: 45vw;
      height: auto;
      animation: logoPulse 1.6s ease-in-out infinite;
      filter: drop-shadow(0 8px 26px rgba(0, 0, 0, 0.9));
    }
    .spinner {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: 5px solid rgba(255,255,255,0.16);
      border-top-color: #3b82f6;
      animation: spin 0.9s linear infinite;
    }
    #loaderText {
      font-size: 17px;
      font-weight: 700;
      color: #e5e7eb;
      text-align: center;
    }
    #panelToggle {
      position: fixed;
      top: 8px;
      right: 12px;
      z-index: 30;
      border: none;
      border-radius: 8px;
      padding: 9px 12px;
      color: rgba(255,255,255,0.6);
      background: rgba(15,23,42,0.45);
      cursor: pointer;
      font-weight: 800;
    }
    #panel {
      position: fixed;
      top: 52px;
      right: 12px;
      z-index: 25;
      width: 390px;
      max-width: calc(100vw - 24px);
      max-height: calc(100vh - 70px);
      overflow: auto;
      padding: 14px;
      border-radius: 12px;
      background: rgba(15,23,42,0.85);
      border: 1px solid rgba(148,163,184,0.35);
      backdrop-filter: blur(12px);
    }
    #panel.hidden { display: none; }
    label {
      display: block;
      margin: 10px 0 6px;
      color: #cbd5e1;
      font-size: 13px;
    }
    input {
      width: 100%;
      padding: 10px;
      border-radius: 7px;
      border: 1px solid #334155;
      background: #020617;
      color: #f8fafc;
    }
    button {
      margin: 10px 6px 0 0;
      padding: 10px 12px;
      border: 0;
      border-radius: 7px;
      cursor: pointer;
      font-weight: 800;
    }
    .blue { background: #3b82f6; color: #fff; }
    .green { background: #22c55e; color: #052e16; }
    .red { background: #ef4444; color: #fff; }
    .yellow { background: #f59e0b; color: #111827; }
    .box {
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      background: #020617;
      border: 1px solid #334155;
      font-size: 12px;
      line-height: 1.5;
      word-break: break-word;
    }
    #log {
      max-height: 180px;
      overflow: auto;
      color: #cbd5e1;
    }
    #jsonViewer {
      max-height: 260px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      color: #dbeafe;
    }
    #log div {
      padding: 4px 0;
      border-bottom: 1px solid rgba(148,163,184,0.18);
    }
    code { color: #93c5fd; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <video id="videoPlayer" controls autoplay playsinline></video>

  <div id="loader">
    <img class="logo" src="https://player-engine.com/media/cmtv.png" alt="CMTV" />
    <div class="spinner"></div>
    <div id="loaderText">Chargement du flux...</div>
  </div>

  <button id="panelToggle" onclick="togglePanel()">☰</button>

  <aside id="panel" class="hidden">
    <strong>CMTV Simple Player</strong>

    <label>URL JSON</label>
    <input id="jsonUrl" type="text" value="https://cm-tv-refresh.victor-salema-53d.workers.dev/" />

    <label>Intervalle refresh JSON en secondes</label>
    <input id="refreshSeconds" type="number" min="10" value="30" />
    <button class="copy" onclick="copyLog()">Copier le log</button>
    <button class="green" onclick="startAutoRefresh()">Démarrer</button>
    <button class="red" onclick="stopAutoRefresh()">Arrêter</button>
    <button class="blue" onclick="loadJsonAndMaybeSwitch('manuel')">Recharger JSON</button>
    <button class="yellow" onclick="copyCurrentUrl()">Copier URL finale</button>

    <div class="box">
      <div><strong>État :</strong> <span id="status">En attente</span></div>
      <div><strong>Chemin actif :</strong> <code id="activePath">Aucun</code></div>
      <div><strong>URL finale :</strong> <code id="finalUrl">Aucune</code></div>
    </div>

    <div class="box">
      <div><strong>JSON reçu :</strong></div>
      <pre id="jsonViewer">{}</pre>
    </div>

    <div id="log" class="box">
      <div>Aucun événement.</div>
    </div>
  </aside>

  <script>
    const JSON_ENDPOINT = "https://cm-tv-refresh.victor-salema-53d.workers.dev/";
    const FIXED_STREAM_ORIGIN = "https://qmaalhy7acgxwhm.ngolpdkyoctjcddxshli469r.org";
    const DEFAULT_REFRESH_SECONDS = 30;
    const MAX_ERROR_BEFORE_JSON_REFRESH = 3;

    let hlsInstance = null;
    let refreshTimer = null;
    let currentSunshinePath = "";
    let currentFinalUrl = "";
    let isLoadingJson = false;
    let hlsErrorCount = 0;

    const videoPlayer = document.getElementById("videoPlayer");
    const loader = document.getElementById("loader");
    const loaderText = document.getElementById("loaderText");
    const panel = document.getElementById("panel");
    const jsonUrlInput = document.getElementById("jsonUrl");
    const refreshSecondsInput = document.getElementById("refreshSeconds");
    const statusBox = document.getElementById("status");
    const activePathBox = document.getElementById("activePath");
    const finalUrlBox = document.getElementById("finalUrl");
    const jsonViewer = document.getElementById("jsonViewer");
    const logBox = document.getElementById("log");

    videoPlayer.muted = false;
    videoPlayer.volume = 1;

    function togglePanel() {
      panel.classList.toggle("hidden");
    }

    function setStatus(message) {
      statusBox.textContent = message;
    }

    function showLoader(message) {
      loaderText.textContent = message || "Chargement du flux...";
      loader.classList.remove("hidden");
    }

    function hideLoader() {
      loader.classList.add("hidden");
    }

    function addLog(message) {
      if (logBox.textContent.trim() === "Aucun événement.") {
        logBox.innerHTML = "";
      }

      const line = document.createElement("div");
      line.textContent = "[" + new Date().toLocaleTimeString("fr-FR") + "] " + message;
      logBox.prepend(line);

      while (logBox.children.length > 60) {
        logBox.removeChild(logBox.lastChild);
      }
    }

    function normalizeUrl(value) {
      let text = String(value || "").trim();
      if (!text) return "";
      if (text.startsWith("//")) text = "https:" + text;
      if (text.startsWith("/")) text = "https://livewatch.top" + text;
      return text;
    }

    function safeDecode(value) {
      let output = String(value || "");

      for (let index = 0; index < 8; index += 1) {
        try {
          const decoded = decodeURIComponent(output);
          if (decoded === output) return output;
          output = decoded;
        } catch (error) {
          return output;
        }
      }

      return output;
    }

    function extractSunshinePath(value) {
      let text = String(value || "").trim();
      if (!text) return "";

      for (let index = 0; index < 10; index += 1) {
        text = safeDecode(text);

        const sunshineIndex = text.indexOf("/sunshine/");
        if (sunshineIndex !== -1) {
          return text.slice(sunshineIndex);
        }

        try {
          const parsed = new URL(normalizeUrl(text));
          const nested = parsed.searchParams.get("url");
          if (nested) {
            text = nested;
            continue;
          }
        } catch (error) {}

        break;
      }

      return "";
    }

    function buildFinalSunshineUrl(value) {
      const path = extractSunshinePath(value);
      if (!path) return "";
      return FIXED_STREAM_ORIGIN + path;
    }

    function findFirstM3u8Value(data) {
      const priorityKeys = [
        "streamUrl",
        "hlsUrl",
        "hls_url",
        "m3u8",
        "url",
        "stream",
        "source",
        "src",
        "link"
      ];

      function scanPriority(node) {
        if (!node || typeof node !== "object") return "";

        for (const key of priorityKeys) {
          if (Object.prototype.hasOwnProperty.call(node, key)) {
            const value = node[key];
            if (typeof value === "string" && value.includes(".m3u8")) return value;
            if (Array.isArray(value) || (value && typeof value === "object")) {
              const found = scanPriority(value);
              if (found) return found;
            }
          }
        }

        if (Array.isArray(node)) {
          for (const item of node) {
            const found = scanPriority(item);
            if (found) return found;
          }
        }

        return "";
      }

      function scanAny(node) {
        if (typeof node === "string") {
          return node.includes(".m3u8") ? node : "";
        }

        if (Array.isArray(node)) {
          for (const item of node) {
            const found = scanAny(item);
            if (found) return found;
          }
          return "";
        }

        if (node && typeof node === "object") {
          for (const value of Object.values(node)) {
            const found = scanAny(value);
            if (found) return found;
          }
        }

        return "";
      }

      return scanPriority(data) || scanAny(data);
    }

    async function loadJsonAndMaybeSwitch(reason) {
      if (isLoadingJson) return;

      const jsonUrl = normalizeUrl(jsonUrlInput.value || JSON_ENDPOINT);
      if (!jsonUrl) {
        setStatus("URL JSON vide");
        return;
      }

      isLoadingJson = true;
      setStatus("Recherche JSON...");
      addLog("Recherche JSON" + (reason ? " : " + reason : "") + ".");

      try {
      addLog("JSON appelé : https://cm-tv-refresh.victor-salema-53d.workers.dev/");   
      const response = await fetch(jsonUrl, {
          method: "GET",
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }

        const data = await response.json();

        if (jsonViewer) {
          jsonViewer.textContent = JSON.stringify(data, null, 2);
        }

        const rawM3u8 = findFirstM3u8Value(data);
        const newPath = extractSunshinePath(rawM3u8);
        const newFinalUrl = FIXED_STREAM_ORIGIN + newPath;

        if (!rawM3u8 || !newPath) {
          throw new Error("Aucune URL /sunshine/ .m3u8 trouvée dans le JSON");
        }

        activePathBox.textContent = newPath;
        finalUrlBox.textContent = newFinalUrl;

        if (newPath === currentSunshinePath && hlsInstance) {
          setStatus("Même /sunshine/ : lecture conservée");
          addLog("Même chemin /sunshine/ : aucun remplacement.");
          return;
        }

        addLog("Nouveau chemin /sunshine/ détecté. Remplacement du flux.");
        await playFinalUrl(newFinalUrl, newPath);
      } catch (error) {
        setStatus("Erreur JSON : " + error.message);
        addLog("Erreur JSON : " + error.message);
      } finally {
        isLoadingJson = false;
      }
    }

    function resetVideoElement() {
      try {
        videoPlayer.pause();
        videoPlayer.removeAttribute("src");
        videoPlayer.load();
      } catch (error) {}
    }

    async function playFinalUrl(finalUrl, sunshinePath) {
      if (!finalUrl || !sunshinePath) return;

      showLoader("Connexion au flux...");
      setStatus("Connexion HLS...");
      hlsErrorCount = 0;
      currentSunshinePath = sunshinePath;
      currentFinalUrl = finalUrl;
      activePathBox.textContent = sunshinePath;
      finalUrlBox.textContent = finalUrl;

      try {
        if (hlsInstance) {
          hlsInstance.destroy();
          hlsInstance = null;
        }

        resetVideoElement();

        if (window.Hls && Hls.isSupported()) {
          const hls = new Hls({
            enableWorker: true,
            lowLatencyMode: false,
            backBufferLength: 20,
            maxBufferLength: 25,
            maxMaxBufferLength: 45,
            manifestLoadingTimeOut: 12000,
            fragLoadingTimeOut: 25000,
            manifestLoadingMaxRetry: 2,
            fragLoadingMaxRetry: 3
          });

          hlsInstance = hls;

          hls.on(Hls.Events.MEDIA_ATTACHED, function () {
            addLog("Media attaché. Chargement direct : " + finalUrl);
            hls.loadSource(finalUrl);
          });

          hls.on(Hls.Events.MANIFEST_PARSED, function () {
            addLog("Manifest chargé. Lecture démarrée.");
            setStatus("Lecture active");
            videoPlayer.play().catch(function () {});
          });

          hls.on(Hls.Events.ERROR, function (event, data) {
            if (!data) return;

            if (data.details === "bufferStalledError") {
              addLog("Micro-buffer détecté.");
              return;
            }

            addLog("Erreur HLS : " + data.type + " / " + data.details);

            if (!data.fatal) return;

            hlsErrorCount += 1;

            if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
              try {
                addLog("Récupération média HLS.");
                hls.recoverMediaError();
                return;
              } catch (error) {}
            }

            if (hlsErrorCount >= MAX_ERROR_BEFORE_JSON_REFRESH) {
              addLog("Erreurs fatales répétées. Recherche d'une nouvelle URL JSON.");
              currentSunshinePath = "";
              loadJsonAndMaybeSwitch("erreurs HLS répétées");
              return;
            }

            addLog("Reload direct du même flux après erreur fatale.");
            playFinalUrl(currentFinalUrl, currentSunshinePath);
          });

          hls.attachMedia(videoPlayer);
          return;
        }

        if (videoPlayer.canPlayType("application/vnd.apple.mpegurl")) {
          videoPlayer.src = finalUrl;
          videoPlayer.play().catch(function () {});
          return;
        }

        throw new Error("HLS non supporté par ce navigateur");
      } catch (error) {
        setStatus("Erreur player : " + error.message);
        addLog("Erreur player : " + error.message);
      }
    }

    function startAutoRefresh() {
      stopAutoRefresh();

      const seconds = Number(refreshSecondsInput.value) || DEFAULT_REFRESH_SECONDS;
      refreshSecondsInput.value = seconds;

      addLog("Auto-refresh JSON activé : " + seconds + " s.");
      loadJsonAndMaybeSwitch("démarrage");

      refreshTimer = setInterval(function () {
        loadJsonAndMaybeSwitch("intervalle " + seconds + " s");
      }, seconds * 1000);
    }

    function stopAutoRefresh() {
      if (refreshTimer) {
        clearInterval(refreshTimer);
        refreshTimer = null;
      }
      addLog("Auto-refresh arrêté.");
    }

    async function copyCurrentUrl() {
      try {
        await navigator.clipboard.writeText(currentFinalUrl || finalUrlBox.textContent || "");
        setStatus("URL finale copiée");
      } catch (error) {
        setStatus("Copie impossible");
      }
    }

    videoPlayer.addEventListener("playing", function () {
      hideLoader();
      setStatus("Lecture active");
      addLog("Lecture vidéo active.");
    });

    videoPlayer.addEventListener("waiting", function () {
      setStatus("Buffering...");
      addLog("Buffering détecté.");
    });

    videoPlayer.addEventListener("error", function () {
      addLog("Erreur vidéo native. Contrôle JSON.");
      currentSunshinePath = "";
      loadJsonAndMaybeSwitch("erreur vidéo native");
    });

    window.addEventListener("load", function () {
      jsonUrlInput.value = JSON_ENDPOINT;
      showLoader("Initialisation...");
      startAutoRefresh();
    });
  async function copyLog() {
  const logBox = document.getElementById("logBox") || document.getElementById("monitorLog");

  if (!logBox) {
    alert("Log introuvable.");
    return;
  }

  const text = Array.from(logBox.children)
    .map(function (line) {
      return line.textContent;
    })
    .join("\n");

  try {
    await navigator.clipboard.writeText(text || "Aucun log.");
    addLog("Log copié dans le presse-papiers.");
  } catch (error) {
    alert("Impossible de copier le log : " + error.message);
  }
}

</script>
</body>
</html>

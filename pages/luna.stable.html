<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Luna Radio Player — Luna visualizer</title>

  <style>
    :root{
      /* THEME VARS (modifiées en JS) */
      --accent:#85c5cc;
      
      --vinyl-base: rgb(0,0,0);
      --vinyl-sheen-1: rgb(47,47,47);
      --vinyl-sheen-2: rgb(74,74,74);
      --vinyl-sheen-glow: rgba(255,255,255,.16);
--page-base:#05070a;
      --page-bg-1:#0b2a33;
      --page-bg-2:#1a1430;
      --player-bg: rgba(0,0,0,.18);
      --border: rgba(255,255,255,.16);

      /* ✅ couleur pictos */
      --icon: rgba(255,255,255,.92);

      --text:#ffffff;
      --muted:rgba(255,255,255,.65);
    }

    *{ box-sizing:border-box }

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);

      background:
        radial-gradient(1200px circle at 20% 12%, color-mix(in srgb, var(--page-bg-1) 78%, transparent) 0%, rgba(0,0,0,0) 58%),
        radial-gradient(1000px circle at 86% 88%, color-mix(in srgb, var(--page-bg-2) 78%, transparent) 0%, rgba(0,0,0,0) 60%),
        var(--page-base);
    }

    .player{
      width:min(1100px, 100%);
      height:min(590px, 86vh);
      border:2px solid var(--border);
      border-radius:22px;
      overflow:hidden;
      position:relative;
      background: var(--player-bg);
      box-shadow: 0 20px 60px rgba(0,0,0,.45);
    }

    .bg{
      position:absolute; inset:0;
      filter: blur(18px);
      transform: scale(1.06);
      opacity:.28;
      pointer-events:none;
    }
    .bgA,.bgB{
      position:absolute; inset:0;
      background-size:cover;
      background-position:center;
      transition: opacity 1s ease;
    }
    .bgB{ opacity:0; }

    #viz{
      position:absolute; inset:0;
      opacity:.55;
      pointer-events:none;
    }

    .ui{
      position: relative;
      z-index: 3;

      position:absolute; inset:0;
      display:grid;
      grid-template-columns: 1fr 1.1fr;
      padding:22px;
      gap:18px;
    }

    .left{
      display:grid;
      place-items:center;
      min-width:0;
    }

    .disk-wrap{
      width:min(420px, 86%);
      aspect-ratio:1/1;
      border-radius:50%;
      background: transparent;
      box-shadow: 0 16px 60px rgba(0,0,0,.35);
      position:relative;
      display:grid;
      place-items:center;
      isolation:isolate;
    }

    .disk{
      width:92%;
      height:92%;
      border-radius:50%;
      background-size:cover;
      background-position:center;
      position:relative;
      overflow:hidden;
      will-change: transform;
      z-index:1;
    }
    .disk::after{
      content:"";
      position:absolute; inset:-2px;
      border-radius:50%;
      background:         /* top sheen (adds realism) */
        radial-gradient(ellipse 140% 75% at 50% 0%,
          rgba(255,255,255,.16) 0%,
          rgba(255,255,255,.06) 22%,
          rgba(255,255,255,0) 58%),

radial-gradient(circle at 30% 20%, rgba(255,255,255,.32), transparent 55%);
      opacity:.68;
      mix-blend-mode: overlay;
      pointer-events:none;
    }

    .disk::before{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      width:18%;
      height:18%;
      transform:translate(-50%,-50%);
      border-radius:50%;
      background:
        radial-gradient(circle at 35% 35%,
          rgba(255,255,255,.22) 0%,
          rgba(255,255,255,0) 35%
        ),
        radial-gradient(circle at 50% 50%,
          rgba(0,0,0,.95) 0%,
          rgba(0,0,0,.95) 52%,
          rgba(255,255,255,.14) 56%,
          rgba(255,255,255,0) 70%
        );
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,.10),
        inset 0 10px 18px rgba(0,0,0,.55),
        0 10px 18px rgba(0,0,0,.45);
      pointer-events:none;
    }

    /* ===========================
       ✅ NEW: Bras (gauche) responsive, propre, sans débordement
       =========================== */
    .tonearm-layer{
      position:absolute;
      inset:0;
      border-radius:50%;
      pointer-events:none;
      z-index: 4; /* sous arc volume */
      filter: drop-shadow(0 18px 26px rgba(0,0,0,.40));
    }

    /* rotor carré, scalable, pivot fixe en % dans le viewBox */
    .tonearm-rotor{
  position:absolute;
  width:82%;
  aspect-ratio:1/1;

  /* ✅ position console trouvée */
  left:-20%;
  top:-11%;

  transform-origin: 18.75% 18.75%;
  transform: rotate(var(--arm-rot, 40deg));
  will-change: transform;
  pointer-events:none;
}

.tonearm-rotor svg{
      width:100%;
      height:100%;
      display:block;
    }

    /* diamant */
    .stylus-dot{
      position:absolute;
      left: 63.38%;
      top: 56.31%;
      width:14px;
      height:14px;
      border-radius:6px;
      background: color-mix(in srgb, var(--accent) 55%, rgba(0,0,0,.30));
      border:1px solid rgba(255,255,255,.18);
      box-shadow: 0 0 22px color-mix(in srgb, var(--accent) 22%, transparent);
      transform: translate(-50%,-50%) translateY(-7px);
      transition: transform .42s cubic-bezier(.2,.9,.2,1);
    }
    .stylus-dot::after{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      width:4px;height:4px;
      transform:translate(-50%,-50%);
      border-radius:999px;
      background: rgba(255,255,255,.75);
      opacity:.85;
    }

    .tonearm-layer.down .stylus-dot{
      transform: translate(-50%,-50%) translateY(0);
    }

    @keyframes tonearmMicro {
      0%,100%{ transform: rotate(var(--arm-rot, 40deg)) translateY(0); }
      50%{ transform: rotate(var(--arm-rot, 40deg)) translateY(.55px); }
    }
    .tonearm-layer.down .tonearm-rotor{
      animation: tonearmMicro 1.1s ease-in-out infinite;
    }
    /* =========================== */

    .vol-arc-layer{
      position:absolute;
      inset:-18px;
      border-radius:50%;
      pointer-events:none;
      z-index: 3;
    }
    #volArc{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      display:block;
      background:none;
    }
    #volArcGrab{
      position:absolute;
      inset:0;
      border-radius:50%;
      pointer-events:auto;
      touch-action:none;
      cursor:pointer;
      background: transparent;
    }

    .vol-label{
      position:absolute;
      top:56%;
      width:34px;
      height:34px;
      line-height:34px;
      text-align:center;
      font-size:13px;
      color: rgba(255,255,255,.92);
      user-select:none;
      pointer-events:none;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
      font-variant-numeric: tabular-nums;
      z-index: 4;
    }
    .vol-label.left{ left: 3.5%; transform: translate(-50%,-50%); }
    .vol-label.right{ right: 3.5%; transform: translate(50%,-50%); }

    #volBadge{
      letter-spacing: .2px;
      background: rgba(0,0,0,.26);
      border-color: color-mix(in srgb, var(--accent) 35%, rgba(255,255,255,.12));
    }

    .right{
      min-width:0;
      display:grid;
      grid-template-rows: auto auto 1fr auto;
      gap:12px;
    }

    .iconbtn{
      width:40px;height:40px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color:var(--icon);
      display:grid;
      place-items:center;
      cursor:pointer;
      user-select:none;
      transition: transform .12s ease, background .2s ease, border-color .2s ease;
    }
    .iconbtn:hover{ background: rgba(255,255,255,.10); border-color: rgba(255,255,255,.22); }
    .iconbtn:active{ transform: scale(.98); }
    .iconbtn[aria-pressed="true"]{ border-color: color-mix(in srgb, var(--accent) 55%, rgba(255,255,255,.12)); }
    .iconbtn svg{ width:22px; height:22px; display:block; fill: currentColor; }
    .iconbtn img.radioIcon{ width:24px; height:24px; display:block; object-fit:contain; }

    .drawer-btn{
      position:absolute;
      top:16px;
      left:16px;
      z-index:6;
    }

    .topbar{
      position: relative;
      z-index: 4;

      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:10px;
      flex-wrap:wrap;
    }

    .theme-dots{
      display:flex;
      gap:8px;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.16);
    }
    .theme-dot{
      width:14px;
      height:14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      cursor:pointer;
      outline:none;
      position:relative;
    }
    .theme-dot.active{
      border-color: rgba(255,255,255,.35);
      box-shadow: 0 0 0 6px color-mix(in srgb, var(--accent) 18%, transparent);
    }

    .titleRow{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }
    #stationLogo{
      width:30px;
      height:30px;
      border-radius:999px;
      object-fit:contain;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.14);
      box-shadow: 0 0 0 6px color-mix(in srgb, var(--accent) 14%, transparent);
      flex:0 0 auto;
      display:none;
    }

    .title{
      font-size:28px;
      line-height:1.15;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      min-width:0;
      flex:1 1 auto;
    }
    .artist{
      color:var(--muted);
      font-size:14px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      margin-top:4px;
    }

    .controls{
      display:flex;
      align-items:center;
      gap:14px;
      margin-top:8px;
      flex-wrap:wrap;
    }

    .big{
      width:74px;height:74px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.07);
      color: var(--icon);
      display:grid;
      place-items:center;
      cursor:pointer;
      user-select:none;
      transition: transform .12s ease, background .2s ease, border-color .2s ease;
    }
    .big:hover{ background: rgba(255,255,255,.11); border-color: rgba(255,255,255,.22); }
    .big:active{ transform: scale(.98); }

    .small{
      width:48px;height:48px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color: var(--icon);
      display:grid;
      place-items:center;
      cursor:pointer;
      user-select:none;
      transition: transform .12s ease, background .2s ease, border-color .2s ease, opacity .2s ease, box-shadow .2s ease;
      font-size:18px;
      line-height:1;
    }
    .small:hover{ background: rgba(255,255,255,.10); border-color: rgba(255,255,255,.22); }
    .small:active{ transform: scale(.98); }
    .small[aria-pressed="true"]{
      border-color: color-mix(in srgb, var(--accent) 55%, rgba(255,255,255,.12));
      box-shadow: 0 0 0 6px color-mix(in srgb, var(--accent) 12%, transparent);
      opacity:1;
    }
    .small[aria-pressed="false"]{ opacity:.72; }
    .small svg{ width:22px; height:22px; display:block; fill: currentColor; }

    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-top:10px;
      flex-wrap:wrap;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.18);
      font-size:12px;
      color:rgba(255,255,255,.85);
      user-select:none;
    }
    .dot{
      width:8px;height:8px;border-radius:50%;
      background: var(--accent);
      box-shadow: 0 0 0 6px color-mix(in srgb, var(--accent) 18%, transparent);
    }

    .scrub-area{
      width:100%;
      padding: 40px 12px;
      border-radius:14px;
      background: transparent;
    }
    #lunaaudioscrubwrapper{
      position: relative;
      user-select:none;
      width: 100%;
      height: 18.67px;
      max-width: 520px;
      margin-left:auto;
      margin-right:auto;
    }
    #lunaaudioscrubbackground,
    #lunaaudioscrubbackgroundloaded,
    #lunaaudioscrubfill{
      position:absolute;
      width:100%;
      height:4.6675px;
      top:7.00125px;
      border-radius:4.6675px;
    }
    #lunaaudioscrubbackground{
      background: rgba(255,255,255,0.22);
      box-shadow:
        0 0 0 6px rgba(255,255,255,.08),
        0 0 0 1px rgba(255,255,255,.18) inset;
    }
    #lunaaudioscrubbackgroundloaded{
      background: rgba(255,255,255,0.35);
      width:0%;
    }
    #lunaaudioscrubfill{
      background: var(--accent);
      width:0%;
      box-shadow: 0 0 22px color-mix(in srgb, var(--accent) 25%, transparent);
    }
    #lunaaudioscrubicon{
      position:absolute;
      top:0px;
      border-radius:50%;
      background: var(--accent);
      height:18.67px;
      width:18.67px;
      left:-9.33335px;
      box-shadow: 0 0 26px color-mix(in srgb, var(--accent) 28%, transparent);
      border:2px solid rgba(255,255,255,.18);
      pointer-events:none;
    }
    #lunaaudioscrubicon::after{
      content:"";
      position:absolute;
      top:22%;
      left:22%;
      width:32%;
      height:32%;
      border-radius:50%;
      background: rgba(255,255,255,.55);
    }

    #lunaaudiotextscrubtimestart,
    #lunaaudiotextscrubtimeend{
      position:absolute;
      top:-18.67px;
      height:18.67px;
      font-family: Roboto, system-ui, -apple-system, Segoe UI, Arial, sans-serif;
      color: rgb(255,255,255);
      font-size: 9.335px;
      line-height: 18.67px;
      width: 50%;
      pointer-events:none;
      font-variant-numeric: tabular-nums;
    }
    #lunaaudiotextscrubtimestart{ left:0; text-align:left; }
    #lunaaudiotextscrubtimeend{ right:0; text-align:right; }

    #lunaaudioscrubgrab{
      position:absolute;
      top:0; left:0;
      height:100%;
      width:100%;
      padding:0;
      margin:0;
      touch-action:none;
      user-select:none;
      background: transparent;
      opacity:0;
      border-radius: 12px;
      cursor:pointer;
    }

    #lunaaudioscrubwrapper.is-live #lunaaudioscrubicon{ display:none; }
    #lunaaudioscrubwrapper.is-live #lunaaudioscrubfill{ width:0% !important; }
    #lunaaudioscrubwrapper.is-live #lunaaudioscrubbackgroundloaded{ width:100% !important; opacity:.20; }

    .drawer{
      position:absolute;
      inset:0;
      background: rgba(0,0,0,.45);
      backdrop-filter: blur(6px);
      transform: translateY(100%);
      transition: transform .35s ease;
      display:grid;
      grid-template-rows: 70px 1fr;
      z-index:7;
    }
    .drawer.open{ transform: translateY(0); }

    .drawer-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:16px 18px;
      border-bottom:1px solid rgba(255,255,255,.12);
    }
    .drawer-title{ font-size:18px; }
    .drawer-body{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:14px;
  padding: 10px 12px 14px;
  min-height: 0;
  overflow: hidden;
}
.drawer-col{
  min-height:0;
  display:flex;
  flex-direction:column;
  border:1px solid rgba(255,255,255,.10);
  border-radius:16px;
  overflow:hidden;
  background: rgba(0,0,0,.18);
}
.drawer-col .list{
  flex:1;
  padding: 10px 10px 14px;
}
.drawer-col.right{
  border-color: rgba(255,255,255,.12);
}
.drawer-section-title{
  padding: 10px 12px;
  font-size: 12px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: rgba(255,255,255,.78);
  border-bottom: 1px solid rgba(255,255,255,.10);
  background: rgba(255,255,255,.04);
}
.drawer-col .drawer-media{
  padding: 12px;
  border-bottom: 1px solid rgba(255,255,255,.10);
}

@media (max-width: 760px){
  .drawer-body{ grid-template-columns: 1fr; }
}
.list{ overflow:auto; padding:14px 10px 18px; }
    .item{
      display:grid;
      grid-template-columns: 64px minmax(0,1fr) auto;
      gap:12px;
      align-items:center;
      padding:10px 12px;
      border-radius:14px;
      cursor:pointer;
      user-select:none;
      border:1px solid transparent;
      transition: background .2s ease, border-color .2s ease;
    }
    .item:hover{ background: rgba(255,255,255,.06); border-color: rgba(255,255,255,.10); }
    .item.active{
      background: color-mix(in srgb, var(--accent) 14%, transparent);
      border-color: color-mix(in srgb, var(--accent) 35%, rgba(255,255,255,.10));
    }
    .thumb{
      width:56px;height:56px;
      border-radius:50%;
      background-size:cover;
      background-position:center;
      box-shadow: 0 0 0 1px rgba(255,255,255,.10) inset;
      overflow:hidden;
    }
    .meta .n{ font-size:16px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .meta .s{ font-size:12px; color:rgba(255,255,255,.7); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .pill{
      font-size:12px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.85);
    }

    .status{
      position:absolute;
      left:16px;
      bottom:16px;
      padding:10px 12px;
      border-radius:14px;
      background: rgba(0,0,0,.32);
      border:1px solid rgba(255,255,255,.14);
      color: rgba(255,255,255,.88);
      font-size:12px;
      max-width:min(560px, calc(100% - 32px));
      display:none;
      z-index:6;
    }
    .status.show{ display:block; }

    @media (max-width: 900px){
      .player{ height: 740px; }
      .ui{ grid-template-columns:1fr; grid-template-rows: 1fr 1fr; }
      #lunaaudioscrubwrapper{ max-width: 92%; }
      .theme-dots{ width:100%; justify-content:center; }

            /* bras un peu plus visible en mobile */
      .tonearm-rotor{
        width:86%;
        left:-9%;
        top:-10%;
      }
    }

    html[data-theme="tron_dual"]{
      --text:#e0f7ff;
      --muted: rgba(127,159,179,.86);
      --tron-amber:#ff9100;
      --tron-amber-soft: rgba(255,145,0,.12);
      --neon-cyan: rgba(0,229,255,.70);
      --neon-cyan-soft: rgba(0,229,255,.26);
    }

    html[data-theme="tron_dual"] body{
      /* fond plus "Tron" (halo cyan + petite touche ambre) */
      background:
        radial-gradient(1200px 700px at 18% 14%, rgba(0,229,255,.18), rgba(0,0,0,0) 58%),
        radial-gradient(1100px 700px at 84% 82%, rgba(255,145,0,.11), rgba(0,0,0,0) 60%),
        radial-gradient(900px 900px at 50% 40%, rgba(0,120,160,.10), rgba(0,0,0,0) 65%),
        linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,.85)),
        var(--page-base);
    }

    html[data-theme="tron_dual"] body::before{
      /* grille + "haze" lumineux */
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
        linear-gradient(to right, rgba(0,229,255,.045) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0,229,255,.030) 1px, transparent 1px),
        radial-gradient(900px 600px at 50% 30%, rgba(0,229,255,.10), transparent 60%);
      background-size: 70px 70px, 70px 70px, auto;
      mix-blend-mode: screen;
      opacity:.62;
      transform: translateZ(0);
      filter: saturate(1.05);
    }

    html[data-theme="tron_dual"] body::after{
      /* scanlines animées */
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(to bottom, rgba(255,255,255,.03), rgba(0,0,0,0));
      background-size: 100% 3px;
      opacity:.22;
      animation: lunaTronScan 6s linear infinite;
    }

    @keyframes lunaTronScan{
      0% { background-position-y: -42px; }
      100% { background-position-y: 100%; }
    }

    /* ===========================
       VINYL GROOVES + CENTER COVER
       (keeps playlist cover visible)
       =========================== */

    .disk{
      /* base "black vinyl" look (independent from cover) */
      background:
        radial-gradient(circle at 28% 26%, rgba(255,255,255,.10), rgba(255,255,255,0) 34%),
        radial-gradient(circle at 74% 78%, rgba(0,0,0,.42), rgba(0,0,0,0) 56%),
        radial-gradient(circle at 50% 50%, rgba(0,0,0,.18), rgba(0,0,0,.82) 78%, rgba(0,0,0,.92) 100%);
      background-color: #0b0f14;
    }

    .disk::after{
      /* add fine vinyl grooves + keep existing overlay feel */
      background:
        repeating-radial-gradient(circle at 50% 50%,
          rgba(255,255,255,.11) 0px,
          rgba(255,255,255,.11) 1px,
          rgba(0,0,0,0) 1px,
          rgba(0,0,0,0) 6px),
        radial-gradient(circle at 30% 28%, rgba(255,255,255,.18), rgba(255,255,255,0) 42%),
        radial-gradient(circle at 68% 72%, rgba(0,0,0,.22), rgba(0,0,0,0) 55%);
      opacity: .38;
      mix-blend-mode: overlay;
    }

    .disk-cover{
position:absolute;
      left:50%;
      top:50%;
      width:42%;
      height:42%;
      transform:translate(-50%,-50%);
      border-radius:50%;
      background-image: var(--cover-img);
background-size: cover;
      background-position:center;
            filter: saturate(.98) contrast(1.03);
box-shadow:
        0 10px 22px rgba(0,0,0,.55),
        0 0 0 1px rgba(255,255,255,.14) inset;
      overflow:hidden;
      z-index: 2;
      pointer-events:none;
    }

    /* subtle label gloss + vignette */
            .disk-cover::before{
      content:"";
      position:absolute; inset:-2px;

      /* stronger "printed paper" texture: fibers + mottling + gentle gloss */
      background:
        radial-gradient(circle at 18% 22%, rgba(255,255,255,.18), rgba(255,255,255,0) 42%),
        radial-gradient(circle at 70% 78%, rgba(0,0,0,.16), rgba(0,0,0,0) 55%),

        repeating-linear-gradient(-18deg,
          rgba(255,255,255,.10) 0px,
          rgba(255,255,255,.10) 1px,
          rgba(0,0,0,0) 1px,
          rgba(0,0,0,0) 4px),
        repeating-linear-gradient(62deg,
          rgba(0,0,0,.07) 0px,
          rgba(0,0,0,.07) 1px,
          rgba(0,0,0,0) 1px,
          rgba(0,0,0,0) 5px),

        /* faint print/ink grain */
        radial-gradient(circle at 50% 50%,
          rgba(255,255,255,.10) 0%,
          rgba(255,255,255,0) 38%,
          rgba(0,0,0,.10) 62%,
          rgba(0,0,0,0) 85%);

      opacity:.58;
      mix-blend-mode: soft-light;
      pointer-events:none;
    }

    /* center hole */
        .disk-cover::after{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      width:9.5%;
      height:9.5%;
      transform:translate(-50%,-50%);
      border-radius:50%;

      /* high-contrast "spindle" / center hole look (works on dark & light covers) */
      background:
        radial-gradient(circle at 35% 35%,
          rgba(255,255,255,.85) 0%,
          rgba(255,255,255,.22) 32%,
          rgba(0,0,0,.38) 58%,
          rgba(0,0,0,.78) 100%);

      /* dual ring: dark outer + light inner */
      box-shadow:
        0 0 0 2px rgba(0,0,0,.62),
        0 0 0 1px rgba(255,255,255,.32) inset,
        0 1px 3px rgba(0,0,0,.55);

      opacity: .98;
      pointer-events:none;
    }

    /* Make the main disk axis/spindle always visible (even over bright/dark covers) */
    .disk::before{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      width:9.5%;
      height:9.5%;
      transform:translate(-50%,-50%);
      border-radius:50%;

      background:
        radial-gradient(circle at 35% 35%,
          rgba(255,255,255,.85) 0%,
          rgba(255,255,255,.22) 32%,
          rgba(0,0,0,.38) 58%,
          rgba(0,0,0,.78) 100%);

      box-shadow:
        0 0 0 2px rgba(0,0,0,.62),
        0 0 0 1px rgba(255,255,255,.32) inset,
        0 1px 3px rgba(0,0,0,.55);

      opacity:.98;
      z-index: 5;           /* above .disk-cover (z-index:2) */
      pointer-events:none;
    }

        /* ===========================
       VINYL "CodePen MonaAghili" style — more opaque / realistic
       (deeper black, tighter grooves, less see-through)
       =========================== */
    .disk{
      /* solid vinyl base with gentle sheen */
      background:
        radial-gradient(circle at 50% 55%, rgba(0,0,0,.05), rgba(0,0,0,.78) 70%, rgba(0,0,0,.92) 100%),
        linear-gradient(-45deg, #2f2f2f, #000, #4a4a4a, #000, #2f2f2f);
      background-color:#000;
    }

    .disk::after{
      /* grooves: subtle lines but with higher overall opacity (more "material") */
      background:
        /* fine bright micro-lines */
        repeating-radial-gradient(circle at 50% 50%,
          rgba(255,255,255,.030) 0px,
          rgba(255,255,255,.030) 1px,
          rgba(0,0,0,0) 1px,
          rgba(0,0,0,0) 8px),

        /* darker groove bands (adds depth without transparency) */
        repeating-radial-gradient(circle at 50% 50%,
          rgba(0,0,0,.10) 0px,
          rgba(0,0,0,.10) 2px,
          rgba(0,0,0,0) 2px,
          rgba(0,0,0,0) 14px),

        /* soft lighting */
        radial-gradient(circle at 30% 28%, rgba(255,255,255,.14), rgba(255,255,255,0) 44%),
        radial-gradient(circle at 70% 78%, rgba(0,0,0,.34), rgba(0,0,0,0) 58%);

      opacity: .62;           /* less transparent than before */
      mix-blend-mode: normal; /* predictable */
      pointer-events:none;
    }

    /* ===========================
       THEME-DRIVEN VINYL TINT
       (vinyl black subtly follows theme accent)
       =========================== */
    .disk{
      background:
        radial-gradient(circle at 50% 55%, rgba(0,0,0,.05), rgba(0,0,0,.78) 70%, rgba(0,0,0,.92) 100%),
        linear-gradient(-45deg,
          var(--vinyl-sheen-1),
          var(--vinyl-base),
          var(--vinyl-sheen-2),
          var(--vinyl-base),
          var(--vinyl-sheen-1));
      background-color: var(--vinyl-base);
    }

    .disk::after{
      /* top sheen uses theme-tinted highlight */
      background:
        radial-gradient(ellipse 140% 75% at 50% 0%,
          var(--vinyl-sheen-glow) 0%,
          rgba(255,255,255,.06) 22%,
          rgba(255,255,255,0) 58%),

        repeating-radial-gradient(circle at 50% 50%,
          rgba(255,255,255,.030) 0px,
          rgba(255,255,255,.030) 1px,
          rgba(0,0,0,0) 1px,
          rgba(0,0,0,0) 8px),

        repeating-radial-gradient(circle at 50% 50%,
          rgba(0,0,0,.10) 0px,
          rgba(0,0,0,.10) 2px,
          rgba(0,0,0,0) 2px,
          rgba(0,0,0,0) 14px),

        radial-gradient(circle at 30% 28%, rgba(255,255,255,.14), rgba(255,255,255,0) 44%),
        radial-gradient(circle at 70% 78%, rgba(0,0,0,.34), rgba(0,0,0,0) 58%);

      opacity: .68;
      mix-blend-mode: normal;
      pointer-events:none;
    }

    /* ===========================
       THEME RING AROUND COVER LABEL
       =========================== */
    .disk-cover{
      /* keep original shadow + add a thin theme-colored ring */
      box-shadow:
        0 10px 22px rgba(0,0,0,.55),
        0 0 0 2px color-mix(in srgb, var(--accent) 72%, transparent),
        0 0 16px color-mix(in srgb, var(--accent) 18%, transparent),
        0 0 0 1px rgba(255,255,255,.14) inset;
    }

    /* ===========================
       FINAL VINYL OVERRIDE (soft grooves + top sheen) — locked
       =========================== */
    .disk{
      background:
        radial-gradient(circle at 50% 55%, rgba(0,0,0,.05), rgba(0,0,0,.78) 70%, rgba(0,0,0,.92) 100%),
        linear-gradient(-45deg,
          var(--vinyl-sheen-1),
          var(--vinyl-base),
          var(--vinyl-sheen-2),
          var(--vinyl-base),
          var(--vinyl-sheen-1)) !important;
      background-color: var(--vinyl-base) !important;
    }
    .disk::after{
      background:
        radial-gradient(ellipse 140% 75% at 50% 0%,
          var(--vinyl-sheen-glow) 0%,
          rgba(255,255,255,.06) 22%,
          rgba(255,255,255,0) 58%),

        repeating-radial-gradient(circle at 50% 50%,
          rgba(255,255,255,.030) 0px,
          rgba(255,255,255,.030) 1px,
          rgba(0,0,0,0) 1px,
          rgba(0,0,0,0) 8px),

        repeating-radial-gradient(circle at 50% 50%,
          rgba(0,0,0,.10) 0px,
          rgba(0,0,0,.10) 2px,
          rgba(0,0,0,0) 2px,
          rgba(0,0,0,0) 14px),

        radial-gradient(circle at 30% 28%, rgba(255,255,255,.14), rgba(255,255,255,0) 44%),
        radial-gradient(circle at 70% 78%, rgba(0,0,0,.34), rgba(0,0,0,0) 58%) !important;

      opacity: .68 !important;
      mix-blend-mode: normal !important;
    }

        /* ===========================
       FINAL STYLUS DOT LOCK (short arm)
       (keeps alignment but preserves the "drop" animation)
       =========================== */
    .stylus-dot{
      left: 63.38% !important;
      top: 56.31% !important;
    }

    /* ===========================
       WOW FX: dynamic vinyl sheen + micro dust
       (driven by --spin from JS, theme-tinted via --accent)
       =========================== */
    .vinyl-fx{
      position:absolute;
      inset:-2px;
      border-radius:50%;
      pointer-events:none;
      z-index: 3; /* above grooves, below spindle/arm */
      transform: rotate(var(--spin, 0rad));
      will-change: transform, opacity;
      opacity: .78;
    }

    /* studio light sweep */
    .vinyl-fx::before{
      content:"";
      position:absolute;
      inset:-6px;
      border-radius:50%;
      background:
        conic-gradient(
          from 210deg,
          rgba(255,255,255,0) 0deg,
          rgba(255,255,255,.10) 18deg,
          rgba(255,255,255,0) 42deg,
          rgba(255,255,255,0) 360deg
        ),
        radial-gradient(ellipse 140% 78% at 50% 0%,
          var(--vinyl-sheen-glow) 0%,
          rgba(255,255,255,.05) 20%,
          rgba(255,255,255,0) 58%),
        radial-gradient(circle at 50% 50%,
          rgba(0,0,0,0) 54%,
          rgba(0,0,0,.12) 78%,
          rgba(0,0,0,0) 100%);
      mix-blend-mode: screen;
      opacity:.72;
      pointer-events:none;
    }

    /* micro dust / speckles (very subtle) */
    .vinyl-fx::after{
      content:"";
      position:absolute;
      inset:-2px;
      border-radius:50%;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,.10) 0 1px, rgba(255,255,255,0) 2px),
        radial-gradient(circle at 65% 28%, rgba(255,255,255,.08) 0 1px, rgba(255,255,255,0) 2px),
        radial-gradient(circle at 78% 62%, rgba(255,255,255,.08) 0 1px, rgba(255,255,255,0) 2px),
        radial-gradient(circle at 35% 72%, rgba(255,255,255,.07) 0 1px, rgba(255,255,255,0) 2px),
        radial-gradient(circle at 52% 58%, rgba(255,255,255,.06) 0 1px, rgba(255,255,255,0) 2px),
        radial-gradient(circle at 12% 78%, rgba(255,255,255,.06) 0 1px, rgba(255,255,255,0) 2px),
        radial-gradient(circle at 88% 18%, rgba(255,255,255,.05) 0 1px, rgba(255,255,255,0) 2px),
        radial-gradient(circle at 90% 80%, rgba(255,255,255,.05) 0 1px, rgba(255,255,255,0) 2px),
        radial-gradient(circle at 8% 18%, rgba(255,255,255,.05) 0 1px, rgba(255,255,255,0) 2px),
        radial-gradient(circle at 44% 18%, rgba(255,255,255,.05) 0 1px, rgba(255,255,255,0) 2px),

        /* tiny theme-tinted sparkle (barely) */
        radial-gradient(circle at 72% 40%,
          color-mix(in srgb, var(--accent) 35%, transparent) 0 1px,
          rgba(0,0,0,0) 2px);

      opacity:.22;
      mix-blend-mode: overlay;
      pointer-events:none;
    }

    /* ===========================
       WOW FX: subtle arm glint (very small)
       driven by --arm-glint (0..0.06) from JS
       =========================== */
    .tonearm-layer{
      filter:
        drop-shadow(0 18px 26px rgba(0,0,0,.40))
        brightness(calc(1 + var(--arm-glint, 0)))
        contrast(1.02);
    }

    /* ===========================
       MOBILE POLISH
       - move drawer button to top-right
       - pull tonearm back on small screens
       - extra pull to top-left in portrait
       =========================== */
    @media (max-width: 520px){
      .drawer-btn{
        top: 12px !important;
        left: auto !important;
        right: 12px !important;
      }

      /* baseline mobile adjustment */
      .tonearm-layer{
        transform: translate(6px,-8px);
      }
    }

    /* stronger pull into the top-left corner when in portrait */
    

    /* Portrait tweak (from console test): pull the tonearm rotor into top-left */
    

    /* Faster needle-dot drop */
    .stylus-dot{
      transition: transform .22s cubic-bezier(.2,.9,.2,1) !important;
    }


    /* ===========================
       CodePen-inspired utility: PITCH slider (visual + optional playbackRate)
       =========================== */
    .drawer-tools{
      padding: 10px 12px 6px;
      border-top: 1px solid rgba(255,255,255,.08);
      border-bottom: 1px solid rgba(255,255,255,.08);
      background: rgba(0,0,0,.22);
      backdrop-filter: blur(8px);
    }
    .drawer-tools .tool{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
    }
    .drawer-tools .tool-label{
      font-size: 12px;
      letter-spacing: .4px;
      opacity: .9;
      min-width: 48px;
    }
    .drawer-tools .tool-row{
      display:flex;
      align-items:center;
      gap: 10px;
      flex: 1;
    }
    #pitch{
      flex:1;
      height: 22px;
      accent-color: var(--accent);
    }
    #pitchVal{
      font-variant-numeric: tabular-nums;
      font-size: 12px;
      opacity: .95;
      min-width: 54px;
      text-align: right;
    }


    

    /* ===========================
       FFT ACCORDION + BOTTOM VISUALIZER (audioMotion)
       =========================== */

    .fft-viz-wrap{
      position:absolute;
      left:0; right:0; bottom:0;
      height: 220px;
      pointer-events:none;
      z-index: 0;
    }
    .fft-viz-wrap.is-hidden{ display:none; }

    #visualizer{
      width:100%;
      height:100%;
      pointer-events:none;
    }

    .fft-accordion{
      position:absolute;
      top: 18px;
      right: 18px;
      width: min(720px, 94vw);
      z-index: 20;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.28);
      box-shadow: 0 18px 40px rgba(0,0,0,.45);
      backdrop-filter: blur(10px);
      overflow:hidden;
      pointer-events:auto;
    }
    .fft-accordion.is-hidden{ display:none; }

    .fft-accordion details{ border-bottom: 1px solid rgba(255,255,255,.10); }
    .fft-accordion details:last-child{ border-bottom: 0; }

    .fft-accordion summary{
      cursor:pointer;
      list-style:none;
      padding: 12px 14px;
      font-size: 13px;
      letter-spacing:.3px;
      opacity:.95;
      user-select:none;
    }
    .fft-accordion summary::-webkit-details-marker{ display:none; }

    .fft-row{
      display:flex;
      align-items:center;
      gap: 10px;
      padding: 12px 14px 14px;
      flex-wrap: wrap;
    }
    .fft-grid{
      display:grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      padding: 12px 14px 14px;
    }
    @media (max-width: 720px){
      .fft-grid{ grid-template-columns: 1fr; }
      .fft-accordion{ right: 10px; left: 10px; width: auto; }
    }

    .fft-field{
      display:flex;
      flex-direction:column;
      gap: 6px;
      min-width: 0;
    }
    .fft-field-inline{
      display:flex;
      flex-direction:column;
      gap: 6px;
      min-width: 240px;
      flex: 1;
    }
    .fft-field span, .fft-field-inline span{
      font-size: 11px;
      opacity:.72;
      letter-spacing:.3px;
    }

    .fft-accordion select,
    .fft-accordion input[type="range"]{
      height: 30px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.35);
      color: rgba(255,255,255,.92);
      padding: 0 10px;
      outline:none;
      width:100%;
      box-sizing:border-box;
    }

    .fft-default, .fft-close{
      height: 30px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.35);
      color: rgba(255,255,255,.9);
      cursor:pointer;
      padding: 0 12px;
      white-space: nowrap;
    }
    .fft-default:active, .fft-close:active{ transform: translateY(1px); }

    .fft-default-label{
      font-size: 12px;
      opacity: .7;
      max-width: 220px;
      overflow:hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sr-only{
      position:absolute!important;
      width:1px;height:1px;
      padding:0;margin:-1px;
      overflow:hidden;clip:rect(0,0,0,0);
      white-space:nowrap;border:0;
    }

    /* FFT button pictogram (60x60) */
    #btnFFT{ padding: 0; width: 66px; height: 66px; display:inline-flex; align-items:center; justify-content:center; }
    #btnFFT .fft-picto{ width:60px; height:60px; }


    .fft-toggle{
      display:flex;
      align-items:center;
      gap: 10px;
      padding: 0 14px 14px;
      font-size: 13px;
      opacity: .92;
      user-select:none;
    }
    .fft-toggle input{
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }


    /* ===========================
       TOOLTIPS (hover labels)
       =========================== */
    button[data-tip]{
      position: relative;
    }
    button[data-tip]::after{
      content: attr(data-tip);
      position: absolute;
      left: 50%;
      bottom: calc(100% + 10px);
      transform: translateX(-50%);
      background: rgba(0,0,0,.78);
      color: rgba(255,255,255,.92);
      border: 1px solid rgba(255,255,255,.14);
      padding: 7px 10px;
      border-radius: 10px;
      font-size: 12px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity .14s ease, transform .14s ease;
      box-shadow: 0 10px 24px rgba(0,0,0,.35);
      z-index: 50;
    }
    button[data-tip]::before{
      content:"";
      position:absolute;
      left:50%;
      bottom: calc(100% + 4px);
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: rgba(0,0,0,.78);
      opacity: 0;
      pointer-events:none;
      transition: opacity .14s ease;
      z-index: 49;
    }
    button[data-tip]:hover::after,
    button[data-tip]:hover::before{
      opacity: 1;
    }
    button[data-tip]:hover::after{
      transform: translateX(-50%) translateY(-2px);
    }

    /* On mobile / touch: avoid persistent tooltips */
    @media (hover: none){
      button[data-tip]::after,
      button[data-tip]::before{ display:none; }
    }


    /* Tooltips for topbar: show BELOW so they never clip at the top of the player */
    .topbar button[data-tip]::after{
      bottom: auto;
      top: calc(100% + 10px);
    }
    .topbar button[data-tip]::before{
      bottom: auto;
      top: calc(100% + 4px);
      border: 6px solid transparent;
      border-bottom-color: rgba(0,0,0,.78);
      border-top-color: transparent;
    }
    .topbar button[data-tip]:hover::after{
      transform: translateX(-50%) translateY(2px);
    }


    /* ===========================
       LUNA TOOLTIP MANAGER (fixed, unclipped)
       =========================== */
    button[data-tip]::after,
    button[data-tip]::before{
      display:none !important; /* disable old pseudo tooltips */
    }

    #lunaTooltip{
      position: fixed;
      z-index: 9999;
      pointer-events: none;
      max-width: min(320px, 86vw);
      background: rgba(0,0,0,.82);
      color: rgba(255,255,255,.95);
      border: 1px solid rgba(255,255,255,.14);
      padding: 8px 10px;
      border-radius: 12px;
      font-size: 12px;
      line-height: 1.2;
      box-shadow: 0 10px 24px rgba(0,0,0,.35);
      opacity: 0;
      transform: translateY(2px);
      transition: opacity .12s ease, transform .12s ease;
      display: none;
      white-space: normal; /* allow wrap if long */
    }
    #lunaTooltip.is-visible{
      display:block;
      opacity: 1;
      transform: translateY(0);
    }
    #lunaTooltip::before{
      content:"";
      position:absolute;
      left: var(--arrow-left, 50%);
      transform: translateX(-50%);
      border: 7px solid transparent;
    }
    #lunaTooltip.tip-above::before{
      bottom: -14px;
      border-top-color: rgba(0,0,0,.82);
    }
    #lunaTooltip.tip-below::before{
      top: -14px;
      border-bottom-color: rgba(0,0,0,.82);
    }

    @media (hover: none){
      #lunaTooltip{ display:none !important; }
    }


    /* FFT buttons (default / reset) */
    .fft-default, .fft-reset{
      height: 30px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.14);

    }
    .fft-reset:hover{

    }


    /* ===========================
       MEDIA BUTTONS + OVERFLOW HARDEN (safe)
       =========================== */
    html, body{ overflow-x: hidden; }
    .player{ overflow: hidden; }

    .drawer-media{
      padding: 12px 12px 10px;
      border-bottom: 1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.18);
      display: grid;
      gap: 10px;
    }
    .drawer-action{

      max-width: 100%;
      display: block;
      text-align: left;
      padding: 12px 12px;

      border: 1px solid rgba(255,255,255,.14);

    .drawer-action:hover{ background: rgba(255,255,255,.10); border-color: rgba(255,255,255,.22); }
    .drawer-action:active{ transform: translateY(1px); }

    /* crucial for long titles/urls inside grid */
    .item{ min-width: 0; }
    .item .meta{ min-width: 0; overflow: hidden; }
    .pill{ max-width: 96px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* toast/status must not create horizontal overflow on long urls */
    .status{ overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }


    /* ===========================
       GRID MIN-WIDTH FIX (prevents horizontal overflow)
       Grid children default to min-width:auto, which can expand the whole layout
       when a long unbroken string appears (e.g., titles / urls).
       =========================== */
    .ui{ max-width: 100%; overflow: hidden; }
    .ui > *{ min-width: 0; }

    .ui *{ min-width: 0; }

  function hexToRgb(hex){
    const c = String(hex||"").replace("#","").trim();
    if(c.length===3){
      return { r: parseInt(c[0]+c[0],16), g: parseInt(c[1]+c[1],16), b: parseInt(c[2]+c[2],16) };
    }
    if(c.length===6){
      return { r: parseInt(c.slice(0,2),16), g: parseInt(c.slice(2,4),16), b: parseInt(c.slice(4,6),16) };
    }
    return { r:133, g:197, b:204 };
  }
  function mixRgb(a, b, t){
    return { r: Math.round(a.r*(1-t) + b.r*t), g: Math.round(a.g*(1-t) + b.g*t), b: Math.round(a.b*(1-t) + b.b*t) };
  }
  function rgbToCss({r,g,b}, alpha=1){ return `rgba(${r},${g},${b},${alpha})`; }
  function iconFromAccent(accentHex){
    const accent = hexToRgb(accentHex);
    const white  = { r:255, g:255, b:255 };
    const mixed  = mixRgb(accent, white, 0.38);
    return rgbToCss(mixed, 0.95);
  }

  function inferTitleFromFile(url){
    try{
      const file = decodeURIComponent(String(url).split("/").pop() || "Track");
      return file

    try{
      return new URL(file, baseUrl).href;
    }catch(_){

    }
  }

    const s = String(url || "").toLowerCase();
    return /\.(mp3|aac|m4a|ogg|wav)(\?|#|$)/i.test(s);
  }

  function parsePlaylistXml(xmlText, playlist){
    const doc = new DOMParser().parseFromString(xmlText, "text/xml");
    const parserError = doc.getElementsByTagName("parsererror");
    if(parserError && parserError.length){
      throw new Error("XML parse error");
    }

    const li = Array.from(doc.getElementsByTagName("li"));
    const out = [];

    for(const node of li){
      const rawFile = node.getAttribute("data-file") || node.getAttribute("data-src") || "";
      if(!rawFile) continue;

      const file = resolveMaybeRelative(rawFile, playlist.url);

      const title  = (node.getAttribute("data-songtitle") || node.getAttribute("data-title") || "").trim() || inferTitleFromFile(file);

      out.push({
        name: title,
        subtitle: `${playlist.name} • MP3`,
        streamUrl: file,
        cover: image || "",
        logo: image || "",
        artist: artist,
        badge: "MP3",
      });
    }

    return out;
  }

async function fetchJson(url){
  const res = await fetch(url, { cache: "no-store" });
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  return await res.json();

const WEBRADIO_JSON_URL = "/media/misc/stations.json";
let webRadioStations = [];

function normalizeWebRadioItem(item, baseUrl){
  const name = String(item.name || item.title || "Web radio").trim() || "Web radio";
  const desc = String(item.description || item.rds || item.subtitle || "").trim();
  const url  = String(item.url || item.streamUrl || item.stream || "").trim();
  const logoRaw = String(item.logo || item.image || "").trim();

  const logo = logoRaw ? (()=>{
    try{ return new URL(logoRaw, baseUrl).href; }catch(_){ return logoRaw; }
  })() : "";

  const streamUrl = url;
  const subtitle = desc ? `Web radio • ${desc}` : "Web radio";

  return {
    __kind: "webradio",
    __id: String(item.id || item.freq || name).trim(),
    name,
    subtitle,
    streamUrl,
    cover: logo,
    logo: logo,
    artist: desc || "Web radio",
    badge: "LIVE"
  };
}

async function loadWebRadiosJson(){
  try{
    const data = await fetchJson(WEBRADIO_JSON_URL);
    const baseUrl = WEBRADIO_JSON_URL;

    let arr = [];
    if(Array.isArray(data)) arr = data;
    else if(data && Array.isArray(data.webRadios)) arr = data.webRadios;
    else if(data && Array.isArray(data.fmStations)) arr = data.fmStations;

    const parsed = arr
      .map(x => normalizeWebRadioItem(x, baseUrl))
      .filter(x => x && x.streamUrl);

    // dedupe by streamUrl
    const seen = new Set();
    webRadioStations = [];
    for(const st of parsed){
      const key = String(st.streamUrl);
      if(seen.has(key)) continue;
      seen.add(key);
      webRadioStations.push(st);
    }

    // merge into stations without changing base order
    const currentUrl = String(stations[index]?.streamUrl || "");
    const withoutWR = stations.filter(s => s && s.__kind !== "webradio");
    const merged = withoutWR.concat(
      webRadioStations.filter(w => !withoutWR.some(s => String(s.streamUrl||"") === String(w.streamUrl||"")))
    );
    stations = merged;

    if(currentUrl){
      const newIdx = stations.findIndex(s => String(s.streamUrl||"") === currentUrl);
      if(newIdx >= 0) index = newIdx;
    }

    renderList();
    renderWebRadioList();
    setActiveItem();

    if(webRadioStations.length) toast(`Web radios: ${webRadioStations.length}`);
  }catch(e){
    console.warn("Web radios JSON load failed:", e);

    // referrer => origine la plus probable du parent
    if (document.referrer) return new URL(document.referrer).origin;
  } catch(_){}
  return "*";
})();

function postToParent(type, payload = {}){
  if (window.parent === window) return;
  try {
    window.parent.postMessage({
      __luna: 1,
      from: "luna",
      type,
      ...payload
    }, lunaParentOrigin);
  } catch(_) {
    try {
      window.parent.postMessage({
        __luna: 1,
        from: "luna",
        type,
        ...payload
      }, "*");
    } catch(__) {}
  }
}

function lunaSendReady(){
  postToParent("LUNA_READY", { version: "1" });
}

function lunaSendState(extra = {}){
  const s = stations[index] || null;
  postToParent("LUNA_STATE", {
    playing: !!isPlaying,
    index,
    station: s ? {
      name: s.name || "",
      streamUrl: s.streamUrl || "",
      subtitle: s.subtitle || "",
      logo: s.logo || ""
    } : null,
    ...extra
  });
}

function findStationIndexFromPayload(p){
  const payload = p || {};
  if (Number.isFinite(payload.stationIndex)) {
    const i = payload.stationIndex | 0;
    if (i >= 0 && i < stations.length) return i;
  }

  const key = String(payload.stationKey || "").trim().toLowerCase();
  const name = String(payload.stationName || payload.name || "").trim().toLowerCase();
  const url = String(payload.streamUrl || payload.url || "").trim();

  // alias connus
  if (key === "radio_alfa" || name === "radio alfa" || name === "radioalfa") return 0;

  if (url) {
    const u = url;
    const idxUrl = stations.findIndex(s => String(s.streamUrl || "") === u);
    if (idxUrl >= 0) return idxUrl;
  }

  if (name) {
    const idxName = stations.findIndex(s => String(s.name || "").trim().toLowerCase() === name);
    if (idxName >= 0) return idxName;
  }

  return 0; // fallback RADIO ALFA
}

window.addEventListener("message", async (ev) => {
  const d = ev.data;
  if (!d || d.__luna !== 1 || d.type !== "LUNA_CMD" || d.from !== "tron-ares") return;

  const cmd = String(d.cmd || "");
  const payload = d.payload || {};

  try {
    if (cmd === "HELLO") {
      lunaSendReady();
      lunaSendState();
      return;
    }
    if (cmd === "GET_STATE") {
      lunaSendState();
      return;
    }
    if (cmd === "PLAY_STATION") {
      const idx = findStationIndexFromPayload(payload);
      await loadStation(idx, true);
      lunaSendState();
      return;
    }
    if (cmd === "PLAY") {
      await play();
      lunaSendState();
      return;
    }
    if (cmd === "PAUSE") {
      pause();
      lunaSendState();
      return;
    }
    if (cmd === "TOGGLE_PLAY") {
      if (isPlaying) pause();
      else await play();
      lunaSendState();
      return;
    }
  } catch (e) {
    console.warn("[Luna postMessage] cmd failed:", cmd, e);
    lunaSendState({ error: true, errorName: e && e.name ? String(e.name) : "Error" });
  }

  // WebAudio graph (inchangé)
  elAudio.crossOrigin = "anonymous";
  let audioCtx=null, sourceNode=null, analyser=null;
  let freqData=null, timeData=null;
  let corsLikelyBlocked=false;
  // --- Webradio: gestion CORS + HLS + fallback ---
  let hlsInstance = null;
  let hlsAttachedEl = null;
  let currentLoadedUrl = "";

  function normalizeStreamUrl(u){
    // Nettoie les URLs copiées/collées (espaces, virgules en fin de ligne, etc.)
    let s = String(u || "").trim();
    // supprime virgules/espaces en début/fin (ex: "..., http://... ,")
    s = s.replace(/^[,\s]+/g, "").replace(/[,\s]+$/g, "");
    // supprime les espaces internes (une URL ne doit pas en contenir)
    s = s.replace(/\s+/g, "");
    return s;
  }

  function isHlsUrl(u){
    return /\.m3u8(\?|$)/i.test(String(u||""));
  }

  function upgradeMixedContentIfNeeded(u){
    let url = normalizeStreamUrl(u);
    if(!url) return url;

    // Sur une page HTTPS, un flux HTTP est bloqué (mixed content) → on tente une montée en HTTPS.
    if(location.protocol === "https:" && /^http:\/\//i.test(url)){
      url = "https://" + url.slice("http://".length);
    }

    // Quelques exceptions où l'URL HTTPS n'est pas juste un changement de schéma.
    const overrides = [
      { re: /direct\.francemusique\.fr\/live\/francemusique-midfi\.mp3/i, https: "https://icecast.radiofrance.fr/francemusique-midfi.mp3" },
      { re: /streaming\.radio\.rtl\.fr\/rtl-1-44-128/i, https: "https://streamer-02.rtl.fr/rtl-1-44-128" },
      { re: /ais-live\.cloud-services\.paris:8000\/europe1\.mp3/i, https: "https://europe1.lmn.fm/europe1.mp3?aw_0_1st.playerid=lgrdrnwsRadiofr" }
    ];
    for(const o of overrides){
      if(o.re.test(url)) return o.https;
    }

    return url;
  }

  async function testCorsReadable(url){
    // Détermine si le serveur renvoie des en-têtes CORS permettant à WebAudio/analyser de lire le flux.
    // Si le fetch échoue avec un TypeError, c'est très souvent CORS (ou un réseau bloqué).
    const u = normalizeStreamUrl(url);
    if(!u) return false;
    const controller = new AbortController();
    const t = setTimeout(()=>controller.abort(), 2500);
    try{
      // HEAD est léger; si le serveur ne supporte pas HEAD il peut renvoyer 405,
      // mais l'important est que le fetch "mode:cors" ne jette pas une exception CORS.
      await fetch(u, { method:"HEAD", mode:"cors", cache:"no-store", redirect:"follow", signal: controller.signal });
      clearTimeout(t);
      return true;
    }catch(e){
      clearTimeout(t);
      return false;
    }
  }

  function stopAllAudio(){
    // Stoppe les 2 éléments audio (plain + CORS), et détruit HLS si présent
    try{
      if(hlsInstance){
        hlsInstance.destroy();
      }
    }catch(_){}
    hlsInstance = null;
    hlsAttachedEl = null;

    for(const a of [elAudioPlain, elAudioCORS]){
      try{ a.pause(); }catch(_){}
      try{ a.removeAttribute("src"); }catch(_){}
      try{ a.load(); }catch(_){}
    }
    currentLoadedUrl = "";
  }

  async function setMediaSourceToElement(el, url){
    const input = normalizeStreamUrl(url);
    const u = upgradeMixedContentIfNeeded(input);

    // helper: pose un src et attend un évènement "ok" (ou timeout) sans bloquer
    const waitForLoad = (src) => new Promise((resolve, reject) => {
      let done = false;
      const t = setTimeout(() => {
        if(done) return;
        done = true;
        cleanup();
        // Pour des flux live, certains navigateurs n'émettent pas toujours canplay rapidement.
        resolve();
      }, 4500);

      const cleanup = () => {
        clearTimeout(t);
        el.removeEventListener("canplay", onOk);
        el.removeEventListener("loadedmetadata", onOk);
        el.removeEventListener("error", onErr);
      };
      const onOk = () => {
        if(done) return;
        done = true;
        cleanup();
        resolve();
      };
      const onErr = () => {
        if(done) return;
        done = true;
        cleanup();
        reject(new Error("MEDIA_LOAD_ERROR"));
      };

      el.addEventListener("canplay", onOk);
      el.addEventListener("loadedmetadata", onOk);
      el.addEventListener("error", onErr);

      try{
        el.src = src;
        el.load();
      }catch(_){
        // si load() jette, on laisse quand même la suite décider
      }
    });

    const altForHls = (hlsUrl) => {
      // Fallbacks (quand HLS est bloqué par CORS / 403 / compatibilité)
      // RFM locales : bascule vers le direct MP3 HTTPS
      if(/rfm\.lmn\.fm\/rfm-\d+\/playlist\.m3u8/i.test(hlsUrl) || /rfm\.lmn\.fm\/rfm\/playlist\.m3u8/i.test(hlsUrl)){
        return "https://stream.rfm.fr/rfm.mp3";
      }
      return null;
    };

    // Nettoyage HLS précédent
    try{
      if(hlsInstance){
        hlsInstance.destroy();
      }
    }catch(_){}
    hlsInstance = null;
    hlsAttachedEl = null;

    if(isHlsUrl(u)){
      // 1) HLS natif (Safari/iOS)
      const canNative = !!(el.canPlayType && el.canPlayType("application/vnd.apple.mpegurl"));
      if(canNative){
        await waitForLoad(u);
        return;
      }

      // 2) HLS via hls.js
      if(window.Hls && Hls.isSupported()){
        try{
          await new Promise((resolve, reject) => {
            const hls = new Hls({
              enableWorker: true,
              lowLatencyMode: false,
              xhrSetup: (xhr, _url) => { try{ xhr.withCredentials = false; }catch(_){} }
            });
            hlsInstance = hls;
            hlsAttachedEl = el;

            const fail = (err) => {
              try{ hls.destroy(); }catch(_){}
              hlsInstance = null;
              hlsAttachedEl = null;
              reject(err);
            };

            hls.on(Hls.Events.ERROR, (_evt, data) => {
              if(data && data.fatal){
                fail(new Error("HLS_LOAD_FAILED"));
              }
            });
            hls.on(Hls.Events.MANIFEST_PARSED, () => resolve());

            hls.attachMedia(el);
            hls.on(Hls.Events.MEDIA_ATTACHED, () => {
              try{
                hls.loadSource(u);
              }catch(e){
                fail(e);
              }
            });
          });
          return;
        }catch(e){
          const alt = altForHls(u);
          if(alt){
            // fallback automatique si HLS ne passe pas
            await waitForLoad(alt);
            return;
          }
          throw e;
        }
      }

      // 3) pas supporté → fallback si possible
      const alt = altForHls(u);
      if(alt){
        await waitForLoad(alt);
        return;
      }
      throw new Error("HLS_NOT_SUPPORTED");
    }

    // MP3/AAC/etc.
    await waitForLoad(u);
  }

  async function preparePlaybackForCurrentStation(forceReload=false){
    const s = stations[index] || {};
    let url = normalizeStreamUrl(s.streamUrl || s.url || "");
    if(!url){
      return { ok:false, reason:"NO_URL" };
    }

    url = upgradeMixedContentIfNeeded(url);

    // Visualizer/WebAudio exige CORS côté serveur pour pouvoir lire le flux (sinon sortie muette).
    // Si CORS pas dispo, on bascule sur l'audio "plain" (lecture OK, mais sans analyseur).
    let useCorsAudio = false;
    let notice = "";

    if(analyzerEnabled){
      const corsOk = await testCorsReadable(url);
      useCorsAudio = corsOk;
      corsLikelyBlocked = !corsOk;
      if(!corsOk){
        notice = "Flux sans CORS: lecture OK, visualizer désactivé pour cette station.";
      }
    }else{
      corsLikelyBlocked = false;
    }

    const nextEl = useCorsAudio ? elAudioCORS : elAudioPlain;

    // swap si nécessaire
    const needSwap = (elAudio !== nextEl);
    const needReload = forceReload || needSwap || (currentLoadedUrl !== url);

    if(needReload){
      // stop tout pour éviter qu'un ancien flux continue en arrière-plan
      stopAllAudio();
      elAudio = nextEl;
      currentLoadedUrl = url;

      try{
        await setMediaSourceToElement(elAudio, url);
      }catch(e){
        if(String(e && e.message) === "HLS_NOT_SUPPORTED"){
          notice = "Ce flux est en .m3u8 (HLS) et n'est pas supporté par ton navigateur.";
        }else{
          notice = "Impossible de charger ce flux (URL/CORS/mixed content).";
        }
      }
    }

    return { ok:true, url, useCorsAudio, notice };
  }


  async function ensureAudioGraph(){
    if(audioCtx) return true;
    try{
      audioCtx = new (window.AudioContext||window.webkitAudioContext)();
      sourceNode = audioCtx.createMediaElementSource(elAudio);

      
      window.__LUNA_AUDIO_CTX = audioCtx;
      window.__LUNA_SOURCE_NODE = sourceNode;
      window.__LUNA_AUDIO_EL = elAudio;
analyser = audioCtx.createAnalyser();
      analyser.fftSize = 2048;
      analyser.smoothingTimeConstant = 0.82;
      analyser.minDecibels = -95;
      analyser.maxDecibels = -15;

      sourceNode.connect(analyser);
      analyser.connect(audioCtx.destination);

      freqData = new Uint8Array(analyser.frequencyBinCount);
      timeData = new Uint8Array(analyser.fftSize);

      corsLikelyBlocked=false;
      return true;
    }catch(e){
      console.warn(e);
      analyzerEnabled=false;
      updateAnalyzerUI();
      toast("WebAudio indisponible (visualizer OFF).");
      return false;
    }
  }

  window.__LUNA_ENSURE_AUDIO_GRAPH = ensureAudioGraph;

  async function play(){
    try{
      armCueOnPlayRealistic();

      const prep = await preparePlaybackForCurrentStation(false);
      if(!prep.ok){
        toast("Aucune URL de flux pour cette station.");
        return;
      }
      if(prep.notice) toast(prep.notice);

      if(analyzerEnabled && prep.useCorsAudio){
        await ensureAudioGraph();
        if(audioCtx && audioCtx.state==="suspended") await audioCtx.resume();
      }

      // Start inside the user gesture, but keep silent until the needle drops
      clearTimeout(needleGateTimer);
      needleGateActive = true;
      elAudio.volume = 0;

      // IMPORTANT: do not await .play() — buffering would delay the arm/dot animation
      const p = elAudio.play();

      isPlaying = true;
      nowInfo.innerHTML = `<span class="dot"></span> Cue…`;
      updatePlayUI();

      // Make it audible only when the arm finishes cueing + drop delay (needle down)
      const gateMs = Math.round((ARM_CUE_SEC + ARM_DROP_DELAY) * 1000);
      needleGateTimer = setTimeout(() => {
        if(!isPlaying) return;
        needleGateActive = false;
        elAudio.volume = isMuted ? 0 : (volumeValue / 100);
        nowInfo.innerHTML = `<span class="dot"></span> En direct`;
      }, gateMs);

      // If playback is blocked, revert state cleanly
      if(p && typeof p.catch === "function"){
        p.catch((e) => {
          console.warn(e);
          toast("Autoplay bloqué: clique sur ▶");
          postToParent("LUNA_AUTOPLAY_BLOCKED", { reason: (e && e.name) ? String(e.name) : "blocked" });
          isPlaying = false;
          needleGateActive = false;
          clearTimeout(needleGateTimer);
          armReturnOnPauseRealistic();
          updatePlayUI();
        });
      }
    }catch(e){
      console.warn(e);
      toast("Autoplay bloqué: clique sur ▶");
      postToParent("LUNA_AUTOPLAY_BLOCKED", { reason: (e && e.name) ? String(e.name) : "blocked" });
      isPlaying = false;
      needleGateActive = false;
      clearTimeout(needleGateTimer);
      armReturnOnPauseRealistic();
      updatePlayUI();
    }
  }

  function pause(){
    clearTimeout(needleGateTimer);
    needleGateActive = false;
    elAudio.volume = isMuted ? 0 : (volumeValue / 100);

    elAudio.pause();

  function togglePlay(){ isPlaying ? pause() : play(); }

  function pickRandomIndex(except){
    if(stations.length <= 1) return except;
    let r = except;
    while(r === except) r = Math.floor(Math.random() * stations.length);
    return r;
  }

  async function loadStation(i, autoplay=false, fromHistory=false){
    const prev = index;
    index = (i + stations.length) % stations.length;

    if(!fromHistory && prev !== index){
      history.push(prev);
      if(history.length > 60) history.shift();

    elDisk.style.backgroundImage = "none";
    if(cover) setBackground(cover);

    setActiveItem();

    nowInfo.innerHTML = `<span class="dot"></span> Connexion…`;
    isPlaying=false;
    updatePlayUI();


    clearTimeout(needleGateTimer);
    needleGateActive = false;
    elAudio.volume = isMuted ? 0 : (volumeValue / 100);
    armSetRestImmediate();

    // Prépare le flux (CORS/HLS/mixed content) au moment du play()
    // et évite les blocages "cross-origin" (WebAudio) ou les flux qui restent en arrière-plan.
    stopAllAudio();

    updateScrubUI(true);
    if(autoplay) play();
}

<!DOCTYPE html>
<html lang="fr">
<head>
  <script>
    (function sanitizeUrl() {
      try {
        var search = window.location.search;
        if (!search) return;

        var params = new URLSearchParams(search);
        var dirty = false;

        ["token", "access_token", "id_token", "auth_token", "jwt"].forEach(function (key) {
          if (params.has(key)) {
            params.delete(key);
            dirty = true;
          }
        });

        if (dirty) {
          var newSearch = params.toString();
          var newUrl =
            window.location.pathname +
            (newSearch ? "?" + newSearch : "") +
            window.location.hash;

          window.history.replaceState(null, "", newUrl);
        }
      } catch (e) {
        console.warn("URL sanitization error", e);
      }
    })();
  </script>

  <meta charset="utf-8" />
  <meta name="referrer" content="no-referrer" />
  <meta name="robots" content="noindex,nofollow,max-snippet:0" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://unpkg.com/video.js@7/dist/video-js.css" rel="stylesheet" />
  <script src="https://unpkg.com/video.js@7/dist/video.min.js"></script>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #000;
      overflow: hidden;
    }

    #player {
      width: 100%;
      height: 100%;
    }

    .vjs-fluid {
      padding-top: 0 !important;
    }

    /* Ajout demandé : fill visuel */
    .video-js video {
      object-fit: fill !important;
    }

    /* Controls cachés par défaut */
    .video-js .vjs-control-bar {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      height: 4.2em !important;
      padding: 0 10px;
      background: linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0.35)) !important;
      backdrop-filter: blur(6px);
    }

    /* Controls visibles seulement quand la souris est sur le player */
    .video-js:hover .vjs-control-bar {
      opacity: 1;
      pointer-events: auto;
    }

    /* Visuel du player */
    .video-js {
      background: #000 !important;
      font-family: Arial, sans-serif;
    }

    .video-js .vjs-poster {
      background-size: cover;
    }

    .video-js .vjs-big-play-button {
      top: 50% !important;
      left: 50% !important;
      transform: translate(-50%, -50%);
      width: 88px !important;
      height: 88px !important;
      line-height: 88px !important;
      border-radius: 50% !important;
      border: 2px solid rgba(255, 255, 255, 0.95) !important;
      background: rgba(0, 0, 0, 0.45) !important;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.45);
      transition: all 0.2s ease;
    }

    .video-js:hover .vjs-big-play-button {
      background: rgba(255, 255, 255, 0.12) !important;
      transform: translate(-50%, -50%) scale(1.05);
    }

    .video-js .vjs-button > .vjs-icon-placeholder:before,
    .video-js .vjs-control {
      color: #ffffff !important;
    }

    .video-js .vjs-play-progress,
    .video-js .vjs-volume-level {
      background-color: #00c2ff !important;
    }

    .video-js .vjs-load-progress div {
      background: rgba(255, 255, 255, 0.25) !important;
    }

    .video-js .vjs-slider {
      background-color: rgba(255, 255, 255, 0.22) !important;
    }

    .video-js .vjs-progress-control .vjs-progress-holder {
      margin: 0 10px;
    }

    .video-js .vjs-time-control {
      font-size: 1.05em;
    }

    .video-js .vjs-volume-panel {
      margin-left: 6px;
      margin-right: 6px;
    }
  </style>
</head>
<body>
  <video
    id="player"
    class="video-js vjs-fill vjs-big-play-centered"
    controls
    playsinline
    autoplay
    preload="auto"
  ></video>

  <script>
    (function () {
      var q = window.location.search;
      var src = '';

      if (q && q.length > 1) {
        var raw = decodeURIComponent(q.substring(1));
        if (/^https?:/i.test(raw)) {
          src = raw;
        } else {
          var params = new URLSearchParams(q);
          src = params.get('src') || params.get('url') || params.get('u') || '';
        }
      }

      var player = videojs('player', {
        fluid: true,
        preload: 'auto',
        autoplay: true,
        controls: true,
        inactivityTimeout: 0,
        controlBar: {
          playToggle: true,
          volumePanel: true,
          currentTimeDisplay: true,
          timeDivider: true,
          durationDisplay: true,
          progressControl: true,
          fullscreenToggle: true,
          pictureInPictureToggle: true
        }
      });

      function setSource(url) {
        if (!url) return;

        var type = '';
        if (/\.m3u8(\?.*)?$/i.test(url)) type = 'application/x-mpegURL';
        else if (/\.mpd(\?.*)?$/i.test(url)) type = 'application/dash+xml';
        else if (/\.mp3(\?.*)?$/i.test(url)) type = 'audio/mpeg';
        else if (/\.mp4(\?.*)?$/i.test(url)) type = 'video/mp4';

        player.src(type ? { src: url, type: type } : { src: url });
      }

      setSource(src);

      window.addEventListener('message', function (e) {
        if (!e.data) return;

        if (typeof e.data === 'string' && /^https?:/i.test(e.data)) {
          setSource(e.data);
        } else if (e.data && e.data.type === 'SET_SRC' && e.data.url) {
          setSource(e.data.url);
        }
      });
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>WITV Player</title>

  <script src="https://gardien9a13ruedechartres-netizen.github.io/cmtv/playerjs2.js" type="text/javascript"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    body {
      position: fixed;
      inset: 0;
    }

    #player {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
    }

    #player iframe,
    #player video,
    #player object,
    #player embed {
      position: absolute !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      border: 0 !important;
      background: #000 !important;
      object-fit: contain !important;
    }

    .playerjs {
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>

<body>

  <div id="player"></div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const streamUrl = "https://cluone.dad:443/live/388FAA8743C4E2980F7B4089B7E81087/88.m3u8";

      if (!streamUrl) {
        console.error("URL vidéo invalide.");
        return;
      }

      new Playerjs({
        id: "player",
        file: streamUrl,
        autoplay: 1,
        mute: 0
      });
    });
  </script>

</body>
</html>

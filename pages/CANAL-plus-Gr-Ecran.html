      margin: 0;

    #player {
      width: 100%;
      height: 100vh;
    }
  </style>

<body>

  <div id="player"></div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      var streamUrl = "https://cluone.dad:443/live/388FAA8743C4E2980F7B4089B7E81087/88.m3u8";

      if (streamUrl) {
        new Playerjs({
          id: "player",
          file: streamUrl,

        });

        console.error("Aucun ID fourni ou URL invalide !");
      }
    });
  </script>

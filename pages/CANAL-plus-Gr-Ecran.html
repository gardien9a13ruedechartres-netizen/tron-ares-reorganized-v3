<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>WITV Player</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    body {
      position: fixed;
      inset: 0;
    }

    #playerOverlay {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
    }

    video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #000;
      object-fit: contain;
      opacity: 0;
      transition: opacity 700ms ease;
    }

    video.is-visible {
      opacity: 1;
    }

    #loader {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      opacity: 1;
      visibility: visible;
      transition:
        opacity 450ms ease,
        visibility 450ms ease;
      z-index: 10;
      pointer-events: none;
    }

    #loader.is-hidden {
      opacity: 0;
      visibility: hidden;
    }

    .spinner {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.12);
      border-top-color: rgba(255,255,255,0.92);
      animation: spin 900ms linear infinite;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.18));
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

<div id="playerOverlay">

  <video
    id="video"
    autoplay
    playsinline
    webkit-playsinline
    controls
  ></video>

  <div id="loader">
    <div class="spinner"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const STREAM_URL = "https://cluone.dad:443/live/388FAA8743C4E2980F7B4089B7E81087/88.m3u8";

  const video = document.getElementById("video");
  const loader = document.getElementById("loader");

  let hls = null;

  let reconnecting = false;
  let spinnerVisibleAt = 0;
  let spinnerWatchdog = null;

  // =========================
  // LOADER
  // =========================

  function showLoader() {
    loader.classList.remove("is-hidden");

    if (!spinnerVisibleAt) {
      spinnerVisibleAt = Date.now();
    }
  }

  function hideLoader() {
    loader.classList.add("is-hidden");
    spinnerVisibleAt = 0;
  }

  // =========================
  // VIDEO VISIBILITY
  // =========================

  function showVideo() {
    video.classList.add("is-visible");
    hideLoader();
  }

  // =========================
  // PLAY
  // =========================

  async function playVideo() {
    try {
      await video.play();
    } catch (e) {
      try {
        video.muted = true;
        await video.play();
      } catch (_) {}
    }
  }

  // =========================
  // DESTROY
  // =========================

  function destroyPlayer() {
    if (hls) {
      hls.destroy();
      hls = null;
    }

    video.removeAttribute("src");
    video.load();
  }

  // =========================
  // INVISIBLE RELOAD
  // =========================

  function invisibleReload() {

    if (reconnecting) return;

    reconnecting = true;

    const currentTime = video.currentTime || 0;

    destroyPlayer();

    setTimeout(() => {

      initPlayer();

      video.currentTime = currentTime;

      reconnecting = false;

    }, 300);
  }

  // =========================
  // WATCHDOG SPINNER
  // =========================

  function startSpinnerWatchdog() {

    clearInterval(spinnerWatchdog);

    spinnerWatchdog = setInterval(() => {

      const loaderVisible =
        !loader.classList.contains("is-hidden");

      if (!loaderVisible) return;

      if (!spinnerVisibleAt) return;

      const elapsed =
        Date.now() - spinnerVisibleAt;

      // spinner visible > 4 sec
      // => reload invisible

      if (elapsed > 4000) {

        spinnerVisibleAt = Date.now();

        invisibleReload();
      }

    }, 1000);
  }

  // =========================
  // INIT PLAYER
  // =========================

  function initPlayer() {

    showLoader();

    // Native Safari HLS

    if (video.canPlayType("application/vnd.apple.mpegurl")) {

      video.src = STREAM_URL;

      video.load();

      playVideo();

      return;
    }

    // HLS.JS

    if (window.Hls && Hls.isSupported()) {

      hls = new Hls({
        enableWorker: true,
        lowLatencyMode: true,
        liveSyncDurationCount: 3,
        liveMaxLatencyDurationCount: 6,
        backBufferLength: 30
      });

      hls.loadSource(STREAM_URL);

      hls.attachMedia(video);

      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        playVideo();
      });

      hls.on(Hls.Events.ERROR, (event, data) => {

        if (!data.fatal) return;

        showLoader();

        switch (data.type) {

          case Hls.ErrorTypes.NETWORK_ERROR:
            hls.startLoad();
            break;

          case Hls.ErrorTypes.MEDIA_ERROR:
            hls.recoverMediaError();
            break;

          default:
            invisibleReload();
            break;
        }
      });

      return;
    }

    showLoader();
  }

  // =========================
  // VIDEO EVENTS
  // =========================

  video.addEventListener("playing", showVideo);

  video.addEventListener("canplay", showVideo);

  video.addEventListener("waiting", showLoader);

  video.addEventListener("stalled", showLoader);

  video.addEventListener("seeking", showLoader);

  video.addEventListener("seeked", () => {

    if (!video.paused) {
      hideLoader();
    }
  });

  video.addEventListener("error", () => {
    invisibleReload();
  });

  // =========================
  // START
  // =========================

  startSpinnerWatchdog();

  initPlayer();

});
</script>

</body>
</html>

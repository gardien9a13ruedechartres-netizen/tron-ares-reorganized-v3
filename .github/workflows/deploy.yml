name: Generate players and deploy

on:
  workflow_dispatch:

  schedule:
    - cron: "*/5 * * * *"

  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Generate players
        id: generate
        run: node js/generate-players.js

      - name: Deploy to Cloudflare
        if: steps.generate.outputs.changed == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

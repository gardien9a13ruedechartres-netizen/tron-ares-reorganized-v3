<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Player HLS.js</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #video {
      width: 100%;
      height: 100vh;
      background: #000;
      display: block;
      object-fit: fill;
}
  
</style>
</head>
<body>
  <video
    id="video"
    controls
    autoplay
    playsinline
    webkit-playsinline
  ></video>

  <script>
    (function () {
      const video = document.getElementById("video");
      const streamUrl = "https://plu001.myturn1.top:8088/live/agrrrrr/playlist.m3u8?id=121119&pk=55e0c5e758904f24491a24dcf7b039654e47682f5cc8226acfec022aa069037aaa779339da9740574f8b30363781438a2727685b5150b1ca0ac894bbfff5096c";

      let hls = null;
      let retryCount = 0;
      const maxRetries = 10;

      function destroyHls() {
        if (hls) {
          hls.destroy();
          hls = null;
        }
      }

      function attachNative() {
        video.src = streamUrl;
        video.load();

        video.play().catch(function (error) {
          console.warn("Lecture native bloquée :", error);
        });
      }

      function createHlsPlayer() {
        destroyHls();

        hls = new Hls({
          enableWorker: true,
          lowLatencyMode: false,
          backBufferLength: 90
        });

        hls.loadSource(streamUrl);
        hls.attachMedia(video);

        hls.on(Hls.Events.MEDIA_ATTACHED, function () {
          console.log("Média attaché");
        });

        hls.on(Hls.Events.MANIFEST_PARSED, function () {
          retryCount = 0;
          video.play().catch(function (error) {
            console.warn("Autoplay bloqué :", error);
          });
        });

        hls.on(Hls.Events.ERROR, function (event, data) {
          console.error("Erreur HLS :", data);

          if (!data.fatal) {
            return;
          }

          if (retryCount >= maxRetries) {
            console.error("Nombre maximum de tentatives atteint.");
            destroyHls();
            return;
          }

          retryCount += 1;

          switch (data.type) {
            case Hls.ErrorTypes.NETWORK_ERROR:
              console.warn("Erreur réseau, nouvelle tentative...");
              setTimeout(function () {
                if (hls) {
                  hls.startLoad();
                }
              }, 3000);
              break;

            case Hls.ErrorTypes.MEDIA_ERROR:
              console.warn("Erreur média, tentative de récupération...");
              setTimeout(function () {
                if (hls) {
                  hls.recoverMediaError();
                }
              }, 3000);
              break;

            default:
              console.warn("Erreur fatale, recréation complète du player...");
              setTimeout(function () {
                createHlsPlayer();
              }, 3000);
              break;
          }
        });
      }

      if (Hls.isSupported()) {
        createHlsPlayer();
      } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
        attachNative();
      } else {
        console.error("HLS non supporté par ce navigateur.");
      }
    })();
  </script>
<script src="../js/wheel-volume-iframe.js"></script>
</body>
</html>

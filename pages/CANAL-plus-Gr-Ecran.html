<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>WITV Player</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    body {
      position: fixed;
      inset: 0;
    }

    #playerOverlay {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
    }

    video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #000;
      object-fit: fill;
      opacity: 0;
      transition: opacity 700ms ease;
    }

    video.is-visible {
      opacity: 1;
    }

    #loader {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      opacity: 1;
      visibility: visible;
      transition: opacity 450ms ease, visibility 450ms ease;
      z-index: 10;
      pointer-events: none;
    }

    #loader.is-hidden {
      opacity: 0;
      visibility: hidden;
    }

    .spinner {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.14);
      border-top-color: rgba(255, 255, 255, 0.88);
      animation: spin 900ms linear infinite;
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.18));
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <div id="playerOverlay">
    <video
      id="video"
      autoplay
      playsinline
      webkit-playsinline
      controls
    ></video>

    <div id="loader" aria-hidden="true">
      <div class="spinner"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const streamUrl = "https://cluone.dad:443/live/388FAA8743C4E2980F7B4089B7E81087/88.m3u8";

      const video = document.getElementById("video");
      const loader = document.getElementById("loader");

      let hls = null;
      let loaderTimer = null;
      let reconnectTimer = null;

      function showLoader() {
        clearTimeout(loaderTimer);
        loader.classList.remove("is-hidden");
      }

      function hideLoader() {
        clearTimeout(loaderTimer);
        loaderTimer = setTimeout(function () {
          loader.classList.add("is-hidden");
        }, 250);
      }

      function showVideoSmoothly() {
        video.classList.add("is-visible");
        hideLoader();
      }

      function startPlayback() {
        const playPromise = video.play();

        if (playPromise && typeof playPromise.catch === "function") {
          playPromise.catch(function () {
            video.muted = true;
            video.play().catch(function () {});
          });
        }
      }

      function reconnect() {
        clearTimeout(reconnectTimer);
        showLoader();

        reconnectTimer = setTimeout(function () {
          if (hls) {
            hls.destroy();
            hls = null;
          }

          setupPlayer();
        }, 1200);
      }

      function setupPlayer() {
        showLoader();

        if (video.canPlayType("application/vnd.apple.mpegurl")) {
          video.src = streamUrl;
          video.load();
          startPlayback();
          return;
        }

        if (window.Hls && Hls.isSupported()) {
          hls = new Hls({
            enableWorker: true,
            lowLatencyMode: true,
            backBufferLength: 30,
            liveSyncDurationCount: 3,
            liveMaxLatencyDurationCount: 6
          });

          hls.loadSource(streamUrl);
          hls.attachMedia(video);

          hls.on(Hls.Events.MANIFEST_PARSED, function () {
            startPlayback();
          });

          hls.on(Hls.Events.ERROR, function (event, data) {
            if (!data || !data.fatal) {
              return;
            }

            showLoader();

            if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
              hls.startLoad();
              return;
            }

            if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
              hls.recoverMediaError();
              return;
            }

            reconnect();
          });

          return;
        }

        showLoader();
      }

      video.addEventListener("playing", showVideoSmoothly);
      video.addEventListener("canplay", showVideoSmoothly);
      video.addEventListener("waiting", showLoader);
      video.addEventListener("stalled", showLoader);
      video.addEventListener("seeking", showLoader);

      video.addEventListener("seeked", function () {
        if (!video.paused) {
          hideLoader();
        }
      });

      video.addEventListener("error", reconnect);

      setupPlayer();
    });
  </script>

</body>
</html>

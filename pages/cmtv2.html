<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Player HTML5 HLS plein page</title>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.16/dist/hls.min.js"></script>
  <script src="https://one.timesup.top/resources/scripts/newucaster.js?id=1573542001724"></script>

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
    }

    .player_div {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      z-index: 100;
      overflow: hidden;
    }

    .player_div video {
      width: 100%;
      height: 100%;
      object-fit: fill;
      object-position: center center;
      background: #000;
      display: block;
    }
  </style>
</head>

<body>
  <div class="player_div" id="player_div">
    <video
      id="videoPlayer"
      autoplay
      playsinline
      controls
    ></video>
  </div>

  <script>
    const ea = "muc001.myturn1.top";
    const playerElement = document.getElementById("player_div");
    const video = document.getElementById("videoPlayer");

    let hls = null;
    let retryTimer = null;

    function forceObjectFitFill() {
      video.style.width = "100%";
      video.style.height = "100%";
      video.style.objectFit = "fill";
      video.style.objectPosition = "center center";
    }

    function getHlsUrl() {
      const pk = "55e0c5e758904f24491a24dcf7b039654e47682f5cc8226acfec0X22aa069037adf2c2df3d185c8f3a0b5bf5b4f7f5d20712ec6116f58fc6266371b830a1bcf5d";

      return (
        "https://" +
        ea +
        ":8088/live/agrrrrr/playlist.m3u8?id=121119&pk=" +
        enableVideo(pk)
      );
    }

    function destroyHls() {
      if (hls) {
        hls.destroy();
        hls = null;
      }
    }

    function retryPlayback() {
      clearTimeout(retryTimer);

      retryTimer = setTimeout(function () {
        setupVideo();
      }, 10000);
    }

    function setupVideo() {
      const hlsUrl = getHlsUrl();

      forceObjectFitFill();
      destroyHls();

      video.pause();
      video.removeAttribute("src");
      video.load();

      if (Hls.isSupported()) {
        hls = new Hls({
          enableWorker: true,
          lowLatencyMode: true,
          backBufferLength: 90
        });

        hls.loadSource(hlsUrl);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, function () {
          forceObjectFitFill();

          video.play().catch(function () {
            video.muted = true;
            video.play().catch(function () {});
          });
        });

        hls.on(Hls.Events.ERROR, function (event, data) {
          if (!data || !data.fatal) {
            return;
          }

          if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
            hls.startLoad();
            return;
          }

          if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
            hls.recoverMediaError();
            return;
          }

          retryPlayback();
        });
      } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = hlsUrl;

        video.addEventListener("loadedmetadata", function () {
          forceObjectFitFill();

          video.play().catch(function () {
            video.muted = true;
            video.play().catch(function () {});
          });
        });
      } else {
        console.error("HLS non supporté par ce navigateur.");
      }

      setTimeout(forceObjectFitFill, 500);
      setTimeout(forceObjectFitFill, 1500);
    }

    video.addEventListener("error", function () {
      retryPlayback();
    });

    window.addEventListener("resize", forceObjectFitFill);

    setupVideo();
  </script>
</body>
</html>

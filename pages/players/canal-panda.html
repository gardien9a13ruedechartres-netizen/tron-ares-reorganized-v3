<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>CANAL-PANDA</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #video {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: fill;
      background: #000;
      z-index: 1;
    }

    #loadingOverlay {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.045), rgba(0,0,0,0.94) 48%, #000 100%);
      opacity: 1;
      visibility: visible;
      transition: opacity 0.45s ease, visibility 0.45s ease;
      pointer-events: none;
    }

    #loadingOverlay.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .premiumLoader {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.16);
      border-top-color: rgba(255, 255, 255, 0.95);
      border-right-color: rgba(255, 255, 255, 0.50);
      animation: premiumSpin 0.95s linear infinite;
      filter: drop-shadow(0 0 14px rgba(255, 255, 255, 0.16));
    }

    .premiumLoader::after {
      content: "";
      position: absolute;
      inset: 11px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.10);
    }

    @keyframes premiumSpin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>

<video id="video" autoplay playsinline controls></video>

<div id="loadingOverlay" aria-hidden="true">
  <div class="premiumLoader"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
let streamUrl = "https://livewatch.top/api/proxy?url=http%3A%2F%2F45.143.220.207%3A8008%2Fsunshine%2FKO97GtMWV00gdm8tPt_peCOGHJ7_1lmJIvljpmM0ZqEubuyGfPDht3cDqQVYmlGAQCU1iP0BAirLJjxiIB-zGhXSia0xfBgaR2i7PcEH16iBu5cZhNyv6PUKyDw9bcMV1zSQFb5KTeGF5ulcFgBjAXlwgqUs_Ewd7G88zQ1gBtRRZC8EtVuwk4qbgbmgLGvV82cm-x7aoOmXuiqSJOdDde4PYSxSb_s-0ly7JUJ0zITWaX9s6IPYEDB70A5J0cjkkydpsIZNsGjTMuu6G7NOFQ%2Fhls%2Findex.m3u8";
const jsonUrl = "https://livewatch.top/api/tvvoo/stream?channel=CANAL PANDA&countries=pt.json";
const refreshWorkerUrl = 'https://tvvoo-refresh.victor-salema-53d.workers.dev/';

const video = document.getElementById("video");
const loadingOverlay = document.getElementById("loadingOverlay");

video.muted = false;
video.volume = 1;

function showLoader() {
  if (loadingOverlay) {
    loadingOverlay.classList.remove("hidden");
  }
}

function hideLoader() {
  if (loadingOverlay) {
    loadingOverlay.classList.add("hidden");
  }
}

let hls = null;
let reloadTimer = null;
let healthTimer = null;
let jsonRefreshTimer = null;
let jsonRefreshInProgress = false;
let lastTime = 0;
let lastProgressAt = Date.now();
let reloadCount = 0;
let bufferingStartedAt = null;
let jsonRefreshFailures = 0;
let stallEvents = [];

const HEALTH_CHECK_INTERVAL = 5000;
const NO_PROGRESS_LIMIT = 18000;
const RELOAD_COOLDOWN = 7000;
const HARD_REFRESH_AFTER = 5;
const JSON_REFRESH_RETRY_DELAYS = [0, 15000, 30000, 60000, 90000];
const MAX_JSON_REFRESH_FAILURES = 5;
const STALL_REFRESH_WINDOW = 2 * 60 * 1000;
const STALL_REFRESH_THRESHOLD = 3;

function logPlayerEvent(eventName, extra = "") {
  console.log(
    "[" + new Date().toISOString() + "]",
    "[" + "canal-panda" + "]",
    eventName,
    extra
  );
}

function recordStallEvent(details) {
  const now = Date.now();

  stallEvents = stallEvents.filter(function (timestamp) {
    return now - timestamp <= STALL_REFRESH_WINDOW;
  });

  stallEvents.push(now);

  logPlayerEvent(
    "STALL_TRACKED",
    (details || "unknown") + " count=" + stallEvents.length + "/" + STALL_REFRESH_THRESHOLD
  );

  if (stallEvents.length >= STALL_REFRESH_THRESHOLD) {
    stallEvents = [];
    logPlayerEvent("STALL_JSON_REFRESH", details || "repeated-stalls");
    refreshStreamFromJson("repeated-stalls");
  }
}

function resetStallEvents() {
  stallEvents = [];
}

function safePlay() {
  video.play().catch(function (error) {
    console.error("Autoplay bloqué :", error);
  });
}

function destroyHls() {
  if (hls) {
    try {
      hls.destroy();
    } catch (error) {
      console.error("Erreur destruction HLS :", error);
    }
    hls = null;
  }
}

function resetVideoElement() {
  try {
    video.pause();
    video.removeAttribute("src");
    video.load();
  } catch (error) {
    console.error("Erreur reset vidéo :", error);
  }
}

function getHlsResponseStatus(data) {
  try {
    return (
      data?.response?.code ||
      data?.response?.status ||
      data?.networkDetails?.status ||
      data?.networkDetails?.response?.status ||
      0
    );
  } catch (error) {
    return 0;
  }
}

function isExpiredStreamError(data) {
  if (!data) {
    return false;
  }

  const status = getHlsResponseStatus(data);

  const fatalManifestError =
    data.type === Hls.ErrorTypes.NETWORK_ERROR &&
    data.details === "manifestLoadError" &&
    data.fatal === true;

  const fatalLevelError =
    data.type === Hls.ErrorTypes.NETWORK_ERROR &&
    data.details === "levelLoadError" &&
    data.fatal === true;

  const corsMaskedExpiredError =
    status === 0 &&
    data.type === Hls.ErrorTypes.NETWORK_ERROR &&
    (
      data.details === "manifestLoadError" ||
      data.details === "levelLoadError"
    ) &&
    data.fatal === true;

  return (
    status === 410 ||
    status === 403 ||
    status === 404 ||
    fatalManifestError ||
    fatalLevelError ||
    corsMaskedExpiredError
  );
}

function findStreamUrlInJson(value) {
  if (!value) {
    return null;
  }

  if (typeof value === "string") {
    if (value.includes(".m3u8")) {
      return value;
    }
    return null;
  }

  if (Array.isArray(value)) {
    for (const item of value) {
      const found = findStreamUrlInJson(item);
      if (found) {
        return found;
      }
    }
    return null;
  }

  if (typeof value === "object") {
    for (const key of Object.keys(value)) {
      const found = findStreamUrlInJson(value[key]);
      if (found) {
        return found;
      }
    }
  }

  return null;
}

function normalizeClientUrl(url) {
  if (!url) {
    return "";
  }

  if (url.startsWith("http://") || url.startsWith("https://")) {
    return url;
  }

  return "https://livewatch.top" + (url.startsWith("/") ? url : "/" + url);
}

function hardReloadPage(reason) {
  logPlayerEvent("HARD_REFRESH", reason || "unknown");
  console.warn("Hard reload du player :", reason);
  showLoader();

  try {
    clearInterval(healthTimer);
    clearTimeout(reloadTimer);
    clearTimeout(jsonRefreshTimer);
    destroyHls();
  } catch (error) {
    console.error("Erreur avant hard reload :", error);
  }

  try {
    const url = new URL(window.location.href);
    url.searchParams.set("_r", String(Date.now()));
    url.searchParams.set("refreshStream", "1");
    window.location.replace(url.toString());
  } catch (error) {
    window.location.reload();
  }
}

async function refreshStreamFromJson(reason) {
  if (jsonRefreshInProgress) {
    logPlayerEvent("JSON_REFRESH_ALREADY_RUNNING", reason || "unknown");
    return;
  }

  if (!jsonUrl) {
    logPlayerEvent("JSON_REFRESH_NO_URL", reason || "missing-json-url");
    hardReloadPage("missing-json-url");
    return;
  }

  jsonRefreshInProgress = true;
  showLoader();

  try {
    logPlayerEvent("JSON_REFRESH_START", reason || "expired-stream");

    const sourceUrl = new URL(jsonUrl);
    const channelName = sourceUrl.searchParams.get("channel") || "";
    const countries = sourceUrl.searchParams.get("countries") || "pt.json";

    const jsonRefreshTarget = new URL(refreshWorkerUrl);
    jsonRefreshTarget.searchParams.set("channel", channelName);
    jsonRefreshTarget.searchParams.set("countries", countries);
    jsonRefreshTarget.searchParams.set("_r", String(Date.now()));

    const jsonRefreshUrl = jsonRefreshTarget.toString();

    logPlayerEvent("JSON_REFRESH_URL", jsonRefreshUrl);

    const response = await fetch(jsonRefreshUrl, {
      cache: "no-store"
    });

    logPlayerEvent("JSON_REFRESH_HTTP", String(response.status));

    if (!response.ok) {
      throw new Error("HTTP " + response.status);
    }

    const json = await response.json();
    const extractedUrl = findStreamUrlInJson(json);
    const nextStreamUrl = normalizeClientUrl(extractedUrl);

    if (!nextStreamUrl) {
      throw new Error("Aucune URL .m3u8 trouvée dans le JSON");
    }

    if (nextStreamUrl === streamUrl) {
      jsonRefreshFailures += 1;
      logPlayerEvent("JSON_REFRESH_SAME_URL", jsonRefreshFailures + "/" + MAX_JSON_REFRESH_FAILURES);

      if (jsonRefreshFailures >= MAX_JSON_REFRESH_FAILURES) {
        hardReloadPage("json-same-url");
      } else {
        scheduleJsonRefresh("same-url");
      }

      return;
    }

    const currentMuted = video.muted;
    const currentVolume = video.volume;

    streamUrl = nextStreamUrl;
    jsonRefreshFailures = 0;
    reloadCount = 0;
    bufferingStartedAt = null;
    resetStallEvents();

    logPlayerEvent("STREAM_URL_UPDATED", streamUrl);

    clearTimeout(reloadTimer);
    reloadTimer = null;
    clearTimeout(jsonRefreshTimer);
    jsonRefreshTimer = null;

    destroyHls();
    resetVideoElement();

    video.muted = currentMuted;
    video.volume = currentVolume;

    initPlayer();
    logPlayerEvent("JSON_REFRESH_OK", reason || "json-refresh");
  } catch (error) {
    jsonRefreshFailures += 1;
    console.error("Erreur refresh JSON :", error);
    logPlayerEvent("JSON_REFRESH_ERROR", jsonRefreshFailures + "/" + MAX_JSON_REFRESH_FAILURES);

    if (jsonRefreshFailures >= MAX_JSON_REFRESH_FAILURES) {
      hardReloadPage("json-refresh-error");
    } else {
      scheduleJsonRefresh("json-refresh-error");
    }
  } finally {
    jsonRefreshInProgress = false;
  }
}

function scheduleJsonRefresh(reason) {
  if (jsonRefreshTimer) {
    logPlayerEvent("JSON_REFRESH_ALREADY_WAITING", reason || "unknown");
    return;
  }

  const index = Math.min(jsonRefreshFailures, JSON_REFRESH_RETRY_DELAYS.length - 1);
  const delay = JSON_REFRESH_RETRY_DELAYS[index];

  logPlayerEvent(
    "JSON_REFRESH_WAIT",
    "delay=" + Math.round(delay / 1000) + "s reason=" + (reason || "unknown")
  );

  jsonRefreshTimer = setTimeout(function () {
    jsonRefreshTimer = null;
    refreshStreamFromJson(reason || "scheduled-json-refresh");
  }, delay);
}

function attachNativePlayer() {
  video.src = normalizeClientUrl(streamUrl);
  video.load();

  video.addEventListener("loadedmetadata", function () {
    safePlay();
  }, { once: true });
}

function attachHlsPlayer() {
  destroyHls();

  hls = new Hls({
    enableWorker: true,
    lowLatencyMode: true,
    liveSyncDurationCount: 3,
    liveMaxLatencyDurationCount: 8,
    maxBufferLength: 20,
    maxMaxBufferLength: 30,
    backBufferLength: 30,
    fragLoadingTimeOut: 20000,
    manifestLoadingTimeOut: 20000,
    levelLoadingTimeOut: 20000
  });

  hls.loadSource(normalizeClientUrl(streamUrl));
  hls.attachMedia(video);

  hls.on(Hls.Events.MANIFEST_PARSED, function () {
    safePlay();
  });

  hls.on(Hls.Events.FRAG_LOADED, function () {
    lastProgressAt = Date.now();
    resetStallEvents();
  });

  hls.on(Hls.Events.LEVEL_LOADED, function () {
    lastProgressAt = Date.now();
  });

  hls.on(Hls.Events.ERROR, function (event, data) {
    console.error("Erreur HLS :", data);

    const status = getHlsResponseStatus(data);

    logPlayerEvent(
      "HLS_ERROR",
      JSON.stringify({
        type: data?.type || null,
        details: data?.details || null,
        fatal: Boolean(data?.fatal),
        status: status
      })
    );

    if (isExpiredStreamError(data)) {
      console.warn("Flux expiré détecté → refresh JSON dynamique :", {
        status: status,
        type: data?.type || null,
        details: data?.details || null,
        fatal: Boolean(data?.fatal)
      });

      logPlayerEvent("EXPIRED_STREAM_REFRESH", "json-refresh");
      refreshStreamFromJson("expired-stream");
      return;
    }

    if (!data || !data.fatal) {
      if (
        data &&
        data.type === Hls.ErrorTypes.MEDIA_ERROR &&
        (
          data.details === "bufferStalledError" ||
          data.details === "bufferNudgeOnStall"
        )
      ) {
        recordStallEvent(data.details);
      }

      return;
    }

    if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
      refreshStreamFromJson("fatal-network-error");
      return;
    }

    if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
      try {
        hls.recoverMediaError();
        safePlay();
      } catch (error) {
        invisibleReload("media-error");
      }
      return;
    }

    invisibleReload("fatal-error");
  });
}

function initPlayer() {
  lastTime = 0;
  lastProgressAt = Date.now();
  showLoader();

  if (Hls.isSupported()) {
    attachHlsPlayer();
  } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
    attachNativePlayer();
  } else {
    console.error("HLS non supporté.");
  }
}

function invisibleReload(reason) {
  if (reloadTimer || jsonRefreshInProgress) {
    return;
  }

  console.warn("Reload invisible du player :", reason);
  showLoader();

  reloadTimer = setTimeout(function () {
    reloadTimer = null;
    reloadCount += 1;

    const currentMuted = video.muted;
    const currentVolume = video.volume;

    resetVideoElement();
    destroyHls();

    video.muted = currentMuted;
    video.volume = currentVolume;

    initPlayer();

    if (reloadCount >= HARD_REFRESH_AFTER) {
      reloadCount = 0;
      refreshStreamFromJson("reload-limit");
    }
  }, RELOAD_COOLDOWN);
}

function startHealthMonitor() {
  clearInterval(healthTimer);

  healthTimer = setInterval(function () {
    const currentTime = video.currentTime || 0;
    const now = Date.now();

    if (!video.paused && !video.ended && currentTime > lastTime) {
      lastTime = currentTime;
      lastProgressAt = now;
      return;
    }

    const noProgressFor = now - lastProgressAt;

    const seemsStuck =
      !video.paused &&
      !video.ended &&
      noProgressFor > NO_PROGRESS_LIMIT;

    const noEnoughData =
      video.readyState < 2 &&
      noProgressFor > NO_PROGRESS_LIMIT;

    if (seemsStuck || noEnoughData) {
      showLoader();
      refreshStreamFromJson("absence-flux-ou-moulinage");
    }
  }, HEALTH_CHECK_INTERVAL);
}

video.addEventListener("waiting", function () {
  console.warn("Vidéo en attente de données...");
  showLoader();

  if (!bufferingStartedAt) {
    bufferingStartedAt = Date.now();
  }

  logPlayerEvent("BUFFERING_START");
});

video.addEventListener("stalled", function () {
  console.warn("Flux bloqué/stalled.");
  logPlayerEvent("STALLED");
  showLoader();
  refreshStreamFromJson("stalled");
});

video.addEventListener("error", function () {
  console.error("Erreur vidéo native :", video.error);
  logPlayerEvent("VIDEO_ERROR");
  showLoader();
  refreshStreamFromJson("video-error");
});

video.addEventListener("playing", function () {
  lastProgressAt = Date.now();
  hideLoader();

  if (bufferingStartedAt) {
    const bufferingDuration = Math.round(
      (Date.now() - bufferingStartedAt) / 1000
    );

    logPlayerEvent("BUFFERING_END", bufferingDuration + "s");
    bufferingStartedAt = null;
  }

  logPlayerEvent("PLAYING");
});

video.addEventListener("canplay", function () {
  hideLoader();
});

video.addEventListener("timeupdate", function () {
  lastProgressAt = Date.now();
  lastTime = video.currentTime || 0;
});

initPlayer();
startHealthMonitor();

window.addEventListener("beforeunload", function () {
  clearInterval(healthTimer);
  clearTimeout(reloadTimer);
  clearTimeout(jsonRefreshTimer);
  destroyHls();
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TVI Player</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #000;
      overflow: hidden;
    }

    body {
      position: relative;
    }

    #video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: fill;
      background: #000;
    }

    .video-volume-overlay {
      position: absolute;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(8px);
      min-width: 140px;
      max-width: min(70vw, 260px);
      padding: 10px 14px;
      border-radius: 14px;
      border: 1px solid rgba(0, 229, 255, 0.28);
      background: rgba(2, 10, 20, 0.78);
      color: rgba(255, 255, 255, 0.96);
      box-shadow:
        0 0 16px rgba(0, 229, 255, 0.16),
        inset 0 0 18px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      pointer-events: none;
      opacity: 0;
      transition: opacity 160ms ease, transform 160ms ease;
      z-index: 20;
    }

    .video-volume-overlay.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .video-volume-overlay.muted {
      border-color: rgba(255, 145, 0, 0.35);
      box-shadow:
        0 0 18px rgba(255, 145, 0, 0.18),
        inset 0 0 18px rgba(0, 0, 0, 0.45);
    }

    .video-volume-overlay-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 12px;
      line-height: 1;
    }

    .video-volume-overlay-label {
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.78);
    }

    .video-volume-overlay-value {
      font-weight: 700;
      color: rgba(255, 255, 255, 0.98);
    }

    .video-volume-overlay-bar {
      position: relative;
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.10);
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.35);
    }

    .video-volume-overlay-fill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(
        90deg,
        rgba(0, 229, 255, 0.85),
        rgba(255, 145, 0, 0.92)
      );
      box-shadow:
        0 0 10px rgba(0, 229, 255, 0.22),
        0 0 16px rgba(255, 145, 0, 0.18);
      transition: width 120ms ease;
    }
  </style>
</head>
<body>
  <video id="video" controls playsinline></video>

  <div id="volumeOverlay" class="video-volume-overlay" aria-hidden="true">
    <div class="video-volume-overlay-top">
      <span class="video-volume-overlay-label">Volume</span>
      <span id="volumeOverlayValue" class="video-volume-overlay-value">100%</span>
    </div>
    <div class="video-volume-overlay-bar">
      <div id="volumeOverlayFill" class="video-volume-overlay-fill"></div>
    </div>
  </div>

  <script>
    (function () {
      const video = document.getElementById('video');
      const overlay = document.getElementById('volumeOverlay');
      const overlayValue = document.getElementById('volumeOverlayValue');
      const overlayFill = document.getElementById('volumeOverlayFill');

      const STREAM_URL = 'https://raw.githubusercontent.com/LITUATUI/M3UPT/refs/heads/main/M3U/TVI.m3u';
      const VOLUME_STEP = 0.05;
      const OVERLAY_HIDE_DELAY = 850;

      let overlayTimer = null;
      let hls = null;

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function renderVolumeOverlay(forceShow) {
        const normalized = video.muted ? 0 : clamp(Number(video.volume) || 0, 0, 1);
        const percent = Math.round(normalized * 100);

        overlayValue.textContent = percent === 0 ? 'Muet' : `${percent}%`;
        overlayFill.style.width = `${percent}%`;
        overlay.classList.toggle('muted', percent === 0);

        if (forceShow) {
          overlay.classList.add('show');

          clearTimeout(overlayTimer);
          overlayTimer = setTimeout(() => {
            overlay.classList.remove('show');
          }, OVERLAY_HIDE_DELAY);
        }
      }

      function enableWheelVolume() {
        video.addEventListener('wheel', function (event) {
          event.preventDefault();

          let nextVolume = video.muted ? 0 : (Number(video.volume) || 0);

          if (event.deltaY > 0) {
            nextVolume -= VOLUME_STEP;
          } else {
            nextVolume += VOLUME_STEP;
          }

          nextVolume = clamp(nextVolume, 0, 1);

          video.volume = nextVolume;
          video.muted = nextVolume === 0;

          renderVolumeOverlay(true);
        }, { passive: false });

        video.addEventListener('volumechange', function () {
          renderVolumeOverlay(false);
        });

        renderVolumeOverlay(false);
      }

      function startPlayback() {
        const playPromise = video.play();
        if (playPromise && typeof playPromise.catch === 'function') {
          playPromise.catch(() => {
            // autoplay parfois bloqué tant qu'il n'y a pas d'interaction utilisateur
          });
        }
      }

      function initHlsPlayer() {
        if (window.Hls && Hls.isSupported()) {
          hls = new Hls({
            debug: true,
            enableWorker: true,
            lowLatencyMode: true,
            backBufferLength: 90
          });

          hls.loadSource(STREAM_URL);
          hls.attachMedia(video);

          hls.on(Hls.Events.MEDIA_ATTACHED, function () {
            video.muted = false;
            startPlayback();
          });

          return;
        }

        if (video.canPlayType('application/vnd.apple.mpegurl')) {
          video.src = STREAM_URL;
          video.addEventListener('canplay', function onCanPlay() {
            video.removeEventListener('canplay', onCanPlay);
            startPlayback();
          });
        }
      }

      enableWheelVolume();
      initHlsPlayer();
    })();
  </script>
</body>
</html>

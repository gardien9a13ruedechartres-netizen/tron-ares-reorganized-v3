<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Player plein page</title>

  <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
  <script src="https://one.timesup.top/resources/scripts/newucaster.js?id=1573542001724"></script>

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
    }

    .player_div {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      z-index: 100;
      overflow: hidden;
    }

    .player_div video,
    .player_div .player-content,
    .player_div [data-player],
    .player_div .container {
      width: 100% !important;
      height: 100% !important;
    }

    .player_div video {
      object-fit: fill !important;
      object-position: center center !important;
    }

    .media-control[data-media-control] .media-control-layer[data-controls] button.media-control-button svg path,
    .media-control[data-media-control] .media-control-layer[data-controls] .drawer-container[data-volume] .drawer-icon-container[data-volume] .drawer-icon[data-volume] svg path,
    .player-poster[data-poster] .play-wrapper[data-poster] svg path {
      fill: #006aff;
    }

    .media-control[data-media-control] .media-control-layer[data-controls] .drawer-container[data-volume] .bar-container[data-volume] .segmented-bar-element[data-volume],
    .media-control[data-media-control] .media-control-layer[data-controls] .drawer-container[data-volume] .bar-container[data-volume] .segmented-bar-element[data-volume].fill {
      box-shadow: inset 2px 0 0 #006aff;
    }

    .media-control[data-media-control] .media-control-layer[data-controls] .drawer-container[data-volume] .bar-container[data-volume] .segmented-bar-element[data-volume].fill {
      opacity: 1;
    }

    .spinner-three-bounce[data-spinner] > div {
      background-color: #006aff;
    }
  .media-control.live[data-media-control] .media-control-layer[data-controls] .bar-container[data-seekbar] .bar-background[data-seekbar] .bar-fill-2[data-seekbar] {
  background-color: #0adcf1;
}
  
  
  .media-control[data-media-control] .media-control-layer[data-controls] .drawer-container[data-volume] .bar-container[data-volume] .segmented-bar-element[data-volume], .media-control[data-media-control] .media-control-layer[data-controls] .drawer-container[data-volume] .bar-container[data-volume] .segmented-bar-element[data-volume].fill {
  box-shadow: inset 2px 0 0 #0adcf1;
}
  .media-control[data-media-control] .media-control-layer[data-controls] button.media-control-button svg path, .media-control[data-media-control] .media-control-layer[data-controls] .drawer-container[data-volume] .drawer-icon-container[data-volume] .drawer-icon[data-volume] svg path, .player-poster[data-poster] .play-wrapper[data-poster] svg path {
  fill: #0adcf1;
}
  
  
  </style>
</head>

<body>
  <div class="player_div" id="player_div"></div>

  <script>
    const ea = "muc001.myturn1.top";
    const playerElement = document.getElementById("player_div");

    let player = null;

    function forceObjectFitFill() {
      const video = playerElement.querySelector("video");

      if (video) {
        video.style.width = "100%";
        video.style.height = "100%";
        video.style.objectFit = "fill";
        video.style.objectPosition = "center center";
      }
    }

    function setupVideo() {
      const pk = "55e0c5e758904f24491a24dcf7b039654e47682f5cc8226acfec0X22aa069037adf2c2df3d185c8f3a0b5bf5b4f7f5d20712ec6116f58fc6266371b830a1bcf5d";

      const hlsUrl =
        "https://" +
        ea +
        ":8088/live/agrrrrr/playlist.m3u8?id=121119&pk=" +
        enableVideo(pk);

      player = new Clappr.Player({
        source: hlsUrl,
        disableErrorScreen: true,
        mute: false,
        autoPlay: true,
        height: "100%",
        width: "100%",
        parentId: "#player_div",
        events: {
          onReady: function () {
            forceObjectFitFill();
          },

          onPlay: function () {
            forceObjectFitFill();
          },

          onError: function () {
            setTimeout(function () {
              if (player) {
                player.configure(player.options);
                forceObjectFitFill();
              }
            }, 10000);
          }
        }
      });

      setTimeout(forceObjectFitFill, 500);
      setTimeout(forceObjectFitFill, 1500);
    }

    setupVideo();

    window.addEventListener("resize", forceObjectFitFill);
  </script>
</body>
</html>

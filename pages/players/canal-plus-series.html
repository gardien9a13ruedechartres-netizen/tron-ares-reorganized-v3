<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>CANAL-PLUS-SERIES</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #video {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: fill;
      background: #000;
      z-index: 1;
    }

    #loadingOverlay {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.045), rgba(0,0,0,0.94) 48%, #000 100%);
      opacity: 1;
      visibility: visible;
      transition: opacity 0.45s ease, visibility 0.45s ease;
      pointer-events: none;
    }

    #loadingOverlay.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .premiumLoader {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.16);
      border-top-color: rgba(255, 255, 255, 0.95);
      border-right-color: rgba(255, 255, 255, 0.50);
      animation: premiumSpin 0.95s linear infinite;
      filter: drop-shadow(0 0 14px rgba(255, 255, 255, 0.16));
    }

    .premiumLoader::after {
      content: "";
      position: absolute;
      inset: 11px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.10);
    }

    @keyframes premiumSpin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>

<video id="video" autoplay playsinline controls></video>

<div id="loadingOverlay" aria-hidden="true">
  <div class="premiumLoader"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
let streamUrl = "https://livewatch.top/api/proxy?url=http%3A%2F%2F45.143.220.208%3A8008%2Fsunshine%2FCF3s-3CiJc1azqs4YJeO0eTYBBWpVOrVESnj3zUuTyEcek3jsJWKV9_tBP6N48GU2sK8uxV3ZA-aK2uYCJNScsC4_snNSBvDtbG8Al4dH3qgd2A-VJgrFVkydXvpDydLS1EVI_CyjO_YbanKWIZcuoCQ9Fy83erElpJVYWt_Cj7m0E0fZfahFEF8Trx2Mk6bTk97keO6lcg-7aB7RweMAKiBl4ZE2-VlNtt6wAxMg2o7ykFxv2rRT7Yq6jOszToRsUGP58oVOXwfXK_bFLXitA%2Fhls%2Findex.m3u8";
const streamJsonUrl = "https://livewatch.top/api/tvvoo/stream?channel=CANAL SERIES HD&countries=fr.json";
const baseDomain = "https://livewatch.top";
const playerSlug = "canal-plus-series";

const video = document.getElementById("video");
const loadingOverlay = document.getElementById("loadingOverlay");

video.muted = false;
video.volume = 1;

let hls = null;
let reloadTimer = null;
let healthTimer = null;
let stallRecoveryTimer = null;
let lastTime = 0;
let lastProgressAt = Date.now();
let reloadCount = 0;
let bufferingStartedAt = null;
let stallRecoveryAttempts = 0;
let streamRefreshInProgress = false;
let streamRefreshFailures = 0;
let lastHardReloadAt = 0;
let hardReloadCount = 0;

const HEALTH_CHECK_INTERVAL = 5000;
const NO_PROGRESS_LIMIT = 18000;
const RELOAD_COOLDOWN = 7000;
const HARD_REFRESH_AFTER = 5;
const STALL_RECOVERY_TIMEOUT = 12000;
const MAX_STALL_RECOVERY_ATTEMPTS = 3;
const HARD_RELOAD_MIN_INTERVAL = 15000;
const HARD_RELOAD_MAX_LOOP = 3;
const MAX_STREAM_REFRESH_FAILURES = 2;

function logPlayerEvent(eventName, extra) {
  console.log(
    "[" + new Date().toISOString() + "]",
    "[" + playerSlug + "]",
    eventName,
    extra || ""
  );
}

function showLoader() {
  if (loadingOverlay) {
    loadingOverlay.classList.remove("hidden");
  }
}

function hideLoader() {
  if (loadingOverlay) {
    loadingOverlay.classList.add("hidden");
  }
}

function safePlay() {
  video.play().catch(function (error) {
    console.error("Autoplay bloqué :", error);
  });
}

function clearStallRecoveryTimer() {
  if (stallRecoveryTimer) {
    clearTimeout(stallRecoveryTimer);
    stallRecoveryTimer = null;
  }
}

function resetStallRecovery() {
  clearStallRecoveryTimer();
  stallRecoveryAttempts = 0;
}

function destroyHls() {
  if (hls) {
    try {
      hls.destroy();
    } catch (error) {
      console.error("Erreur destruction HLS :", error);
    }
    hls = null;
  }
}

function normalizeClientUrl(url) {
  const cleanUrl = String(url || "").trim();

  if (cleanUrl.startsWith("http://") || cleanUrl.startsWith("https://")) {
    return cleanUrl;
  }

  if (cleanUrl.startsWith("/")) {
    return baseDomain + cleanUrl;
  }

  return baseDomain + "/" + cleanUrl;
}

function findStreamUrlInJson(data) {
  if (typeof data === "string") {
    if (data.includes(".m3u8") || data.includes("api/proxy")) {
      return data;
    }
    return null;
  }

  if (Array.isArray(data)) {
    for (const item of data) {
      const found = findStreamUrlInJson(item);
      if (found) return found;
    }
  }

  if (data && typeof data === "object") {
    for (const value of Object.values(data)) {
      const found = findStreamUrlInJson(value);
      if (found) return found;
    }
  }

  return null;
}

function getHlsResponseStatus(data) {
  try {
    return (
      data?.response?.code ||
      data?.response?.status ||
      data?.networkDetails?.status ||
      data?.networkDetails?.response?.status ||
      data?.loader?.stats?.status ||
      0
    );
  } catch (error) {
    return 0;
  }
}

function isExpiredStreamError(data) {
  if (!data) {
    return false;
  }

  const status = getHlsResponseStatus(data);

  const fatalManifestError =
    data.type === Hls.ErrorTypes.NETWORK_ERROR &&
    data.details === "manifestLoadError" &&
    data.fatal === true;

  const fatalLevelError =
    data.type === Hls.ErrorTypes.NETWORK_ERROR &&
    data.details === "levelLoadError" &&
    data.fatal === true;

  const corsMaskedExpiredError =
    status === 0 &&
    data.type === Hls.ErrorTypes.NETWORK_ERROR &&
    (
      data.details === "manifestLoadError" ||
      data.details === "levelLoadError"
    ) &&
    data.fatal === true;

  return (
    status === 410 ||
    status === 403 ||
    status === 404 ||
    fatalManifestError ||
    fatalLevelError ||
    corsMaskedExpiredError
  );
}

function buildNoCacheUrl(url) {
  const requestUrl = new URL(url, window.location.href);
  requestUrl.searchParams.set("_r", String(Date.now()));
  return requestUrl.toString();
}

function resetVideoElement() {
  try {
    video.pause();
    video.removeAttribute("src");
    video.load();
  } catch (error) {
    console.error("Erreur reset vidéo :", error);
  }
}

function restartPlayerWithStream(newStreamUrl, reason) {
  if (!newStreamUrl) {
    return false;
  }

  const normalizedNewUrl = normalizeClientUrl(newStreamUrl);

  if (normalizedNewUrl === streamUrl) {
    logPlayerEvent("STREAM_URL_UNCHANGED", reason || "same-url");
    return false;
  }

  const currentMuted = video.muted;
  const currentVolume = video.volume;

  logPlayerEvent("STREAM_URL_UPDATED", reason || "json-refresh");
  showLoader();
  resetStallRecovery();
  clearTimeout(reloadTimer);
  reloadTimer = null;

  destroyHls();
  resetVideoElement();

  streamUrl = normalizedNewUrl;
  video.muted = currentMuted;
  video.volume = currentVolume;
  reloadCount = 0;
  lastTime = 0;
  lastProgressAt = Date.now();

  initPlayer();
  return true;
}

async function refreshStreamFromJson(reason) {
  if (streamRefreshInProgress) {
    logPlayerEvent("STREAM_JSON_REFRESH_SKIPPED", reason || "already-running");
    return;
  }

  streamRefreshInProgress = true;
  showLoader();
  logPlayerEvent("STREAM_JSON_REFRESH_START", reason || "refresh");

  try {
    const response = await fetch(buildNoCacheUrl(streamJsonUrl), {
      cache: "no-store",
      headers: {
        "Cache-Control": "no-cache"
      }
    });

    logPlayerEvent("STREAM_JSON_STATUS", String(response.status));

    if (!response.ok) {
      throw new Error("JSON HTTP " + response.status);
    }

    const json = await response.json();
    const extractedUrl = findStreamUrlInJson(json);

    if (!extractedUrl) {
      throw new Error("Aucune URL HLS trouvée dans le JSON dynamique");
    }

    const changed = restartPlayerWithStream(extractedUrl, reason || "json-refresh");

    if (changed) {
      streamRefreshFailures = 0;
      logPlayerEvent("STREAM_JSON_REFRESH_OK", reason || "json-refresh");
      return;
    }

    streamRefreshFailures += 1;
    logPlayerEvent("STREAM_JSON_REFRESH_SAME_URL", streamRefreshFailures + "/" + MAX_STREAM_REFRESH_FAILURES);

    if (streamRefreshFailures >= MAX_STREAM_REFRESH_FAILURES) {
      hardReloadPage("json-same-url");
    }
  } catch (error) {
    streamRefreshFailures += 1;
    console.error("Erreur refresh JSON dynamique :", error);
    logPlayerEvent("STREAM_JSON_REFRESH_ERROR", streamRefreshFailures + "/" + MAX_STREAM_REFRESH_FAILURES);

    if (streamRefreshFailures >= MAX_STREAM_REFRESH_FAILURES) {
      hardReloadPage("json-refresh-error");
    }
  } finally {
    streamRefreshInProgress = false;
  }
}

function hardReloadPage(reason) {
  const now = Date.now();

  if ((now - lastHardReloadAt) < HARD_RELOAD_MIN_INTERVAL) {
    hardReloadCount += 1;
    logPlayerEvent("HARD_REFRESH_BLOCKED", hardReloadCount + "/" + HARD_RELOAD_MAX_LOOP);

    if (hardReloadCount >= HARD_RELOAD_MAX_LOOP) {
      console.warn("Boucle de refresh détectée, arrêt des reloads.");
      return;
    }
  } else {
    hardReloadCount = 0;
  }

  lastHardReloadAt = now;

  console.warn("Hard reload du player :", reason);
  logPlayerEvent("HARD_REFRESH", reason || "unknown");
  showLoader();

  try {
    destroyHls();
  } catch (error) {
    console.error("Erreur avant hard reload :", error);
  }

  const url = new URL(window.location.href);
  url.searchParams.set("_r", String(Date.now()));
  url.searchParams.set("refreshStream", "1");
  window.location.replace(url.toString());
}

function attachNativePlayer() {
  video.src = streamUrl;
  video.load();

  video.addEventListener("loadedmetadata", function () {
    safePlay();
  }, { once: true });
}

function attachHlsPlayer() {
  destroyHls();

  hls = new Hls({
    enableWorker: true,
    lowLatencyMode: true,
    liveSyncDurationCount: 3,
    liveMaxLatencyDurationCount: 8,
    maxBufferLength: 20,
    maxMaxBufferLength: 30,
    backBufferLength: 30,
    fragLoadingTimeOut: 20000,
    manifestLoadingTimeOut: 20000,
    levelLoadingTimeOut: 20000
  });

  hls.loadSource(streamUrl);
  hls.attachMedia(video);

  hls.on(Hls.Events.MANIFEST_PARSED, function () {
    safePlay();
  });

  hls.on(Hls.Events.FRAG_LOADED, function () {
    lastProgressAt = Date.now();
  });

  hls.on(Hls.Events.LEVEL_LOADED, function () {
    lastProgressAt = Date.now();
  });

  hls.on(Hls.Events.ERROR, function (event, data) {
    console.error("Erreur HLS :", data);

    const status = getHlsResponseStatus(data);

    logPlayerEvent(
      "HLS_ERROR",
      JSON.stringify({
        type: data?.type || null,
        details: data?.details || null,
        fatal: Boolean(data?.fatal),
        status: status
      })
    );

    if (isExpiredStreamError(data)) {
      console.warn("Flux expiré détecté → refresh JSON dynamique :", {
        status: status,
        type: data?.type || null,
        details: data?.details || null,
        fatal: Boolean(data?.fatal)
      });

      logPlayerEvent("EXPIRED_STREAM_REFRESH", "json-dynamic-refresh");
      refreshStreamFromJson("expired-stream");
      return;
    }

    if (!data || !data.fatal) {
      return;
    }

    if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
      refreshStreamFromJson("fatal-network-error");
      return;
    }

    if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
      try {
        hls.recoverMediaError();
      } catch (error) {
        invisibleReload("media-error");
      }
      return;
    }

    invisibleReload("fatal-error");
  });
}

function initPlayer() {
  lastTime = 0;
  lastProgressAt = Date.now();
  showLoader();

  if (Hls.isSupported()) {
    attachHlsPlayer();
  } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
    attachNativePlayer();
  } else {
    console.error("HLS non supporté.");
  }
}

function invisibleReload(reason) {
  if (reloadTimer) {
    return;
  }

  console.warn("Reload invisible du player :", reason);
  logPlayerEvent("INVISIBLE_RELOAD", reason || "unknown");
  showLoader();

  reloadTimer = setTimeout(function () {
    reloadTimer = null;
    reloadCount += 1;

    const currentMuted = video.muted;
    const currentVolume = video.volume;

    resetVideoElement();
    destroyHls();

    video.muted = currentMuted;
    video.volume = currentVolume;

    initPlayer();

    if (reloadCount >= HARD_REFRESH_AFTER) {
      reloadCount = 0;
      refreshStreamFromJson("too-many-invisible-reloads");
    }
  }, RELOAD_COOLDOWN);
}

function scheduleStallRecovery(reason) {
  clearStallRecoveryTimer();

  stallRecoveryTimer = setTimeout(function () {
    stallRecoveryAttempts += 1;
    logPlayerEvent("STALL_TIMEOUT", reason || "waiting");
    logPlayerEvent("STALL_RECOVER_ATTEMPT", stallRecoveryAttempts + "/" + MAX_STALL_RECOVERY_ATTEMPTS);

    try {
      if (hls) {
        hls.recoverMediaError();
        safePlay();
      }

      if (stallRecoveryAttempts >= MAX_STALL_RECOVERY_ATTEMPTS) {
        logPlayerEvent("STALL_JSON_REFRESH", reason || "stall-timeout");
        refreshStreamFromJson("stall-timeout");
      }
    } catch (error) {
      console.error("Erreur recovery stall :", error);
      invisibleReload("stall-recovery-error");
    }
  }, STALL_RECOVERY_TIMEOUT);
}

function startHealthMonitor() {
  clearInterval(healthTimer);

  healthTimer = setInterval(function () {
    const currentTime = video.currentTime || 0;
    const now = Date.now();

    if (!video.paused && !video.ended && currentTime > lastTime) {
      lastTime = currentTime;
      lastProgressAt = now;
      return;
    }

    const noProgressFor = now - lastProgressAt;

    const seemsStuck =
      !video.paused &&
      !video.ended &&
      noProgressFor > NO_PROGRESS_LIMIT;

    const noEnoughData =
      video.readyState < 2 &&
      noProgressFor > NO_PROGRESS_LIMIT;

    if (seemsStuck || noEnoughData) {
      showLoader();
      logPlayerEvent("HEALTH_STUCK", Math.round(noProgressFor / 1000) + "s");
      refreshStreamFromJson("absence-flux-ou-moulinage");
    }
  }, HEALTH_CHECK_INTERVAL);
}

video.addEventListener("waiting", function () {
  console.warn("Vidéo en attente de données...");
  showLoader();

  if (!bufferingStartedAt) {
    bufferingStartedAt = Date.now();
    logPlayerEvent("BUFFERING_START");
  }

  scheduleStallRecovery("waiting");
});

video.addEventListener("stalled", function () {
  console.warn("Flux bloqué/stalled.");
  showLoader();
  scheduleStallRecovery("stalled");
});

video.addEventListener("error", function () {
  console.error("Erreur vidéo native :", video.error);
  showLoader();
  refreshStreamFromJson("video-error");
});

video.addEventListener("playing", function () {
  lastProgressAt = Date.now();
  resetStallRecovery();
  hideLoader();

  if (bufferingStartedAt) {
    const bufferingDuration = Math.round(
      (Date.now() - bufferingStartedAt) / 1000
    );

    logPlayerEvent(
      "BUFFERING_END",
      bufferingDuration + "s"
    );

    bufferingStartedAt = null;
  }

  logPlayerEvent("PLAYING");
});

video.addEventListener("canplay", function () {
  hideLoader();
});

video.addEventListener("timeupdate", function () {
  lastProgressAt = Date.now();
  lastTime = video.currentTime || 0;
});

initPlayer();
startHealthMonitor();

window.addEventListener("beforeunload", function () {
  clearInterval(healthTimer);
  clearTimeout(reloadTimer);
  clearStallRecoveryTimer();
  destroyHls();
});
</script>

</body>
</html>

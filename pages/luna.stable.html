  function resize(){
    const dpr = window.devicePixelRatio || 1;

    const pr = elPlayer.getBoundingClientRect();
    viz.width = Math.floor(pr.width * dpr);
    viz.height= Math.floor(pr.height * dpr);
    viz.style.width = pr.width+"px";
    viz.style.height= pr.height+"px";
    vizCtx.setTransform(dpr,0,0,dpr,0,0);

    const vr = volArcLayer.getBoundingClientRect();
    volArc.width  = Math.floor(vr.width * dpr);
    volArc.height = Math.floor(vr.height * dpr);
    volCtx.setTransform(dpr,0,0,dpr,0,0);

    drawVolumeArc();
    updateScrubUI(false);
  }
  window.addEventListener("resize", resize);

  function drawVolumeArc(){
    const w = volArc.clientWidth;
    const h = volArc.clientHeight;
    volCtx.clearRect(0,0,w,h);

    const accent = cssVar("--accent") || "#85c5cc";
    const track = "rgba(255,255,255,.18)";
    const trackBack = "rgba(255,255,255,.08)";
    const glow = hexToRgba(accent, 0.25);

    const cx = w/2;
    const cy = h/2;
    const r = Math.min(w,h) * 0.46;

    const start = Math.PI;
    const end   = Math.PI * 2;

    const pad = 0.06;
    const s = start + pad;
    const e = end - pad;

    const vv = (isMuted ? 0 : volumeValue) / 100;
    const a = s + vv * (e - s);

    const lineW = Math.max(8, Math.min(14, Math.min(w,h)*0.03));
    const cap = "round";

    volCtx.save();
    volCtx.lineCap = cap;
    volCtx.strokeStyle = trackBack;
    volCtx.lineWidth = lineW + 6;
    volCtx.beginPath();
    volCtx.arc(cx, cy, r, s, e, false);
    volCtx.stroke();
    volCtx.restore();

    volCtx.save();
    volCtx.lineCap = cap;
    volCtx.strokeStyle = track;
    volCtx.lineWidth = lineW;
    volCtx.beginPath();
    volCtx.arc(cx, cy, r, s, e, false);
    volCtx.stroke();
    volCtx.restore();

    volCtx.save();
    volCtx.lineCap = cap;
    volCtx.shadowColor = glow;
    volCtx.shadowBlur = 22;
    volCtx.strokeStyle = hexToRgba(accent, 0.70);
    volCtx.lineWidth = lineW;
    volCtx.beginPath();
    volCtx.arc(cx, cy, r, s, a, false);
    volCtx.stroke();
    volCtx.restore();

    const kAng = a;
    const kx = cx + Math.cos(kAng) * r;
    const ky = cy + Math.sin(kAng) * r;
    const kR = lineW * 0.95;

    volCtx.save();
    volCtx.shadowColor = glow;
    volCtx.shadowBlur = 26;
    volCtx.fillStyle = hexToRgba(accent, 0.85);
    volCtx.beginPath();
    volCtx.arc(kx, ky, kR, 0, Math.PI*2);
    volCtx.fill();
    volCtx.restore();

    volCtx.strokeStyle = "rgba(255,255,255,.18)";
    volCtx.lineWidth = 2;
    volCtx.beginPath();
    volCtx.arc(kx, ky, kR, 0, Math.PI*2);
    volCtx.stroke();

    volCtx.fillStyle = "rgba(255,255,255,.55)";
    volCtx.beginPath();
    volCtx.arc(kx - kR*0.25, ky - kR*0.25, kR*0.32, 0, Math.PI*2);
    volCtx.fill();
  }

  let dragging = false;
  function setVolumeFromPointer(clientX, clientY){
    const r = volArcLayer.getBoundingClientRect();
    const x = clientX - r.left;
    const y = clientY - r.top;

    const cx = r.width/2;
    const cy = r.height/2;
    const dx = x - cx;
    const dy = y - cy;

    let ang = Math.atan2(dy, dx);
    ang = normAngle(ang);

    const start = Math.PI;
    const end = Math.PI * 2;

    let clamped = ang;
    if(ang < start){
      clamped = (ang < (start/2)) ? end : start;
    }else if(ang > end){
      clamped = end;
    }

    const pad = 0.06;
    const s = start + pad;
    const e = end - pad;

    clamped = Math.max(s, Math.min(e, clamped));
    const t = (clamped - s) / (e - s);
    const v = Math.round(t * 100);

    if(isMuted && v > 0){
      isMuted = false;
      elAudio.muted = false;
      updateMuteUI();
    }
    setVolume(v);
  }

  volArcGrab.addEventListener("pointerdown", (e)=>{
    dragging = true;
    volArcGrab.setPointerCapture(e.pointerId);
    setVolumeFromPointer(e.clientX, e.clientY);
  });
  volArcGrab.addEventListener("pointermove", (e)=>{
    if(!dragging) return;
    setVolumeFromPointer(e.clientX, e.clientY);
  });
  function endDrag(){ dragging=false; }
  volArcGrab.addEventListener("pointerup", endDrag);
  volArcGrab.addEventListener("pointercancel", endDrag);

  const SCROLL_STEP = 3;
  volArcGrab.addEventListener("wheel", (e) => {
    e.preventDefault();
    const dir = Math.sign(e.deltaY);
    const next = volumeValue + (dir > 0 ? -SCROLL_STEP : SCROLL_STEP);
    if(isMuted && next > 0){
      isMuted = false;
      elAudio.muted = false;
      updateMuteUI();
    }
    setVolume(next);
  }, { passive:false });

  // Scrub bar (inchangé)
  function fmtHMS(sec){
    if(!Number.isFinite(sec) || sec < 0) sec = 0;
    const s = Math.floor(sec);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const r = s % 60;
    return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(r).padStart(2,"0")}`;
  }

  function getScrubModel(){
    const d = elAudio.duration;
    if(Number.isFinite(d) && d > 0){
      return { mode:"file", start:0, end:d, window:d, seekable:true };
    }
    try{
      const sk = elAudio.seekable;
      if(sk && sk.length > 0){
        const start = sk.start(0);
        const end = sk.end(sk.length - 1);
        const win = end - start;
        if(Number.isFinite(start) && Number.isFinite(end) && win > 1){
          return { mode:"dvr", start, end, window:win, seekable:true };
        }
      }
    }catch(_){}
    return { mode:"live", start:0, end:0, window:0, seekable:false };
  }

  function setScrubToPercent(pct){
    const r = scrubWrap.getBoundingClientRect();
    const w = Math.max(1, r.width);
    const radius = 18.67 / 2;
    const x = (pct/100) * w;

    scrubFill.style.width = `${Math.max(0, Math.min(w, x))}px`;
    scrubIcon.style.left = `${x - radius}px`;
  }

  function updateScrubUI(){
    const model = getScrubModel();
    scrubWrap.classList.remove("is-live");

    if(model.mode === "live"){
      const cur = elAudio.currentTime || 0;
      timeStart.textContent = fmtHMS(cur);
      timeEnd.textContent = "LIVE";

      const cycle = 6;
      const pct = ((cur % cycle) / cycle) * 100;
      scrubLoaded.style.width = "100%";
      setScrubToPercent(pct);
      return;
    }

    const curAbs = elAudio.currentTime || 0;
    const start = model.start;
    const end = model.end;
    const win = model.window;

    const cur = Math.max(start, Math.min(curAbs, end));
    const curInWin = cur - start;
    const pct = win > 0 ? (curInWin / win) * 100 : 0;

    let bufPct = 0;
    try{
      if(elAudio.buffered && elAudio.buffered.length > 0){
        const bend = elAudio.buffered.end(elAudio.buffered.length-1);
        const bRel = Math.max(0, Math.min(win, bend - start));
        bufPct = win > 0 ? Math.max(0, Math.min(100, (bRel / win) * 100)) : 0;
      }
    }catch(_){}

    timeStart.textContent = fmtHMS(curInWin);
    timeEnd.textContent = fmtHMS(win);

    scrubLoaded.style.width = `${bufPct}%`;
    setScrubToPercent(Math.max(0, Math.min(100, pct)));
  }

  let scrubDragging = false;
  function scrubSeekFromClientX(clientX){
    const model = getScrubModel();
    if(!model.seekable) return;

    const r = scrubWrap.getBoundingClientRect();
    const x = Math.max(0, Math.min(r.width, clientX - r.left));
    const t = r.width > 0 ? x / r.width : 0;

    const target = model.start + t * model.window;
    if(Number.isFinite(target)){
      elAudio.currentTime = target;
      updateScrubUI();
    }
  }

  scrubGrab.addEventListener("pointerdown", (e)=>{
    const model = getScrubModel();
    if(!model.seekable) return;
    scrubDragging = true;
    scrubGrab.setPointerCapture(e.pointerId);
    scrubSeekFromClientX(e.clientX);
  });
  scrubGrab.addEventListener("pointermove", (e)=>{
    if(!scrubDragging) return;
    scrubSeekFromClientX(e.clientX);
  });
  function scrubEnd(){ scrubDragging = false; }
  scrubGrab.addEventListener("pointerup", scrubEnd);
  scrubGrab.addEventListener("pointercancel", scrubEnd);

  elAudio.addEventListener("timeupdate", ()=> updateScrubUI());
  elAudio.addEventListener("progress", ()=> updateScrubUI());
  elAudio.addEventListener("durationchange", ()=> updateScrubUI());
  elAudio.addEventListener("loadedmetadata", ()=> updateScrubUI());
  elAudio.addEventListener("playing", ()=> updateScrubUI());
  elAudio.addEventListener("pause", ()=> updateScrubUI());

  // Visualizer (TON code original)
  function roundRect(ctx, x, y, w, h, r){
    const rr = Math.min(r, w/2, h/2);
    ctx.beginPath();
    ctx.moveTo(x+rr, y);
    ctx.arcTo(x+w, y, x+w, y+h, rr);
    ctx.arcTo(x+w, y+h, x, y+h, rr);
    ctx.arcTo(x, y+h, x, y, rr);
    ctx.arcTo(x, y, x+w, y, rr);
    ctx.closePath();
  }

  function smoothBins(src, bars){
    const out = new Array(bars).fill(0);
    const len = src.length;
    const step = Math.max(1, Math.floor(len / bars));
    for(let i=0;i<bars;i++){
      let sum=0, n=0;
      const base = i*step;
      for(let k=0;k<step;k++){
        const v = src[base+k];
        if(v==null) break;
        sum += v;
        n++;
      }
      out[i] = n ? (sum/n)/255 : 0;
    }
    for(let i=1;i<bars-1;i++){
      out[i] = (out[i-1]*0.20 + out[i]*0.60 + out[i+1]*0.20);
    }
    return out;
  }

  let fakeT = 0;
  function fakeBins(bars){
    fakeT += 0.015;
    const out = new Array(bars).fill(0);
    for(let i=0;i<bars;i++){
      const phase = fakeT + i*0.16;
      const a = 0.18 + 0.42*(0.5 + 0.5*Math.sin(phase));
      out[i] = a * (isPlaying ? 1 : 0.55);
    }
    return out;
  }

  function drawWaveLine(w, h, amp, accent){
    let samples = null;

    if(analyzerEnabled && analyser && !corsLikelyBlocked){
      try{
        analyser.getByteTimeDomainData(timeData);
        samples = timeData;
      }catch(_){
        corsLikelyBlocked = true;
      }
    }

    const midY = h * 0.46;
    const padX = 24;

    vizCtx.save();
    vizCtx.lineWidth = 2;
    vizCtx.lineJoin = "round";
    vizCtx.lineCap  = "round";

    vizCtx.shadowBlur = 0;
    vizCtx.strokeStyle = "rgba(255,255,255,.18)";
    vizCtx.beginPath();

    const N = 180;
    for(let i=0;i<N;i++){
      const t = i/(N-1);
      const x = padX + t*(w - padX*2);

      let y = midY;
      if(samples){
        const idx = Math.floor(t*(samples.length-1));
        const v = (samples[idx]-128)/128;
        y = midY + v*amp;
      }else{
        const v = Math.sin(fakeT*2.2 + i*0.16) * 0.55 + Math.sin(fakeT*1.1 + i*0.07)*0.35;
        y = midY + v*amp*0.55;
      }

      if(i===0) vizCtx.moveTo(x,y);
      else{
        const px = padX + ( (i-1)/(N-1) )*(w - padX*2);
        const py = vizCtx._lastY ?? y;
        const cx = (px + x) / 2;
        const cy = (py + y) / 2;
        vizCtx.quadraticCurveTo(px, py, cx, cy);
      }
      vizCtx._lastY = y;
    }
    vizCtx.stroke();
    delete vizCtx._lastY;

    vizCtx.shadowColor = hexToRgba(accent, 0.35);
    vizCtx.shadowBlur = 18;
    vizCtx.strokeStyle = hexToRgba(accent, 0.30);
    vizCtx.beginPath();
    for(let i=0;i<N;i++){
      const t = i/(N-1);
      const x = padX + t*(w - padX*2);

      let y = midY;
      if(samples){
        const idx = Math.floor(t*(samples.length-1));
        const v = (samples[idx]-128)/128;
        y = midY + v*amp;
      }else{
        const v = Math.sin(fakeT*2.2 + i*0.16) * 0.55 + Math.sin(fakeT*1.1 + i*0.07)*0.35;
        y = midY + v*amp*0.55;
      }

      if(i===0) vizCtx.moveTo(x,y);
      else{
        const px = padX + ( (i-1)/(N-1) )*(w - padX*2);
        const py = vizCtx._lastY2 ?? y;
        const cx = (px + x) / 2;
        const cy = (py + y) / 2;
        vizCtx.quadraticCurveTo(px, py, cx, cy);
      }
      vizCtx._lastY2 = y;
    }
    vizCtx.stroke();
    delete vizCtx._lastY2;

    vizCtx.restore();
  }

  function drawViz(){
    const w = viz.clientWidth;
    const h = viz.clientHeight;
    vizCtx.clearRect(0,0,w,h);

    const vign = vizCtx.createRadialGradient(w*0.5,h*0.5, 60, w*0.5,h*0.5, Math.max(w,h)*0.72);
    vign.addColorStop(0, "rgba(0,0,0,0)");
    vign.addColorStop(1, "rgba(0,0,0,0.38)");
    vizCtx.fillStyle = vign;
    vizCtx.fillRect(0,0,w,h);

    const accent = cssVar("--accent") || "#85c5cc";

    const amp = Math.max(12, Math.min(36, h*0.06));
    drawWaveLine(w, h, amp, accent);

    const bars = Math.max(72, Math.floor(w/14));
    let vals;

    if(analyzerEnabled && analyser && !corsLikelyBlocked){
      try{
        analyser.getByteFrequencyData(freqData);
        vals = smoothBins(freqData, bars);
      }catch(_){
        corsLikelyBlocked = true;
        vals = fakeBins(bars);
      }
    }else{
      vals = fakeBins(bars);
    }

    const padX = 22;
    const baseY = h * 0.92;
    const maxH = h * 0.18;
    const barW = (w - padX*2) / bars;

    for(let i=0;i<bars;i++){
      const v = vals[i];
      const edge = Math.min(i/(bars*0.14), (bars-1-i)/(bars*0.14), 1);
      const a = 0.25 + 0.75*edge;

      const bh = Math.max(3, v*maxH);
      const x = padX + i*barW;
      const y = baseY - bh;

      vizCtx.fillStyle = `rgba(255,255,255,${0.16*a})`;
      roundRect(vizCtx, x+barW*0.18, y, barW*0.62, bh, 6);
      vizCtx.fill();

      vizCtx.save();
      vizCtx.shadowColor = hexToRgba(accent, 0.30*a);
      vizCtx.shadowBlur = 14;
      vizCtx.fillStyle = hexToRgba(accent, 0.22*a);
      roundRect(vizCtx, x+barW*0.22, y+bh*0.45, barW*0.56, bh*0.55, 6);
      vizCtx.fill();
      vizCtx.restore();
    }

    const fog = vizCtx.createLinearGradient(0, h*0.78, 0, h);
    fog.addColorStop(0, "rgba(0,0,0,0)");
    fog.addColorStop(1, "rgba(0,0,0,0.35)");
    vizCtx.fillStyle = fog;
    vizCtx.fillRect(0, h*0.78, w, h*0.22);
  }

  // loop bras + viz
  function armUpdate(dt){
    if(!elTonearmRotor) return;

    if(armMove){
      armMove.t += dt;
      const p = Math.min(1, armMove.t / armMove.dur);
      const e = easeInOutCubic(p);
      armAngleDeg = armMove.from + (armMove.to - armMove.from) * e;
      armApplyTransform();

      if(p >= 1){
        const after = armMove.after;
        armMove = null;
        if(typeof after === "function") after();
      }
      return;
    }

    if(isPlaying){
      const model = getScrubModel();
      let target = ARM_START_DEG;

      if(model.mode === "file" || model.mode === "dvr"){
        const win = Math.max(1e-6, model.window || 1);
        const p = Math.max(0, Math.min(1, ((elAudio.currentTime || 0) - model.start) / win));
        target = ARM_START_DEG + p * (ARM_END_DEG - ARM_START_DEG);
      }else{
        target = ARM_START_DEG;
      }

      const k = 1 - Math.exp(-dt * ARM_TRACK_FOLLOW);
      armAngleDeg = armAngleDeg + (target - armAngleDeg) * k;
      armApplyTransform();

      if(armPendingDrop && armIsNear(ARM_START_DEG, 1.2)) armDoDropSoon();
      return;
    }

    if(!armIsNear(ARM_REST_DEG, 0.01)){
      armAngleDeg = ARM_REST_DEG;
      armApplyTransform();
    }
  }

  let lastScrubDraw = 0;
  function loop(ts){
    const dt = Math.max(0, (ts - lastTs) / 1000);
    lastTs = ts;

    if(isPlaying){
      spinPhase += (Math.PI*2) * (dt / SPIN_PERIOD_SEC) * (1 + pitchPct/100);
      spinPhase = normAngle(spinPhase);
    }

    // Arm micro-motion: always visible when needle is down (works for ALL tracks)
    const needleDown = !!(elTonearmLayer && elTonearmLayer.classList.contains("down"));
    if(isPlaying && needleDown){
      // Detect each revolution (phase wrap) and add a very small impulse (vinyl micro skip / groove)
      if(spinPhase < lastSpinPhase){
        armSkipImpulse += Math.sin(spinPhase * 3.0) * ARM_SKIP_MAX * 0.35;
        // clamp
        armSkipImpulse = Math.max(-ARM_SKIP_MAX, Math.min(ARM_SKIP_MAX, armSkipImpulse));
      }
      lastSpinPhase = spinPhase;

      // Smooth wobble synced to rotation (wow/flutter feeling)
      armWowPhase += dt * (Math.PI * 2) * ARM_WOW_HZ * (1 + pitchPct/140);
      // Stronger wobble near the outer groove, slightly weaker toward inner groove
      const model = getScrubModel();
      let groove = 0.0; // 0 outer .. 1 inner
      if(model && (model.mode === "file" || model.mode === "dvr")){
        const win = Math.max(1e-6, model.window || 1);
        groove = Math.max(0, Math.min(1, ((elAudio.currentTime || 0) - model.start) / win));
      }
      const grooveGain = 1.0 - 0.45 * groove;

      // Extra shimmer tied to spinPhase so it feels "locked" to the disc
      const spinLock = 0.55 + 0.45 * Math.sin(spinPhase * 2);

      // Target wobble (sin + subtle 2nd harmonic) locked to the disc
      const targetWow =
        ARM_WOW_DEG * grooveGain * spinLock *
        (0.78 * Math.sin(armWowPhase) + 0.22 * Math.sin(armWowPhase * 2.0 + spinPhase * 0.35));

      // Exponential smoothing (subtle but clearly visible)
      const a = 1 - Math.exp(-dt * ARM_WOW_SMOOTH);
      armWowSmoothed = armWowSmoothed + (targetWow - armWowSmoothed) * a;
      armWowDeg = armWowSmoothed;

      // decay impulse quickly so it becomes a tiny "tick"
      armSkipImpulse *= Math.exp(-dt * 7.0);
    }else{
      // fade out when lifted / paused
      armWowDeg *= Math.exp(-dt * 8.0);
      armWowSmoothed *= Math.exp(-dt * 8.0);
      armSkipImpulse *= Math.exp(-dt * 8.0);
      lastSpinPhase = spinPhase;
    }

    elDisk.style.transform = `rotate(${spinPhase}rad)`;

        elDisk.style.setProperty("--spin", `${spinPhase}rad`);
if(ts - lastScrubDraw > 66){
      lastScrubDraw = ts;
      if(!scrubDragging) updateScrubUI();
    }

    armUpdate(dt);
    // apply wobble even when the base angle is steady
    armApplyTransform();
        // subtle arm glint: tiny brightness modulation based on angle
    const gl = 0.06 * Math.max(0, Math.sin((armAngleDeg * Math.PI) / 180));
    elRoot.style.setProperty("--arm-glint", gl.toFixed(3));
drawViz();
    requestAnimationFrame(loop);
  }

  function init(){
    renderThemeDots();
    populateUiThemeSelect();
    uiThemeBindEvents();

    const startThemeId = getUiThemeStartId();
    const useDefNow = localStorage.getItem(UI_THEME_USE_DEFAULT_KEY) === "1";
    suppressThemeLastWrite = useDefNow;
    applyThemeById(startThemeId);
    suppressThemeLastWrite = false;

    // Ensure we can "exit default" later
    if(!localStorage.getItem(UI_THEME_LAST_KEY)){
      localStorage.setItem(UI_THEME_LAST_KEY, localStorage.getItem("lunaThemeId") || startThemeId || "tron_dual");
    }
    uiThemeSyncControls();

    renderList();
    resize();

        renderWebRadioList();
setVolume(80);
    updateMuteUI();
    updateAnalyzerUI();
    updateShuffleUI();
    updateRepeatUI();

    armSetRestImmediate();
    loadStation(0, false);

    
    // charge les web radios (JSON)
    loadWebRadiosJson();
// postMessage: annonce disponibilité au parent
    lunaSendReady();
    lunaSendState();

    loadXmlPlaylists();
    requestAnimationFrame(loop);
  }


// Remonte l'état au parent (TRON) sur les événements audio
elAudio.addEventListener("playing", () => lunaSendState());
elAudio.addEventListener("pause", () => lunaSendState());
elAudio.addEventListener("ended", () => lunaSendState({ ended: true }));
elAudio.addEventListener("error", () => lunaSendState({ error: true }));


  init();
})();

    function ensureExtraGradients(){

      if(!am || !container) return;

      const h = Math.max(140, Math.floor(container.clientHeight));

    function presetMap(){
      return {
        lunaClassic: { mode: 6,  colorMode: "gradient",  gradient: "classic",    ledBars: true,  showPeaks: true, smoothing: 0.70 },
        fftGraph:    { mode: 10, colorMode: "gradient",  gradient: "classic",    ledBars: false, showPeaks: true, lineWidth: 2, fillAlpha: 0.25, smoothing: 0.75 },
        neonLeds:    { mode: 6,  colorMode: "bar-level", gradient: "prism",      ledBars: true,  showPeaks: true, smoothing: 0.72 },

    function applyPreset(name){
      const presets = presetMap();
      const p = presets[name] || presets.fftGraph;

      if(fftModeEl) fftModeEl.value = String(p.mode);
      if(fftColorModeEl) fftColorModeEl.value = String(p.colorMode);

    function safeParseJSON(val){
      try{ return JSON.parse(val); }catch(e){ return null; }
    }

    function getDefaultCfg(){
      const raw = localStorage.getItem(STORAGE_KEY_DEFAULT_CFG);
      const cfg = raw ? safeParseJSON(raw) : null;
      if(!cfg || typeof cfg !== "object") return null;
      return cfg;
    }

    function updateDefaultLabel(){
      if(!fftDefaultLabel) return;
      const cfg = getDefaultCfg();
      if(!cfg){
        fftDefaultLabel.textContent = "";
        return;
      }
      const p = cfg.preset || "";
      const mode = (cfg.mode!=null) ? String(cfg.mode) : "";
      const grad = cfg.gradient || "";
      fftDefaultLabel.textContent = p ? `défaut: ${p}${mode?` • m${mode}`:""}${grad?` • ${grad}`:""}` : "";
    }

      localStorage.setItem(STORAGE_KEY_DEFAULT_CFG, JSON.stringify(cfg));
      if(cfg && cfg.preset) localStorage.setItem(STORAGE_KEY_DEFAULT_PRESET, String(cfg.preset));

        const uiThemeForced = localStorage.getItem("luna_ui_theme_use_default") === "1";

        const fftThemeForced= localStorage.getItem(STORAGE_KEY_USE_THEME_DEFAULT) === "1";
        const syncOn        = localStorage.getItem(STORAGE_KEY_SYNC_UI_THEME) === "1";
        if(uiThemeForced || fftCfgForced || fftThemeForced || syncOn){
          setMenuOpen(true);

      const useThemeDefault = getUseThemeDefault();

      if(!t) return;
      if(fftColorModeEl) fftColorModeEl.value = t.colorMode;

    function syncFromUiTheme(themeId){
      // do not override explicit visualizer defaults
      if(fftUseDefaultEl && fftUseDefaultEl.checked) return;
      if(fftUseThemeDefaultEl && fftUseThemeDefaultEl.checked) return;

      const t = String(themeId || "");
      const g = UI_THEME_TO_GRADIENT[t] || "classic";
      if(fftColorModeEl) fftColorModeEl.value = "gradient";
      if(fftGradientEl){
        const ok = Array.from(fftGradientEl.options).some(o => o.value === g);

    // Expose for the UI theme system (btnTheme / dots)
    window.lunaSyncFftFromUiTheme = (id)=> {

    async function createOrUpdate(){
      if(!fftEnabled) return;
      const deps = await ensureDeps();
      if(!deps || !container) return;

      const presetOpts = window.__LUNA_FFT_PRESET_OPTS || {};

      const mode = Number(fftModeEl?.value || presetOpts.mode || 10);
      const gradientRaw = String(fftGradientEl?.value || presetOpts.gradient || "classic");

      const baseOpts = {

        source: deps.sourceNode,
        frequencyScale: "log",

        showScaleX: false,
        bgAlpha: 0,
        overlay: true,
        mirror: 1,
        showPeaks: true,
        smoothing: 0.7,
        ...presetOpts
      };

      const ledBars = (mode >= 1 && mode <= 8) ? true : false;
      const createGradient = (gradSafe === "lunaAccent") ? "classic" : gradSafe;

      const opts = {
        ...baseOpts,
        mode,
        colorMode,
        gradient: createGradient,
        ledBars
      };

      if(!am){
        // Create with a safe built-in gradient first, then register our extra gradients and apply the requested options.
        am = new AudioMotionAnalyzer(container, { ...opts, gradient: "classic" });
        ensureExtraGradients();
        // Keep lunaAccent dynamic, but we can register it anytime
        ensureAccentGradient();
        am.setOptions(opts);
      }else{
        ensureExtraGradients();
        ensureAccentGradient();
        am.setOptions(opts);
      }

      if(gradSafe === "lunaAccent"){
        ensureAccentGradient();
        am.setOptions({ gradient: "lunaAccent" });

      fitCanvas();
      am.start();

    // ===== UI Events =====
    if(btnFFT){

        // If already enabled: just toggle the menu (visualizer stays ON behind)
        setMenuOpen(!menuOpen());

    if(btnFFTClose){

      const useThemeDefault = getUseThemeDefault();
      const themeDefault = getThemeDefault();
      if(useThemeDefault && themeDefault){
        if(fftThemeEl && [...fftThemeEl.options].some(o => o.value === themeDefault)) fftThemeEl.value = themeDefault;

        toast("Défaut effacé");

    // Auto-ON toggle persistence
    function setAutoOn(val){

    }
    function getAutoOn(){
      return localStorage.getItem(STORAGE_KEY_AUTO_ON) === "1";
    }
    function setUseDefault(val){
      localStorage.setItem(STORAGE_KEY_USE_DEFAULT, val ? "1" : "0");
      if(fftUseDefaultEl) fftUseDefaultEl.checked = !!val;
    }
    function getUseDefault(){
      const v = localStorage.getItem(STORAGE_KEY_USE_DEFAULT);
      return (v === null) ? true : (v === "1");
    }
    if(fftAutoOnEl){
      fftAutoOnEl.addEventListener("change", () => setAutoOn(fftAutoOnEl.checked));
      // init from storage (default ON)
      if(localStorage.getItem(STORAGE_KEY_AUTO_ON) === null) setAutoOn(true);
      else fftAutoOnEl.checked = getAutoOn();
    }
    if(fftUseDefaultEl){
      fftUseDefaultEl.addEventListener("change", () => {
        setUseDefault(fftUseDefaultEl.checked);
        toast(fftUseDefaultEl.checked ? "Mode défaut ON" : "Mode défaut OFF");
      });
      // init from storage (default ON)
      fftUseDefaultEl.checked = getUseDefault();
    }

    // Preset selection
    if(fftPresetEl){
      fftPresetEl.addEventListener("change", () => {
        applyPreset(fftPresetEl.value);
        createOrUpdate();
      });
    }

    // Manual overrides
    if(fftModeEl){
      fftModeEl.addEventListener("change", () => createOrUpdate());
    }
    if(fftColorModeEl){
      fftColorModeEl.addEventListener("change", () => createOrUpdate());
    }
    if(fftGradientEl){
      fftGradientEl.addEventListener("change", () => createOrUpdate());


    // Theme selection (couleur)
    if(fftThemeEl){
      fftThemeEl.addEventListener("change", ()=>{
        applyTheme(fftThemeEl.value);
      });
      // init UI selection from storage (if any)
      const savedTheme = getThemeDefault();
      if(savedTheme && [...fftThemeEl.options].some(o => o.value === savedTheme)){
        fftThemeEl.value = savedTheme;
      }
    }

    if(fftUseThemeDefaultEl){
      fftUseThemeDefaultEl.addEventListener("change", ()=>{
        setUseThemeDefault(fftUseThemeDefaultEl.checked);

      fftUseThemeDefaultEl.checked = getUseThemeDefault();

    // Sync with UI theme checkbox
    if(fftSyncWithUiThemeEl){

        if(fftSyncWithUiThemeEl.checked && currentId) syncFromUiTheme(currentId);
        toast(fftSyncWithUiThemeEl.checked ? "Sync thème player ON" : "Sync thème player OFF");
      });
    }

    }

    if(btnFFTThemeDefault){
      btnFFTThemeDefault.addEventListener("click", ()=>{

        if(!v){
          toast("Choisis un thème d’abord");

        if(fftUseThemeDefaultEl && !fftUseThemeDefaultEl.checked) setUseThemeDefault(true);
        toast("Thème défaut enregistré");

    if(btnFFTClearTheme){
      btnFFTClearTheme.addEventListener("click", ()=>{

    // Auto-enable ONLY if:
    // - a default FULL config exists AND
    // - "Auto-ON au démarrage" is enabled
    const cfg = getDefaultCfg();
    const autoOn = getAutoOn();
    const useDefault = getUseDefault();

    // Apply saved default config to the menu if present (only if mode défaut ON)
    if(cfg && useDefault){
      // preset first (to load preset extras), then override with saved picks

      if(fftModeEl && cfg.mode!=null) fftModeEl.value = String(cfg.mode);
      if(fftColorModeEl && cfg.colorMode) fftColorModeEl.value = String(cfg.colorMode);
      if(fftGradientEl && cfg.gradient) fftGradientEl.value = String(cfg.gradient);

    }else{
      // Backward compat: if an old default preset exists, at least reflect it in UI.
      const oldPreset = localStorage.getItem(STORAGE_KEY_DEFAULT_PRESET);
      if(oldPreset && fftPresetEl && [...fftPresetEl.options].some(o => o.value === oldPreset)){
        fftPresetEl.value = oldPreset;
        applyPreset(oldPreset);
      }
      updateDefaultLabel();
    }

    // Default: visualizer OFF, menu closed
    setEnabled(false);
    setMenuOpen(false);

    if(cfg && autoOn && useDefault){
      setEnabled(true); // menu remains closed
    }

  <script>
  try {
// LUNA tooltip manager (fixed positioning, clamps to viewport)
        (function(){
          const tooltip = document.createElement("div");
          tooltip.id = "lunaTooltip";
          document.body.appendChild(tooltip);
    
          const PADDING = 12; // viewport padding
          const GAP = 10;     // distance from element
    
          // Friendly names for some icon-only buttons (optional)
          const overrides = {
            btnFFT: "AudioMotion (FFT)",
            btnDrawer: "Playlist / Stations",
            btnAnalyzer: "Visualizer (bas)",
            btnVol: "Volume",
            btnPrev: "Piste précédente",
            btnNext: "Piste suivante",
            btnPlay: "Lecture / Pause"
          };
    
          function getLabel(el){
            if(!el) return "";
            const id = el.id || "";
            if(overrides[id]) return overrides[id];
            return el.getAttribute("aria-label")
              || el.getAttribute("title")
              || el.getAttribute("data-tip")
              || (el.textContent || "").trim();
          }
    
          function show(el){
            const label = getLabel(el);
            if(!label) return;
    
            // native tooltip off while we show ours
            if(el.getAttribute("title")){
              el.dataset._title = el.getAttribute("title");
              el.removeAttribute("title");
            }
    
            tooltip.textContent = label;
            tooltip.classList.add("is-visible");
            tooltip.classList.remove("tip-above","tip-below");
    
            // measure
            const rect = el.getBoundingClientRect();
            const tw = tooltip.offsetWidth;
            const th = tooltip.offsetHeight;
    
            // prefer above unless too close to top
            let place = "above";
            let top = rect.top - th - GAP;
            if(top < PADDING){
              place = "below";
              top = rect.bottom + GAP;
            }
            // if below goes out of screen, flip to above
            if(place === "below" && top + th > window.innerHeight - PADDING){
              place = "above";
              top = rect.top - th - GAP;
            }
    
            let left = rect.left + rect.width / 2;
            // clamp horizontally
            const minLeft = PADDING + tw/2;
            const maxLeft = window.innerWidth - PADDING - tw/2;
            left = Math.max(minLeft, Math.min(maxLeft, left));
    
            tooltip.style.left = left + "px";
            tooltip.style.top = top + "px";
            tooltip.style.transform = "translateX(-50%)";
    
            // arrow position: relative to tooltip box
            const arrowLeft = (rect.left + rect.width/2) - (left - tw/2);
            const arrowClamped = Math.max(14, Math.min(tw-14, arrowLeft));
            tooltip.style.setProperty("--arrow-left", arrowClamped + "px");
    
            tooltip.classList.add(place === "above" ? "tip-above" : "tip-below");
          }
    
          function hide(el){
            tooltip.classList.remove("is-visible");
            tooltip.textContent = "";
    
            // restore native title
            if(el && el.dataset && el.dataset._title){
              el.setAttribute("title", el.dataset._title);
              delete el.dataset._title;
            }
          }
    
          let current = null;
    
          function bind(el){
            el.addEventListener("mouseenter", ()=>{ current = el; show(el); });
            el.addEventListener("mouseleave", ()=>{ hide(el); current = null; });
            el.addEventListener("focusin", ()=>{ current = el; show(el); });
            el.addEventListener("focusout", ()=>{ hide(el); current = null; });
          }
    
          // Bind only buttons/controls
          document.querySelectorAll("button, a[role='button']").forEach(bind);
    
          // reposition on scroll/resize if visible
          window.addEventListener("scroll", ()=>{ if(current) show(current); }, { passive:true });
          window.addEventListener("resize", ()=>{ if(current) show(current); });
        })();
  } catch(e) { console.warn('[LUNA] tooltip manager disabled:', e); }
</script>

  <script>
    // Safety net: don't let optional UI helpers hide root errors
    window.addEventListener("error", (e) => {
      // keep it quiet but visible in console
      console.warn("[LUNA] runtime error:", e.message);
    });
    window.addEventListener("unhandledrejection", (e) => {
      console.warn("[LUNA] unhandled promise:", e.reason);
    });
  </script>
</body>

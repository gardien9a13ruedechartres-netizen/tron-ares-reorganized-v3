<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>cnnpt - Overlay</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
    }

    .wrap {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      border-radius: 0;
      display: block;
      background: #000;
    }

    @supports (height: 100dvh) {
      .wrap { height: 100dvh; }
    }
  </style>
</head>
<body>

<div class="wrap">
  <iframe id="player"
      src="//popcdn.day/player.php?stream=CNN-PT"
      sandbox="allow-scripts allow-forms"
      referrerpolicy="no-referrer"
      loading="eager"
      title="cnnpt">
  </iframe>
</div>


</body>
</html>

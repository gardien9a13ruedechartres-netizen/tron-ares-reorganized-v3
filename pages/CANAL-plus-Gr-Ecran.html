<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>WITV Player</title>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    body {
      position: fixed;
      inset: 0;
    }

    #playerOverlay {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
      cursor: default;
    }

    video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #000;
      object-fit: fill;
      opacity: 0;
      transition: opacity 700ms ease;
    }

    video.is-visible {
      opacity: 1;
    }

    #loader {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      opacity: 1;
      visibility: visible;
      transition: opacity 450ms ease, visibility 450ms ease;
      z-index: 10;
      pointer-events: none;
    }

    #loader.is-hidden {
      opacity: 0;
      visibility: hidden;
    }

    .spinner {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.12);
      border-top-color: rgba(255,255,255,0.92);
      animation: spin 900ms linear infinite;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.18));
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

<div id="playerOverlay">
  <video
    id="video"
    autoplay
    playsinline
    webkit-playsinline
    controls
  ></video>

  <div id="loader" aria-hidden="true">
    <div class="spinner"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const STREAM_URL = "https://cluone.dad:443/live/388FAA8743C4E2980F7B4089B7E81087/88.m3u8";

  const overlay = document.getElementById("playerOverlay");
  const video = document.getElementById("video");
  const loader = document.getElementById("loader");

  let hls = null;
  let spinnerVisibleAt = 0;
  let watchdog = null;
  let wakeRunning = false;

  let wantedMuted = false;
  let wantedVolume = 1;
  let userAudioUnlocked = false;

  function saveAudioState() {
    wantedMuted = video.muted;
    wantedVolume = video.volume;
  }

  function restoreAudioState() {
    video.muted = wantedMuted;
    video.volume = wantedVolume;
  }

  function showLoader() {
    loader.classList.remove("is-hidden");

    if (!spinnerVisibleAt) {
      spinnerVisibleAt = Date.now();
    }
  }

  function hideLoader() {
    loader.classList.add("is-hidden");
    spinnerVisibleAt = 0;
  }

  function showVideo() {
    video.classList.add("is-visible");
    hideLoader();
    restoreAudioState();
  }

  async function playVideo() {
    restoreAudioState();

    try {
      await video.play();
    } catch (e) {
      try {
        video.muted = true;
        await video.play();
      } catch (_) {}
    }
  }

  function simulateClickOnPlayer() {
    const rect = overlay.getBoundingClientRect();

    const x = rect.left + rect.width / 2;
    const y = rect.top + rect.height / 2;

    const eventOptions = {
      bubbles: true,
      cancelable: true,
      view: window,
      clientX: x,
      clientY: y
    };

    overlay.dispatchEvent(new MouseEvent("mousedown", eventOptions));
    overlay.dispatchEvent(new MouseEvent("mouseup", eventOptions));
    overlay.dispatchEvent(new MouseEvent("click", eventOptions));

    video.dispatchEvent(new MouseEvent("mousedown", eventOptions));
    video.dispatchEvent(new MouseEvent("mouseup", eventOptions));
    video.dispatchEvent(new MouseEvent("click", eventOptions));
  }

  function wakeStream() {
    if (wakeRunning) return;

    wakeRunning = true;
    saveAudioState();

    simulateClickOnPlayer();

    setTimeout(function () {
      restoreAudioState();

      if (hls) {
        try {
          hls.startLoad(-1);
        } catch (_) {}

        try {
          hls.recoverMediaError();
        } catch (_) {}
      }

      playVideo();

      setTimeout(function () {
        restoreAudioState();
        wakeRunning = false;
      }, 500);
    }, 250);
  }

  function hardReconnect() {
    saveAudioState();
    showLoader();

    if (hls) {
      hls.destroy();
      hls = null;
    }

    video.pause();
    video.removeAttribute("src");
    video.load();

    setTimeout(function () {
      restoreAudioState();
      initPlayer();
    }, 500);
  }

  function startWatchdog() {
    clearInterval(watchdog);

    watchdog = setInterval(function () {
      const loaderVisible = !loader.classList.contains("is-hidden");

      if (!loaderVisible || !spinnerVisibleAt) return;

      const elapsed = Date.now() - spinnerVisibleAt;

      if (elapsed > 2500 && elapsed < 9000) {
        wakeStream();
      }

      if (elapsed >= 9000) {
        spinnerVisibleAt = Date.now();
        hardReconnect();
      }
    }, 1000);
  }

  function initPlayer() {
    showLoader();
    restoreAudioState();

    if (video.canPlayType("application/vnd.apple.mpegurl")) {
      video.src = STREAM_URL;
      video.load();
      playVideo();
      return;
    }

    if (window.Hls && Hls.isSupported()) {
      hls = new Hls({
        enableWorker: true,
        lowLatencyMode: true,
        liveSyncDurationCount: 3,
        liveMaxLatencyDurationCount: 6,
        backBufferLength: 30
      });

      hls.loadSource(STREAM_URL);
      hls.attachMedia(video);

      hls.on(Hls.Events.MANIFEST_PARSED, function () {
        restoreAudioState();
        playVideo();
      });

      hls.on(Hls.Events.ERROR, function (event, data) {
        showLoader();

        if (!data || !data.fatal) return;

        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
          try {
            hls.startLoad(-1);
          } catch (_) {
            wakeStream();
          }
          return;
        }

        if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
          try {
            hls.recoverMediaError();
          } catch (_) {
            wakeStream();
          }
          return;
        }

        hardReconnect();
      });

      return;
    }

    showLoader();
  }

  overlay.addEventListener("click", function () {
    userAudioUnlocked = true;
    wantedMuted = false;
    wantedVolume = 1;

    restoreAudioState();
    playVideo();
  });

  video.addEventListener("volumechange", function () {
    if (userAudioUnlocked) {
      wantedMuted = video.muted;
      wantedVolume = video.volume;
    }
  });

  video.addEventListener("playing", showVideo);
  video.addEventListener("canplay", showVideo);
  video.addEventListener("waiting", showLoader);
  video.addEventListener("stalled", showLoader);
  video.addEventListener("seeking", showLoader);

  video.addEventListener("seeked", function () {
    if (!video.paused) {
      hideLoader();
      restoreAudioState();
    }
  });

  video.addEventListener("error", function () {
    wakeStream();
  });

  startWatchdog();
  initPlayer();
});
</script>

</body>
</html>

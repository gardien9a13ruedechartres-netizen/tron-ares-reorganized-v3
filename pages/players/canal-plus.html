<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>CANAL-plus</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #video {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: fill;
      background: #000;
      z-index: 1;
    }

    #loadingOverlay {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.045), rgba(0,0,0,0.94) 48%, #000 100%);
      opacity: 1;
      visibility: visible;
      transition: opacity 0.45s ease, visibility 0.45s ease;
      pointer-events: none;
    }

    #loadingOverlay.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .premiumLoader {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.16);
      border-top-color: rgba(255, 255, 255, 0.95);
      border-right-color: rgba(255, 255, 255, 0.50);
      animation: premiumSpin 0.95s linear infinite;
      filter: drop-shadow(0 0 14px rgba(255, 255, 255, 0.16));
    }

    .premiumLoader::after {
      content: "";
      position: absolute;
      inset: 11px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.10);
    }

    @keyframes premiumSpin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>

<video id="video" autoplay playsinline controls></video>

<div id="loadingOverlay" aria-hidden="true">
  <div class="premiumLoader"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
const streamUrl = "https://livewatch.top/api/proxy?url=https%3A%2F%2Fshouurvki7jtfax.ngolpdkyoctjcddxshli469r.org%2Fsunshine%2FH2tlyEBLn4BeKjMoj3vIxte-BicxCvOT3RrL46RC3hBPvXJkTt_7eq3w5qGRefwpsB11WJJZybEae_Mzid4JTZ8Nz11S_4xGSsDi7rtf3uN2Omh2ExtiV6_6XYMhIgYyylP1X3P7wppoWYvBuHXsLokj3lbAObobZShTscPU_52GKS6xuzoqc9M7GCzUkqrJJczXjCUrIRChk7mjVPsnVCs_Hk-oV_ebewakIl_BUfQhq8DR3BrUBnyLhciOgXxf--juAL7H59GopCEzE7d6bw%2Fhls%2Findex.m3u8";

const video = document.getElementById("video");
const loadingOverlay = document.getElementById("loadingOverlay");

video.muted = false;
video.volume = 1;

function showLoader() {
  if (loadingOverlay) {
    loadingOverlay.classList.remove("hidden");
  }
}

function hideLoader() {
  if (loadingOverlay) {
    loadingOverlay.classList.add("hidden");
  }
}

let hls = null;
let reloadTimer = null;
let healthTimer = null;
let lastTime = 0;
let lastProgressAt = Date.now();
let reloadCount = 0;

const HEALTH_CHECK_INTERVAL = 5000;
const NO_PROGRESS_LIMIT = 18000;
const RELOAD_COOLDOWN = 7000;
const HARD_REFRESH_AFTER = 5;

function safePlay() {
  video.play().catch(function (error) {
    console.error("Autoplay bloqué :", error);
  });
}

function destroyHls() {
  if (hls) {
    try {
      hls.destroy();
    } catch (error) {
      console.error("Erreur destruction HLS :", error);
    }
    hls = null;
  }
}

function attachNativePlayer() {
  video.src = streamUrl;
  video.load();

  video.addEventListener("loadedmetadata", function () {
    safePlay();
  }, { once: true });
}

function attachHlsPlayer() {
  destroyHls();

  hls = new Hls({
    enableWorker: true,
    lowLatencyMode: true,
    liveSyncDurationCount: 3,
    liveMaxLatencyDurationCount: 8,
    maxBufferLength: 20,
    maxMaxBufferLength: 30,
    backBufferLength: 30,
    fragLoadingTimeOut: 20000,
    manifestLoadingTimeOut: 20000,
    levelLoadingTimeOut: 20000
  });

  hls.loadSource(streamUrl);
  hls.attachMedia(video);

  hls.on(Hls.Events.MANIFEST_PARSED, function () {
    safePlay();
  });

  hls.on(Hls.Events.FRAG_LOADED, function () {
    lastProgressAt = Date.now();
  });

  hls.on(Hls.Events.LEVEL_LOADED, function () {
    lastProgressAt = Date.now();
  });

  hls.on(Hls.Events.ERROR, function (event, data) {
    console.error("Erreur HLS :", data);

    if (!data || !data.fatal) {
      return;
    }

    if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
      invisibleReload("network-error");
      return;
    }

    if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
      try {
        hls.recoverMediaError();
      } catch (error) {
        invisibleReload("media-error");
      }
      return;
    }

    invisibleReload("fatal-error");
  });
}

function initPlayer() {
  lastTime = 0;
  lastProgressAt = Date.now();
  showLoader();

  if (Hls.isSupported()) {
    attachHlsPlayer();
  } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
    attachNativePlayer();
  } else {
    console.error("HLS non supporté.");
  }
}

function invisibleReload(reason) {
  if (reloadTimer) {
    return;
  }

  console.warn("Reload invisible du player :", reason);
  showLoader();

  reloadTimer = setTimeout(function () {
    reloadTimer = null;
    reloadCount += 1;

    const currentMuted = video.muted;
    const currentVolume = video.volume;

    try {
      video.pause();
      video.removeAttribute("src");
      video.load();
    } catch (error) {
      console.error("Erreur reset vidéo :", error);
    }

    destroyHls();

    video.muted = currentMuted;
    video.volume = currentVolume;

    initPlayer();

    if (reloadCount >= HARD_REFRESH_AFTER) {
      reloadCount = 0;
      setTimeout(function () {
        window.location.reload();
      }, 2000);
    }
  }, RELOAD_COOLDOWN);
}

function startHealthMonitor() {
  clearInterval(healthTimer);

  healthTimer = setInterval(function () {
    const currentTime = video.currentTime || 0;
    const now = Date.now();

    if (!video.paused && !video.ended && currentTime > lastTime) {
      lastTime = currentTime;
      lastProgressAt = now;
      return;
    }

    const noProgressFor = now - lastProgressAt;

    const seemsStuck =
      !video.paused &&
      !video.ended &&
      noProgressFor > NO_PROGRESS_LIMIT;

    const noEnoughData =
      video.readyState < 2 &&
      noProgressFor > NO_PROGRESS_LIMIT;

    if (seemsStuck || noEnoughData) {
      showLoader();
      invisibleReload("absence-flux-ou-moulinage");
    }
  }, HEALTH_CHECK_INTERVAL);
}

video.addEventListener("waiting", function () {
  console.warn("Vidéo en attente de données...");
  showLoader();
});

video.addEventListener("stalled", function () {
  console.warn("Flux bloqué/stalled.");
  showLoader();
  invisibleReload("stalled");
});

video.addEventListener("error", function () {
  console.error("Erreur vidéo native :", video.error);
  showLoader();
  invisibleReload("video-error");
});

video.addEventListener("playing", function () {
  lastProgressAt = Date.now();
  hideLoader();
});

video.addEventListener("canplay", function () {
  hideLoader();
});

video.addEventListener("timeupdate", function () {
  lastProgressAt = Date.now();
  lastTime = video.currentTime || 0;
});

initPlayer();
startHealthMonitor();

window.addEventListener("beforeunload", function () {
  clearInterval(healthTimer);
  clearTimeout(reloadTimer);
  destroyHls();
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iframe principal avec secours HLS + retour invisible</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: black;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

#player-container {
    position: relative;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
}

#mainVideo,
#probeVideo,
#iframeViewport,
#fallbackFrame,
#status {
    position: absolute;
}

#mainVideo {
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    background: black;
    object-fit: fill;
    z-index: 1;
}

#iframeViewport {
    inset: 0;
    overflow: hidden;
    background: black;
    z-index: 2;
}

#fallbackFrame {
    border: 0;
    background: black;
    transform-origin: center center;
}

#probeVideo {
    width: 1px;
    height: 1px;
    opacity: 0;
    pointer-events: none;
    left: -9999px;
    top: -9999px;
}

.hidden {
    display: none !important;
}

#status {
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-family: Arial, sans-serif;
    font-size: 16px;
    background: rgba(0,0,0,0.25);
    pointer-events: none;
    z-index: 5;
    opacity: 0;
    transition: opacity 0.25s ease;
}

#status.show {
    opacity: 1;
}
</style>
</head>
<body>

<div id="player-container">
    <div id="iframeViewport">
        <iframe
            id="fallbackFrame"
            src=""
            allowfullscreen
            allow="autoplay; fullscreen"
            referrerpolicy="no-referrer">
        </iframe>
    </div>

    <video id="mainVideo" class="hidden" controls autoplay playsinline></video>
    <video id="probeVideo" autoplay playsinline muted></video>

    <div id="status">Chargement…</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
(() => {
    const mainVideo = document.getElementById("mainVideo");
    const probeVideo = document.getElementById("probeVideo");
    const iframeViewport = document.getElementById("iframeViewport");
    const iframe = document.getElementById("fallbackFrame");
    const statusBox = document.getElementById("status");

    const iframeUrl = "/players/pages/canal.html";
    const streamUrl = "https://cluone.dad:443/live/388FAA8743C4E2980F7B4089B7E81087/20.m3u8";

    const CONFIG = {
        startupTimeoutMs: 5000,
        stallThresholdMs: 4000,
        silenceThresholdMs: 12000,
        retryBackDelayMs: 30000,
        stableBeforeReturnMs: 15000,
        progressCheckIntervalMs: 500,
        minAudioRms: 0.0025,
        showVisibleMessages: false,

        iframeAutoRefreshEnabled: true,
        iframeAutoRefreshMs: (10 * 60 + 16) * 1000,
        iframeRefreshOnlyWhenVisible: true,
        iframeRefreshStartDelayMs: 5000,

        iframeBaseWidth: 1920,
        iframeBaseHeight: 1080,
        iframeFitMode: "cover",
        iframeOffsetX: 0,
        iframeOffsetY: 0,
        iframeExtraScale: 1.03,
        iframeFillBoost: 1.08,

        keepIframeLoaded: true
    };

    let activeMode = "iframe";
    let mainHls = null;
    let probeHls = null;

    let mainState = null;
    let probeState = null;

    let mainAudioContext = null;
    let mainAnalyser = null;
    let mainSourceNode = null;
    let mainAudioAnalysisAvailable = false;

    let probeAudioContext = null;
    let probeAnalyser = null;
    let probeSourceNode = null;
    let probeAudioAnalysisAvailable = false;

    let retryTimer = null;
    let resizeRaf = null;

    let iframeRefreshTimer = null;
    let iframeRefreshStartTimer = null;
    let iframeIsReady = false;
    let iframeLastLoad = 0;

    function showStatus(message) {
        if (!CONFIG.showVisibleMessages) return;
        statusBox.textContent = message || "";
        statusBox.classList.add("show");
    }

    function hideStatus() {
        statusBox.classList.remove("show");
    }

    function createRuntimeState() {
        return {
            startedAt: 0,
            stableSince: 0,
            lastCurrentTime: 0,
            lastProgressAt: Date.now(),
            audioTracksDetected: null,
            silenceSince: null,
            startupTimer: null,
            monitorTimer: null
        };
    }

    function clearStateTimers(state) {
        if (!state) return;

        if (state.startupTimer) {
            clearTimeout(state.startupTimer);
            state.startupTimer = null;
        }

        if (state.monitorTimer) {
            clearInterval(state.monitorTimer);
            state.monitorTimer = null;
        }
    }

    function stopRetryTimer() {
        if (retryTimer) {
            clearTimeout(retryTimer);
            retryTimer = null;
        }
    }

    function stopIframeRefreshTimer() {
        if (iframeRefreshTimer) {
            clearInterval(iframeRefreshTimer);
            iframeRefreshTimer = null;
        }

        if (iframeRefreshStartTimer) {
            clearTimeout(iframeRefreshStartTimer);
            iframeRefreshStartTimer = null;
        }
    }

    function destroyHlsInstance(instance) {
        if (!instance) return null;
        try {
            instance.destroy();
        } catch (e) {}
        return null;
    }

    function stopVideo(video) {
        try {
            video.pause();
        } catch (e) {}

        try {
            video.removeAttribute("src");
            video.load();
        } catch (e) {}
    }

    async function enableAudioAnalysis(video, type) {
        try {
            if (!window.AudioContext && !window.webkitAudioContext) {
                return false;
            }

            if (type === "main") {
                if (!mainAudioContext) {
                    const Ctx = window.AudioContext || window.webkitAudioContext;
                    mainAudioContext = new Ctx();
                }

                if (mainAudioContext.state === "suspended") {
                    try { await mainAudioContext.resume(); } catch (e) {}
                }

                if (!mainSourceNode) {
                    mainSourceNode = mainAudioContext.createMediaElementSource(video);
                    mainAnalyser = mainAudioContext.createAnalyser();
                    mainAnalyser.fftSize = 2048;
                    mainSourceNode.connect(mainAnalyser);
                    mainAnalyser.connect(mainAudioContext.destination);
                }

                mainAudioAnalysisAvailable = true;
                return true;
            }

            if (type === "probe") {
                if (!probeAudioContext) {
                    const Ctx = window.AudioContext || window.webkitAudioContext;
                    probeAudioContext = new Ctx();
                }

                if (probeAudioContext.state === "suspended") {
                    try { await probeAudioContext.resume(); } catch (e) {}
                }

                if (!probeSourceNode) {
                    probeSourceNode = probeAudioContext.createMediaElementSource(video);
                    probeAnalyser = probeAudioContext.createAnalyser();
                    probeAnalyser.fftSize = 2048;
                    probeSourceNode.connect(probeAnalyser);
                }

                probeAudioAnalysisAvailable = true;
                return true;
            }

            return false;
        } catch (e) {
            if (type === "main") mainAudioAnalysisAvailable = false;
            if (type === "probe") probeAudioAnalysisAvailable = false;
            return false;
        }
    }

    function getAudioRms(type) {
        try {
            let analyser = null;
            let available = false;

            if (type === "main") {
                analyser = mainAnalyser;
                available = mainAudioAnalysisAvailable;
            } else {
                analyser = probeAnalyser;
                available = probeAudioAnalysisAvailable;
            }

            if (!available || !analyser) return null;

            const data = new Uint8Array(analyser.fftSize);
            analyser.getByteTimeDomainData(data);

            let sum = 0;
            for (let i = 0; i < data.length; i++) {
                const v = (data[i] - 128) / 128;
                sum += v * v;
            }

            return Math.sqrt(sum / data.length);
        } catch (e) {
            return null;
        }
    }

    function applyIframeLayout() {
        const viewportWidth = iframeViewport.clientWidth || window.innerWidth;
        const viewportHeight = iframeViewport.clientHeight || window.innerHeight;

        const baseWidth = CONFIG.iframeBaseWidth;
        const baseHeight = CONFIG.iframeBaseHeight;

        const scaleContain = Math.min(viewportWidth / baseWidth, viewportHeight / baseHeight);
        const scaleCover = Math.max(viewportWidth / baseWidth, viewportHeight / baseHeight);

        let finalScale = scaleCover;

        if (CONFIG.iframeFitMode === "contain") {
            finalScale = scaleContain;
        } else if (CONFIG.iframeFitMode === "cover") {
            finalScale = scaleCover * CONFIG.iframeExtraScale;
        } else if (CONFIG.iframeFitMode === "fill") {
            finalScale = scaleCover * CONFIG.iframeExtraScale * CONFIG.iframeFillBoost;
        }

        const renderedWidth = baseWidth * finalScale;
        const renderedHeight = baseHeight * finalScale;

        const left = (viewportWidth - renderedWidth) / 2 + CONFIG.iframeOffsetX;
        const top = (viewportHeight - renderedHeight) / 2 + CONFIG.iframeOffsetY;

        iframe.style.width = renderedWidth + "px";
        iframe.style.height = renderedHeight + "px";
        iframe.style.left = left + "px";
        iframe.style.top = top + "px";
        iframe.style.transform = "translateZ(0)";
    }

    function refreshIframeLayout() {
        if (resizeRaf) cancelAnimationFrame(resizeRaf);
        resizeRaf = requestAnimationFrame(() => {
            applyIframeLayout();
        });
    }

    function refreshIframeSafely() {
        if (!CONFIG.iframeAutoRefreshEnabled) return;
        if (!iframe.src) return;

        if (CONFIG.iframeRefreshOnlyWhenVisible && activeMode !== "iframe") {
            return;
        }

        if (!iframeIsReady) {
            return;
        }

        const now = Date.now();

        if (now - iframeLastLoad < CONFIG.iframeAutoRefreshMs - 2000) {
            return;
        }

        iframeIsReady = false;
        iframe.src = iframeUrl;
    }

    function startIframeRefreshTimer() {
        stopIframeRefreshTimer();

        if (!CONFIG.iframeAutoRefreshEnabled) return;
        if (activeMode !== "iframe") return;

        iframeRefreshStartTimer = setTimeout(() => {
            iframeRefreshTimer = setInterval(() => {
                refreshIframeSafely();
            }, CONFIG.iframeAutoRefreshMs);
        }, CONFIG.iframeRefreshStartDelayMs);
    }

    function showIframePlayer() {
        refreshIframeLayout();

        mainVideo.classList.add("hidden");
        iframeViewport.classList.remove("hidden");

        stopRetryTimer();

        if (iframe.src !== iframeUrl) {
            iframeIsReady = false;
            iframe.src = iframeUrl;
        }

        activeMode = "iframe";
        startIframeRefreshTimer();
    }

    function showHlsPlayer() {
        stopIframeRefreshTimer();

        iframeViewport.classList.add("hidden");
        mainVideo.classList.remove("hidden");

        activeMode = "hls";
    }

    function attachVideoListeners(video, state, type, onFatal) {
        video.onplaying = async () => {
            state.lastProgressAt = Date.now();
            if (!state.startedAt) state.startedAt = Date.now();
            if (!state.stableSince) state.stableSince = Date.now();
            await enableAudioAnalysis(video, type);
        };

        video.ontimeupdate = () => {
            const now = Date.now();

            if (video.currentTime > state.lastCurrentTime + 0.05) {
                state.lastCurrentTime = video.currentTime;
                state.lastProgressAt = now;

                if (!state.startedAt) state.startedAt = now;
                if (!state.stableSince) state.stableSince = now;
            }
        };

        video.onloadeddata = async () => {
            await enableAudioAnalysis(video, type);
        };

        video.onerror = () => {
            onFatal("Erreur élément video");
        };
    }

    function startMonitor(video, state, type, isBackgroundProbe, onStable, onFatal) {
        clearStateTimers(state);
        state.lastProgressAt = Date.now();

        state.monitorTimer = setInterval(() => {
            const now = Date.now();
            const hasStarted = state.startedAt > 0;
            const isActuallyPlaying = !video.paused && !video.ended && video.readyState >= 2;

            if (!hasStarted) {
                const noBuffer = video.readyState < 2;
                const tooLong = now - state.lastProgressAt > CONFIG.startupTimeoutMs;

                if (noBuffer && tooLong) {
                    onFatal("Le flux ne démarre pas");
                    return;
                }
            }

            if (hasStarted && isActuallyPlaying && now - state.lastProgressAt > CONFIG.stallThresholdMs) {
                onFatal("Le flux est figé");
                return;
            }

            if (state.audioTracksDetected === 0) {
                onFatal("Aucune piste audio détectée");
                return;
            }

            const rms = getAudioRms(type);

            if (rms !== null && hasStarted && isActuallyPlaying) {
                if (rms < CONFIG.minAudioRms) {
                    if (!state.silenceSince) state.silenceSince = now;

                    if (now - state.silenceSince > CONFIG.silenceThresholdMs) {
                        onFatal("Silence prolongé détecté");
                        return;
                    }
                } else {
                    state.silenceSince = null;
                }
            }

            if (isBackgroundProbe && hasStarted) {
                const stableDuration = now - state.stableSince;
                const audioOk = state.audioTracksDetected !== 0;
                const noLongSilenceIssue = state.silenceSince === null || (now - state.silenceSince < CONFIG.silenceThresholdMs);

                if (stableDuration >= CONFIG.stableBeforeReturnMs && audioOk && noLongSilenceIssue) {
                    onStable();
                }
            }
        }, CONFIG.progressCheckIntervalMs);
    }

    function startHlsPlayback() {
        stopRetryTimer();
        clearStateTimers(mainState);
        mainState = createRuntimeState();

        mainHls = destroyHlsInstance(mainHls);
        stopVideo(mainVideo);

        attachVideoListeners(mainVideo, mainState, "main", () => {
            retryIframeFromHls();
        });

        showStatus("Chargement HLS…");

        if (mainVideo.canPlayType("application/vnd.apple.mpegurl")) {
            mainState.startupTimer = setTimeout(() => {
                if (!mainState.startedAt && mainVideo.readyState < 2) {
                    retryIframeFromHls();
                }
            }, CONFIG.startupTimeoutMs);

            mainVideo.src = streamUrl;
            mainVideo.play().catch(() => {});

            startMonitor(
                mainVideo,
                mainState,
                "main",
                false,
                () => {},
                () => retryIframeFromHls()
            );

            hideStatus();
            return;
        }

        if (window.Hls && Hls.isSupported()) {
            mainHls = new Hls({
                enableWorker: true,
                lowLatencyMode: false,
                maxBufferLength: 30,
                liveSyncDurationCount: 3,
                liveMaxLatencyDurationCount: 10
            });

            mainHls.on(Hls.Events.MEDIA_ATTACHED, () => {
                mainHls.loadSource(streamUrl);
            });

            mainHls.on(Hls.Events.MANIFEST_PARSED, () => {
                mainVideo.play().catch(() => {});
            });

            mainHls.on(Hls.Events.AUDIO_TRACKS_UPDATED, (event, data) => {
                mainState.audioTracksDetected = Array.isArray(data.audioTracks) ? data.audioTracks.length : 0;
            });

            mainHls.on(Hls.Events.ERROR, (event, data) => {
                if (!data.fatal) return;

                switch (data.type) {
                    case Hls.ErrorTypes.NETWORK_ERROR:
                        retryIframeFromHls();
                        break;

                    case Hls.ErrorTypes.MEDIA_ERROR:
                        try {
                            mainHls.recoverMediaError();
                        } catch (e) {
                            retryIframeFromHls();
                        }
                        break;

                    default:
                        retryIframeFromHls();
                        break;
                }
            });

            mainHls.attachMedia(mainVideo);

            mainState.startupTimer = setTimeout(() => {
                if (!mainState.startedAt && mainVideo.readyState < 2) {
                    retryIframeFromHls();
                }
            }, CONFIG.startupTimeoutMs);

            startMonitor(
                mainVideo,
                mainState,
                "main",
                false,
                () => {},
                () => retryIframeFromHls()
            );

            hideStatus();
            return;
        }

        retryIframeFromHls();
    }

    function fallbackToHls() {
        clearStateTimers(probeState);
        probeHls = destroyHlsInstance(probeHls);
        stopVideo(probeVideo);

        showHlsPlayer();
        startHlsPlayback();
    }

    function retryIframeFromHls() {
        clearStateTimers(mainState);
        mainHls = destroyHlsInstance(mainHls);
        stopVideo(mainVideo);

        showIframePlayer();
        hideStatus();
    }

    iframe.addEventListener("load", () => {
        iframeIsReady = true;
        iframeLastLoad = Date.now();

        if (activeMode === "hls") {
            retryIframeFromHls();
        }
    });

    iframe.addEventListener("error", () => {
        iframeIsReady = false;

        if (activeMode === "iframe") {
            fallbackToHls();
        }
    });

    window.addEventListener("resize", refreshIframeLayout);

    document.addEventListener("click", () => {
        enableAudioAnalysis(mainVideo, "main");
        enableAudioAnalysis(probeVideo, "probe");
    }, { passive: true });

    document.addEventListener("touchstart", () => {
        enableAudioAnalysis(mainVideo, "main");
        enableAudioAnalysis(probeVideo, "probe");
    }, { passive: true });

    mainState = createRuntimeState();
    probeState = createRuntimeState();

    refreshIframeLayout();
    showIframePlayer();
})();
</script>

<script src="../js/wheel-volume-iframe.js"></script>
</body>
</html>
